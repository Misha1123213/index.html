<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТТК Тренажёр — Premium Dark</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; justify-content: center; min-height: 100vh; padding: 20px; -webkit-tap-highlight-color: transparent; }
        
        .app-container { background: #1e293b; width: 100%; max-width: 440px; border-radius: 20px; border: 1px solid #334155; padding: 24px; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.3); overflow: hidden; }
        
        /* Прогресс-бар премиум */
        .progress-container { display: flex; align-items: center; gap: 14px; margin-bottom: 25px; }
        .close-btn { font-size: 24px; color: #64748b; cursor: pointer; border: none; background: none; transition: color 0.2s; line-height: 1; }
        .close-btn:hover { color: #f8fafc; }
        .progress-bar { background: #334155; height: 10px; flex-grow: 1; border-radius: 9999px; overflow: hidden; position: relative; }
        .progress-fill { background: linear-gradient(90deg, #10b981 0%, #059669 100%); height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 9999px; }
        .progress-text { font-size: 13px; font-weight: 600; color: #94a3b8; min-width: 45px; text-align: right; }

        .question-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; text-align: center; }
        .dish-name { font-size: 22px; color: #38bdf8; font-weight: 700; text-align: center; margin-bottom: 25px; }
        /* Зона сборки рецепта (компактная) */
        .preview-zone { min-height: 90px; border: 1px dashed #475569; border-radius: 14px; padding: 12px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 8px; background: #0f172a; align-content: flex-start; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.1); }
        .preview-item { background: #0284c7; color: #ffffff; padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; border: 1px solid #0369a1; transition: all 0.15s ease; animation: popIn 0.2s ease-out; }
        .preview-item:hover { background: #0369a1; }
        
        /* СТРОГАЯ ТЕМНО-КРАСНАЯ ПОДСВЕТКА ДЛЯ ОШИБОК */
        .preview-item.wrong-item { background: #991b1b !important; border-color: #7f1d1d !important; color: #fee2e2 !important; box-shadow: 0 2px 8px rgba(153,27,27,0.2) !important; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }
        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Компактная сетка ингредиентов */
        .ingredients-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: auto; }
        .ing-btn { background: #334155; border: 1px solid #475569; border-radius: 12px; padding: 12px 10px; font-size: 13px; font-weight: 600; color: #f8fafc; cursor: pointer; transition: all 0.15s ease; text-align: center; }
        .ing-btn:hover { background: #475569; border-color: #64748b; }
        
        /* ПРИГЛУШЕННАЯ ИЗУМРУДНАЯ ПОДСВЕТКА ДЛЯ ЗАБЫТЫХ ВАРИАНТОВ */
        .ing-btn.selected { background: #0f172a; border-color: #1e293b; color: #475569; opacity: 0.25; pointer-events: none; }
        .ing-btn.error-missing { background: #065f46 !important; border-color: #047857 !important; color: #a7f3d0 !important; pointer-events: none; box-shadow: 0 4px 12px rgba(6,95,70,0.2); }
        
        .ingredients-grid.allergen-mode { grid-template-columns: 1fr; }

        /* Компактная нижняя панель */
        .check-panel { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .buttons-row { display: flex; gap: 12px; width: 100%; }
        
        .main-action-btn { width: 100%; background: #059669; border: 1px solid #047857; color: white; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s ease; }
        .main-action-btn:hover:not(:disabled) { background: #047857; }
        .main-action-btn:disabled { background: #334155; border-color: #1e293b; color: #64748b; cursor: not-allowed; }
        
        .reset-btn { background: #dc2626; border-color: #b91c1c; max-width: 65px; font-size: 16px; }
        .reset-btn:hover:not(:disabled) { background: #b91c1c; }

        /* Строгие благородные кнопки после проверки */
        .after-check-row { display: none; gap: 12px; width: 100%; animation: popIn 0.2s ease-out; }
        .retry-btn { background: #d97706; border-color: #b45309; }
        .retry-btn:hover { background: #b45309; }
        .next-btn { background: #0284c7; border-color: #0369a1; }
        .next-btn:hover { background: #0369a1; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-container">
        <button class="close-btn" onclick="location.reload()">×</button>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="progress-text" id="progress-text">0 / 0</div>
    </div>

    <div class="question-title" id="question-type-title">Собери состав для:</div>
    <div class="dish-name" id="dish-title">Загрузка...</div>

    <div class="preview-zone" id="preview-zone"></div>
    <div class="ingredients-grid" id="ingredients-grid"></div>

    <div class="check-panel">
        <div class="buttons-row" id="normal-actions-row">
            <button class="main-action-btn reset-btn" id="reset-btn" disabled onclick="resetCurrentQuestion()">↩</button>
            <button class="main-action-btn" id="action-btn" disabled onclick="checkAnswer()">Проверить</button>
        </div>
        <div class="after-check-row" id="after-check-row">
            <button class="main-action-btn retry-btn" onclick="retryQuestion()">🔁 Заново</button>
            <button class="main-action-btn next-btn" onclick="nextQuestion()">Дальше ➡️</button>
        </div>
    </div>
</div>
<script>
    let DISHES_DB = [];
    let currentQuestionIndex = 0;
    let selectedAnswers = [];
    let buttonMapping = {};
    let isCheckedMode = false;

    // ЗВУКОВОЙ ДВИЖОК (WEB AUDIO API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playClickSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    function playSuccessSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        
        // Нота 1 (До)
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(523.25, now); // C5
        gain1.gain.setValueAtTime(0.15, now);
        gain1.gain.linearRampToValueAtTime(0, now + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start(now);
        osc1.stop(now + 0.1);

        // Нота 2 (Ми - чуть позже и выше)
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(659.25, now + 0.08); // E5
        gain2.gain.setValueAtTime(0.15, now + 0.08);
        gain2.gain.linearRampToValueAtTime(0, now + 0.3);
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.start(now + 0.08);
        osc2.stop(now + 0.3);
    }

    function playErrorSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.25);
    }

    async function loadDishes() {
        try {
            const response = await fetch('/index.html/dishes.json');
            DISHES_DB = await response.json();
            DISHES_DB.sort(() => Math.random() - 0.5);
            initQuestion();
        } catch (error) {
            document.getElementById('dish-title').innerText = "Ошибка загрузки данных 😢";
            console.error(error);
        }
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initQuestion() {
        if (!DISHES_DB.length) return;
        if (currentQuestionIndex >= DISHES_DB.length) {
            currentQuestionIndex = 0;
            DISHES_DB.sort(() => Math.random() - 0.5);
        }

        const currentItem = DISHES_DB[currentQuestionIndex];
        selectedAnswers = [];
        buttonMapping = {};
        isCheckedMode = false;
        
        const progressPercent = (currentQuestionIndex / DISHES_DB.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;
        document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${DISHES_DB.length}`;

        const typeTitle = document.getElementById('question-type-title');
        const previewZone = document.getElementById('preview-zone');
        const grid = document.getElementById('ingredients-grid');

        document.getElementById('normal-actions-row').style.display = 'flex';
        document.getElementById('after-check-row').style.display = 'none';

        if (currentItem.type === "allergen") {
            typeTitle.innerText = "Какие главные АЛЛЕРГЕНЫ содержит:";
            previewZone.style.minHeight = "60px";
            grid.className = "ingredients-grid allergen-mode";
        } else {
            typeTitle.innerText = "Выбери все ингредиенты, входящие в:";
            previewZone.style.minHeight = "90px";
            grid.className = "ingredients-grid";
        }

        document.getElementById('dish-title').innerText = currentItem.name;
        document.getElementById('action-btn').disabled = true;
        document.getElementById('reset-btn').disabled = true;
        
        renderPreview();

        grid.innerHTML = '';
        const shuffledPool = shuffle([...currentItem.pool]);
        
        shuffledPool.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'ing-btn';
            btn.innerText = item;
            btn.onclick = () => selectItem(item);
            grid.appendChild(btn);
            buttonMapping[item] = btn;
        });
    }

    function selectItem(item) {
        if (isCheckedMode || selectedAnswers.includes(item)) return;
        
        playClickSound(); // Звук клика по ингредиенту
        selectedAnswers.push(item);
        if (buttonMapping[item]) {
            buttonMapping[item].classList.add('selected');
        }
        
        const keyState = selectedAnswers.length === 0;
        document.getElementById('action-btn').disabled = keyState;
        document.getElementById('reset-btn').disabled = keyState;
        renderPreview();
    }

    function removeItem(item) {
        if (isCheckedMode) return;
        playClickSound(); // Звук удаления из превью
        const index = selectedAnswers.indexOf(item);
        if (index > -1) {
            selectedAnswers.splice(index, 1);
            if (buttonMapping[item]) {
                buttonMapping[item].classList.remove('selected');
            }
            const keyState = selectedAnswers.length === 0;
            document.getElementById('action-btn').disabled = keyState;
            document.getElementById('reset-btn').disabled = keyState;
            renderPreview();
        }
    }

    function resetCurrentQuestion() {
        if (isCheckedMode) return;
        playClickSound();
        selectedAnswers = [];
        document.getElementById('action-btn').disabled = true;
        document.getElementById('reset-btn').disabled = true;
        renderPreview();
        for (let item in buttonMapping) {
            buttonMapping[item].className = 'ing-btn';
        }
    }

    function renderPreview(wrongItemsList = []) {
        const zone = document.getElementById('preview-zone');
        zone.innerHTML = '';
        if (selectedAnswers.length === 0) {
            zone.innerHTML = '<span style="color:#64748b; text-align:center; font-size:13px; margin:auto; font-weight:600;">Нажимай на варианты ниже...</span>';
            return;
        }
        selectedAnswers.forEach((item) => {
            const el = document.createElement('div');
            if (wrongItemsList.includes(item)) {
                el.className = 'preview-item wrong-item';
            } else {
                el.className = 'preview-item';
            }
            el.innerText = item;
            el.onclick = () => removeItem(item);
            zone.appendChild(el);
        });
    }

    function checkAnswer() {
        const currentItem = DISHES_DB[currentQuestionIndex];
        const sortedSelected = [...selectedAnswers].sort();
        const sortedCorrect = [...currentItem.correct].sort();
        const isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        
        isCheckedMode = true;
        document.getElementById('reset-btn').disabled = true;

        document.getElementById('normal-actions-row').style.display = 'none';
        document.getElementById('after-check-row').style.display = 'flex';

        const wrongSelectedItems = [];

        if (isCorrect) {
            playSuccessSound(); // Победный аккорд
            currentQuestionIndex++;
        } else {
            playErrorSound(); // Звук ошибки
            currentItem.pool.forEach(item => {
                const btn = buttonMapping[item];
                const userSelected = selectedAnswers.includes(item);
                const shouldBeSelected = currentItem.correct.includes(item);

                if (userSelected && !shouldBeSelected) {
                    wrongSelectedItems.push(item);
                    if (btn) {
                        btn.style.opacity = '0.2';
                        btn.style.pointerEvents = 'none';
                    }
                } else if (!userSelected && shouldBeSelected) {
                    if (btn) btn.className = 'ing-btn error-missing';
                } else {
                    if (btn) {
                        btn.style.opacity = '0.2';
                        btn.style.pointerEvents = 'none';
                    }
                }
            });
        }
        
        renderPreview(wrongSelectedItems);
    }

    function retryQuestion() {
        playClickSound();
        initQuestion();
    }

    function nextQuestion() {
        playClickSound();
        const currentItem = DISHES_DB[currentQuestionIndex];
        const sortedSelected = [...selectedAnswers].sort();
        const sortedCorrect = [...currentItem.correct].sort();
        const wasCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        
        if (!wasCorrect) {
            currentQuestionIndex++;
        }
        initQuestion();
    }

    loadDishes();
</script>
</body>
</html>
