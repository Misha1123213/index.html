<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТТК Академия 🦉</title>
    <style>
        body { background-color: #131924; color: white; font-family: sans-serif; display: flex; justify-content: center; margin: 0; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; text-align: center; }
        .section-btn { display: block; width: 100%; padding: 20px; margin: 15px 0; background: #334155; border: 4px solid #475569; border-radius: 16px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .section-btn:hover { background: #475569; transform: translateY(-3px); }
        .levels-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .level-node { width: 60px; height: 60px; border-radius: 50%; background: #334155; border: 4px solid #475569; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: #94a3b8; }
        .level-node.unlocked { background: #58cc02; border-color: #46a302; color: white; }
        .ing-btn { background: #334155; color: white; border: 2px solid #475569; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .ing-btn.selected { background: #38bdf8; border-color: #38bdf8; }
        #progress-bar-bg { width: 100%; height: 10px; background: #334155; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { height: 100%; background: #58cc02; width: 0%; transition: width 0.5s; }
        .action-btn { width: 100%; padding: 15px; border-radius: 10px; background: #58cc02; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <h2>Выбери направление:</h2>
    <button class="section-btn" onclick="selectSection('kitchen')">🍳 Кухня</button>
    <button class="section-btn" onclick="selectSection('desserts')">🍰 Десерты</button>
    <button class="section-btn" onclick="selectSection('drinks')">🍹 Напитки</button>
</div>
<script>
    let allData = [];
    let currentLevel = [];
    let currentIndex = 0;
    let mistakes = [];
    let lives = 3;

    function getApp() {
        return document.getElementById('app');
    }

    function renderScreen(html) {
        getApp().innerHTML = html;
    }

    function goHome() {
        location.reload();
    }

    function backButton(label = 'Назад') {
        return `<button class="section-btn" onclick="goHome()">${label}</button>`;
    }

    function actionButton(text, onclick) {
        return `<button onclick="${onclick}" class="action-btn">${text}</button>`;
    }

    function createIngredientButton(label) {
        const btn = document.createElement('button');
        btn.innerText = label;
        btn.className = 'ing-btn';
        btn.onclick = () => btn.classList.toggle('selected');
        return btn;
    }

    function getSelectedIngredients() {
        return Array.from(document.querySelectorAll('.ing-btn.selected')).map(b => b.innerText);
    }

    function initLevel(questions) {
        currentLevel = questions;
        currentIndex = 0;
        showQuestion();
    }

    async function selectSection(section) {
        const fileName = (section === 'kitchen') ? 'dishes.json' : `${section}.json`;
        renderScreen("<h2>Загрузка...</h2>");
        try {
            const response = await fetch(fileName);
            allData = await response.json();
            renderLevels(section);
        } catch (e) {
            renderScreen(`<h2>Ошибка загрузки ${fileName}</h2>${backButton()}`);
        }
    }

    function renderLevels(sectionName) {
        renderScreen(`<h2>${sectionName.toUpperCase()}</h2><div class="levels-grid" id="levels-container"></div>${backButton()}`);
        const container = document.getElementById('levels-container');
        const total = Math.ceil(allData.length / 10);
        for (let i = 0; i < total; i++) {
            const div = document.createElement('div');
            div.className = 'level-node unlocked';
            div.innerText = i + 1;
            div.onclick = () => startLevel(i);
            container.appendChild(div);
        }
    }

    function startLevel(idx) {
        lives = 3;
        initLevel(allData.slice(idx * 10, idx * 10 + 10));
    }

    function showQuestion() {
        const q = currentLevel[currentIndex];
        const progress = (currentIndex / currentLevel.length) * 100;

        renderScreen(`
            <div id="lives-display" style="color: #f43f5e; font-weight: bold; margin-bottom: 10px;">${"❤️".repeat(lives)}</div>
            <div id="progress-bar-bg"><div id="progress-bar" style="width: ${progress}%"></div></div>
            <h3 style="color:white;">${q.name}</h3>
            <div id="ing-container" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
            ${actionButton('Проверить', 'checkAnswer()')}
        `);

        const container = document.getElementById('ing-container');
        q.pool.forEach(ing => container.appendChild(createIngredientButton(ing)));
    }

    function checkAnswer() {
        const q = currentLevel[currentIndex];
        const selected = getSelectedIngredients();
        const isCorrect = q.correct.length === selected.length && q.correct.every(val => selected.includes(val));

        if (!isCorrect) {
            lives--;
            if (!mistakes.includes(q.id)) mistakes.push(q.id);
            if (lives <= 0) {
                alert("Жизни кончились!");
                goHome();
                return;
            }
        } else {
            mistakes = mistakes.filter(id => id !== q.id);
        }

        renderScreen(`
            <h3>${isCorrect ? "✅ Верно!" : "❌ Ошибка!"}</h3>
            <p>Правильно: ${q.correct.join(', ')}</p>
            ${actionButton('Дальше', 'nextQuestion()')}
        `);
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentLevel.length) {
            showQuestion();
        } else {
            finishLevel();
        }
    }

    function finishLevel() {
        renderScreen(`
            <h3>Уровень пройден!</h3>
            ${mistakes.length > 0 ? `<button onclick="startMistakes()" class="section-btn" style="background:#f43f5e">Закрепить ошибки (${mistakes.length})</button>` : ""}
            ${backButton('В главное меню')}
        `);
    }

    function startMistakes() {
        const mistakeQuestions = allData.filter(q => mistakes.includes(q.id));
        mistakes = [];
        initLevel(mistakeQuestions);
    }
</script>
