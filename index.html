<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТТК Академия 🦉</title>
    <style>
        .levels-path {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}
.level-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #334155;

    align-items: center;

        /* Контейнер пути */
.levels-path {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
}

/* Стиль уровня-кружочка */
.level-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #334155;
    border: 4px solid #475569;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
}
.level-circle.active { background: #58cc02; border-color: #46a302; }
.level-circle.locked { opacity: 0.5; pointer-events: none; }

/* Иконки сундуков или декора */
.path-item { position: relative; }
        /* Стиль карточек-ингредиентов (как в Duolingo) */
.ingredients-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
.ing-btn { 
    background: #ffffff; 
    border: 2px solid #e5e7eb; 
    border-bottom: 4px solid #e5e7eb; /* Эффект объема */
    color: #4b5563; 
    padding: 12px 18px; 
    border-radius: 12px; 
    cursor: pointer; 
    font-weight: 600; 
    transition: all 0.1s;
}
.ing-btn.selected { 
    background: #ddf4ff; 
    border-color: #38bdf8; 
    border-bottom-color: #38bdf8;
    color: #0369a1;
}
/* Верхняя полоска жизней и прогресса */
.game-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
.lives { color: #f43f5e; font-weight: bold; font-size: 18px; }
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: #1e293b; width: 100%; max-width: 440px; border-radius: 20px; padding: 24px; }
        .hidden { display: none; }
        
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.3s; }
        
        .dish-name { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .ing-btn { background: #334155; border: 2px solid #475569; color: white; padding: 10px; margin: 4px; border-radius: 8px; cursor: pointer; }
        .ing-btn.selected { border-color: #38bdf8; background: #0ea5e9; }
        
        /* Стили для встроенного результата */
        #result-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .success { background: #064e3b; border: 1px solid #10b981; color: #34d399; }
        .error { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; }
        
        .action-btn { width: 100%; background: #38bdf8; border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .level-btn { width: 100%; background: #334155; color: white; border: none; padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h2 style="text-align:center;">ТТК Академия 🦉</h2>
        <div id="levels-container"></div>
    </div>
    
   <div id="game-screen" class="hidden">
    <div class="game-header">
        <div style="flex-grow: 1; height: 12px; background: #e5e7eb; border-radius: 6px;">
            <div id="progress-fill" style="height: 100%; background: #58cc02; width: 0%; border-radius: 6px;"></div>
        </div>
        <div class="lives" id="lives-display">❤️ 3</div>
    </div>

    <div id="dish-name" style="font-size: 22px; font-weight: 800; margin: 20px 0;"></div>
    <div id="ingredients-container" class="ingredients-container"></div>
    
    <button id="check-btn" class="action-btn">Проверить</button>
    <div id="result-box" class="hidden"></div>
    <button id="next-btn" class="action-btn hidden">Продолжить</button>
</div>
    
</div>

<script>
    let data = [], currentLevel = [], currentIndex = 0, selected = [];

    // 1. Инициализация: загружаем данные и рисуем стартовую кнопку "Кухня"
    async function init() {
        const res = await fetch('dishes.json');
        data = await res.json();
        const container = document.getElementById('levels-container');
        container.innerHTML = '';
        
        // Кнопка для входа в список уровней
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.innerText = `🔍 КУХНЯ (${data.length} позиций)`;
        btn.onclick = () => renderLevelMap(); // При клике рисуем карту уровней
        container.appendChild(btn);
    }

    // 2. Рисуем карту уровней (как в Дуолинго)
    function renderLevelMap() {
        const container = document.getElementById('levels-container');
        container.innerHTML = '';
        container.className = 'levels-path'; // Добавим этот класс в CSS для вертикальной змейки
        
        const totalLevels = Math.ceil(data.length / 10);
        for(let i = 0; i < totalLevels; i++) {
            const circle = document.createElement('div');
            circle.className = 'level-circle';
            circle.innerText = i + 1;
            circle.onclick = () => startLevel(i);
            container.appendChild(circle);
        }
    }

    // 3. Запуск конкретного уровня
    function startLevel(idx) {
        currentLevel = data.slice(idx * 10, idx * 10 + 10);
        currentIndex = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    // 4. Логика вопросов (showQuestion и проверка)
    // ... здесь оставь свой текущий код для showQuestion и проверки ответов ...
    
    init();
</script>
</body>
</html>
