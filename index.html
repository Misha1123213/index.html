function recordAnswer(itemName, correct) {
    const p = getProgress();
    if (!p.itemStrength) p.itemStrength = {};
    const s = p.itemStrength[itemName] || { strength: 3, attempts: 0 };
    s.attempts++;
    if (correct) {
        s.strength = Math.min(5, s.strength + 1);
        p.totalCorrect = (p.totalCorrect || 0) + 1;
    } else {
        s.strength = Math.max(0, s.strength - 1.5);
    }
    s.lastSeen = Date.now();
    p.itemStrength[itemName] = s;
    saveProgress(p);
}
function getWeakItems(section) {
    const p = getProgress();
    if (!p.itemStrength) return [];
    const ad = getAdaptiveData();
    const weakCats = getWeakBuckets(ad.categories, 3);
    const sectionData = state.allData;
    return sectionData
        .filter(d => {
            const s = p.itemStrength[d.name];
            return s && s.strength < 3;
        })
        .map(d => {
            const s = p.itemStrength[d.name];
            let penalty = 0;
            const cats = getQuestionCategories({ pool: d._ingredients || [] });
            for (const c of cats) {
                if (weakCats.includes(c)) penalty += 0.4;
            }
            return { item: d, effectiveStrength: s.strength - penalty };
        })
        .sort((a, b) => a.effectiveStrength - b.effectiveStrength)
        .map(x => x.item);
}

// ====================== ADAPTIVE ENGINE ======================
const FORMATS = ['logical', 'missing', 'color_coded', 'spatial', 'photo'];
const QUESTION_TYPES = ['select', 'missing', 'truefalse', 'color_fill', 'photo'];

function getEnabledQuestionFormats() {
    const all = ['logical', 'missing', 'color_coded', 'spatial', 'photo'];
    const settings = (typeof getVenueSettings === 'function') ? getVenueSettings() : {};
    const formats = settings.formats || {};
    const enabled = all.filter(f => formats[f] !== false);
    return enabled.length ? enabled : all;
}
const EMA_ALPHA = 0.25; // higher = faster reaction to recent answers

function getAdaptiveData() {
    const p = getProgress();
    if (!p.adaptive) p.adaptive = {
        totalQuestions: 0,
        formats: {},
        types: {},
        categories: {},
        globalHistory: []
    };
    // migrate old storage that lacks new sections
    if (!p.adaptive.types) p.adaptive.types = {};
    if (!p.adaptive.categories) p.adaptive.categories = {};
    if (!p.adaptive.globalHistory) p.adaptive.globalHistory = [];
    for (const f of FORMATS) {
        if (!p.adaptive.formats[f]) {
            p.adaptive.formats[f] = { correct: 0, attempts: 0, totalTime: 0, emaAccuracy: null, emaTime: null };
        }
    }
    return p.adaptive;
}

function saveAdaptiveData(ad) {
    const p = getProgress();
    p.adaptive = ad;
    saveProgress(p);
}

function updateBucket(bucket, correct, timeTaken) {
    bucket.attempts++;
    if (correct) bucket.correct++;
    bucket.totalTime += timeTaken;
    const acc = correct ? 1 : 0;
    if (bucket.emaAccuracy == null) {
        bucket.emaAccuracy = acc;
        bucket.emaTime = timeTaken;
    } else {
        bucket.emaAccuracy = bucket.emaAccuracy * (1 - EMA_ALPHA) + acc * EMA_ALPHA;
        bucket.emaTime = bucket.emaTime * (1 - EMA_ALPHA) + timeTaken * EMA_ALPHA;
    }
}

function getQuestionCategories(q) {
    const cats = new Set();
    const source = (q && (q.pool || q.choices || q.shown || (q.item && q.item._ingredients))) || [];
    for (const ing of source) {
        if (ing) cats.add(getCategory(ing));
    }
    return Array.from(cats);
}

function recordAdaptiveAnswer(format, correct, timeTaken, q) {
    const ad = getAdaptiveData();
    ad.totalQuestions++;

    // format
    updateBucket(ad.formats[format], correct, timeTaken);

    // type
    const type = (q && q.type) || 'select';
    if (!ad.types[type]) ad.types[type] = { correct: 0, attempts: 0, totalTime: 0, emaAccuracy: null, emaTime: null };
    updateBucket(ad.types[type], correct, timeTaken);

    // categories of ingredients shown in the question
    const cats = getQuestionCategories(q);
    for (const cat of cats) {
        if (!ad.categories[cat]) ad.categories[cat] = { correct: 0, attempts: 0, totalTime: 0, emaAccuracy: null, emaTime: null };
        updateBucket(ad.categories[cat], correct, timeTaken);
    }

    // global accuracy history for mini-chart
    ad.globalHistory.push(correct ? 1 : 0);
    if (ad.globalHistory.length > 40) ad.globalHistory.shift();

    saveAdaptiveData(ad);
}

function recordFormatAnswer(format, correct, timeTaken) {
    // keep signature unchanged; pull current question from state
    const q = state.questions[state.currentQIdx];
    recordAdaptiveAnswer(format, correct, timeTaken, q);
}

function getBucketScore(bucket) {
    if (!bucket || bucket.attempts === 0) return 0;
    const rawAccuracy = bucket.correct / bucket.attempts;
    const emaAccuracy = bucket.emaAccuracy != null ? bucket.emaAccuracy : rawAccuracy;
    // mix raw and EMA so long-term accuracy still matters, but recent form shifts score faster
    const accuracy = (rawAccuracy + emaAccuracy) / 2;
    const time = bucket.emaTime != null ? bucket.emaTime : (bucket.totalTime / bucket.attempts);
    return accuracy * (1 / Math.max(time, 0.5));
}

function getFormatScore(format) {
    const ad = getAdaptiveData();
    return getBucketScore(ad.formats[format]);
}

function getExplorationScore(format) {
    const fd = getAdaptiveData().formats[format];
    const base = getFormatScore(format);
    // Boost formats with few attempts so calibration never stops and weak formats keep getting sampled
    const usageBonus = fd.attempts === 0 ? 0.5 : (0.15 / fd.attempts);
    return base + usageBonus;
}

function getWeakBuckets(obj, minAttempts = 3) {
    const list = [];
    for (const [key, b] of Object.entries(obj || {})) {
        if (b.attempts >= minAttempts) {
            list.push({ key, score: getBucketScore(b), attempts: b.attempts });
        }
    }
    list.sort((a, b) => a.score - b.score);
    return list.slice(0, 4).map(x => x.key);
}

function pickFormat() {
    const enabled = getEnabledQuestionFormats();
    const scores = enabled.map(f => ({ format: f, score: getExplorationScore(f) }));
    scores.sort((a, b) => b.score - a.score);
    const dominant = scores[0].format;
    const weakest = scores[scores.length - 1].format;
    const r = Math.random();
    if (r < 0.6) return dominant;          // play to strength
    if (r < 0.8) return weakest;            // deliberate training of weak format
    return enabled[Math.floor(Math.random() * enabled.length)];
}

function getDominantFormat() {
    const scores = FORMATS.map(f => ({ format: f, score: getFormatScore(f) }));
    scores.sort((a, b) => b.score - a.score);
    return scores[0];
}

function getFormatLabel(f) {
    const labels = {
        logical: 'РӣРҫРіРёСҮРөСҒРәРёР№',
        missing: 'РЎ РҝСҖРҫРҝСғСҒРәР°РјРё',
        color_coded: 'Р’РёР·СғР°Р»СҢРҪСӢР№',
        spatial: 'РҹСҖРҫСҒСӮСҖР°РҪСҒСӮРІРөРҪРҪСӢР№',
        photo: 'РҹРҫ С„РҫСӮРҫ'
    };
    return labels[f] || f;
}

function getFormatDescription(f) {

function getDishCategory(name) {

    if (n.includes('СҒСғРҝ') || n.includes('РұСғР»СҢРҫРҪ') || n.includes('РҫСҖР·Рҫ') || n.includes('РҪСҢРҫРәРәРё') || n.includes('СҒР°Р»Р°СӮ') || n.includes('СүС‘СҮРәРё') || n.includes('СүРөСҮРәРё')) return { label: 'РһРұРөРҙ', cls: 'lunch' };
    if (n.includes('РәР°СҲР°') || n.includes('СҒСӢСҖРҪРёРә') || n.includes('СҲР°РәСҲСғРәР°') || n.includes('Р·Р°РІСӮСҖР°Рә') || n.includes('СҒРәСҖСҚРјРұР»') || n.includes('РұРөРҪРөРҙРёРәСӮ') || n.includes('РҙСҖР°РҪРҪРёРә') || n.includes('С„СҖРөРҪСҮ-СӮРҫСҒСӮ') || n.includes('РіСҖРөСҮРәР°')) return { label: 'Р—Р°РІСӮСҖР°Рә', cls: 'breakfast' };

// ====================== CHAPTER PROGRESS ======================
function getChapterTotals() {
    const chapters = {
        kitchen: { file: 'dishes.json', label: 'РҡСғС…РҪСҸ' },
        desserts: { file: 'desserts.json', label: 'Р”РөСҒРөСҖСӮСӢ' },
        drinks: { file: 'drinks.json', label: 'РқР°РҝРёСӮРәРё' },
        drink_pf: { file: 'drink_pf.json', label: 'РҹРӨ РқР°РҝРёСӮРәРҫРІ' },
        kitchen_pf: { file: 'kitchen_pf.json', label: 'РҹРӨ РҡСғС…РҪРё' }
    };
    if (state.venue && state.venue.sections) {
        for (const section of state.venue.sections) {
            chapters['venue_' + section.id] = { file: null, label: `${section.name || 'Р Р°Р·РҙРөР»'}` };
        }
    } else if (state.venue) {
        chapters.venue_progress = { file: null, label: `${state.venue.name || 'Р—Р°РІРөРҙРөРҪРёРө'}` };
    }
    return chapters;
}

function getChapterProgress() {
    const p = getProgress();
    const chapters = getChapterTotals();
    const result = {};
    for (const [key, info] of Object.entries(chapters)) {
        const sp = p[key] || {};
        let completed = 0;
        let total = 0;
        for (const k of Object.keys(sp)) {
            if (k.startsWith('lesson_')) {
                total++;
                if (sp[k].completed) completed++;
            }
        }
        result[key] = { completed, total, label: info.label };
    }
    return result;
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// Normalize item data: handle both old format (correct: string[], pool: string[])
// and new format (correct: [{ingredient, grams}], wrong: string[])
function normalizeItem(item) {
    if (!item._normalized) {
        if (item.correct && item.correct.length > 0 && typeof item.correct[0] === 'object') {
            item._ingredients = item.correct.map(c => c.ingredient);
            item._grams = {};
            item._gramUnit = {};
            item.correct.forEach(c => { item._grams[c.ingredient] = c.grams; item._gramUnit[c.ingredient] = c.isCount ? 'СҲСӮ' : 'Рі'; });
            item._pool = [...item._ingredients, ...(item.wrong || [])];
            item._wrongPool = item.wrong || [];
            item._hasGrams = item.correct.some(c => (c.grams !== '' && c.grams !== undefined && c.grams !== null && Number(c.grams) > 0) || c.isCount);
        } else {
            item._ingredients = item.correct || [];
            item._grams = {};
            item._gramUnit = {};
            item._pool = item.pool || [...(item.correct || []), ...(item.wrong || [])];
            item._wrongPool = (item.pool || []).filter(p => !(item.correct || []).includes(p));
            if (item.wrong) item._wrongPool = item.wrong;
            item._hasGrams = false;
        }
        item._image = item.image || null;
        item._normalized = true;
    }
    return item;
}

function getDishPhotoHTML(item, extraClass = 'dish-photo') {
    if (!item || !item._image) {
        return renderPhotoFallback(item, extraClass);
    }
    return `<img class="${extraClass}" src="${item._image}" alt="${item.name || ''}" onerror="replacePhotoFallback(this, '${extraClass}')">`;
}

function replacePhotoFallback(el, cls) {
    const name = el.alt || '';
    el.replaceWith(stringToElement(renderPhotoFallbackString(name, cls)));
}

function stringToElement(html) {
    const div = document.createElement('div');
    div.innerHTML = html.trim();
    return div.firstChild;
}

function renderPhotoFallback(item, cls = 'dish-photo') {
    return renderPhotoFallbackString(item ? item.name : '', cls);
}

function renderPhotoFallbackString(name, cls) {
    const cat = getSectionCategory(state.section) || (name ? getDishCategory(name) : null);
    const label = cat ? cat.label : 'Р‘Р»СҺРҙРҫ';
    const initial = (name && name[0]) || (label[0]) || '?';
    return `<div class="${cls} dish-photo-fallback"><span class="dish-fallback-emoji">${initial}</span><span class="dish-fallback-label">${label}</span></div>`;
}

    state.avatarEditor.emoji = emoji;

function backAvatarEditor() {
    if (!state.avatarEditor) return;
    if (state.avatarEditor.mode === 'onboarding') {
        state.avatarEditor = null;
        state.onboardingStep = 'nickname';
        state.onboardingAvatar = null;
        render();
    } else {
        state.avatarEditor = null;
        goBack();
    }
}

function saveAvatarEditor() {
    if (!state.avatarEditor || state.avatarEditor.mode !== 'edit') return;
    state.profile = { ...state.profile, avatar: state.avatarEditor.emoji || DEFAULT_AVATAR };
    saveProgress({ profile: state.profile });
    state.avatarEditor = null;
    goBack();
}

function finishOnboarding() {
    if (!state.onboardingNickname.trim()) return;
    const avatar = state.avatarEditor ? (state.avatarEditor.emoji || DEFAULT_AVATAR) : (state.onboardingAvatar || DEFAULT_AVATAR);
    state.profile = {
        nickname: state.onboardingNickname.trim(),
        avatar: avatar,
    };
    saveProgress({ profile: state.profile });
    state.avatarEditor = null;
    state.onboardingStep = 'nickname';
    replaceScreen('home');
}

    const users = names.map((n, i) => ({
        name: n,
        avatar: n[0].toUpperCase(),
        xp: Math.max(0, userXP + Math.floor((Math.random() - 0.5) * 1200)),

function buildWeakBucketsHTML(obj, labelFn) {
    const weak = [];
    for (const [key, b] of Object.entries(obj || {})) {
        if (b.attempts >= 3) {
            weak.push({ key, score: getBucketScore(b), accuracy: b.correct / b.attempts });
        }
    }
    weak.sort((a, b) => a.score - b.score);
    if (weak.length === 0) {
        return '<div class="weak-empty">РҹРҫРәР° РјР°Р»Рҫ РҙР°РҪРҪСӢС… вҖ” РҝСҖРҫРҙРҫР»Р¶Р°Р№СӮРө СӮСҖРөРҪРёСҖРҫРІР°СӮСҢСҒСҸ</div>';
    }
    return weak.slice(0, 4).map(w => `
        <div class="weak-badge">
            <span>${labelFn(w.key)}</span>
            <span class="weak-accuracy">${Math.round(w.accuracy * 100)}%</span>
        </div>
    `).join('');
}

function buildMiniGraphHTML(history) {
    if (!history || history.length < 5) {
        return '<div class="weak-empty">Р“СҖР°С„РёРә РҝРҫСҸРІРёСӮСҒСҸ РҝРҫСҒР»Рө 5 РҫСӮРІРөСӮРҫРІ</div>';
    }
    const width = 260;
    const height = 60;
    const pad = 4;
    const step = width / (history.length - 1);
    // rolling average window 5
    const rolling = [];
    for (let i = 0; i < history.length; i++) {
        const start = Math.max(0, i - 4);
        const slice = history.slice(start, i + 1);
        rolling.push(slice.reduce((a, b) => a + b, 0) / slice.length);
    }
    const points = rolling.map((v, i) => {
        const x = pad + i * step;
        const y = pad + (1 - v) * (height - 2 * pad);
        return `${x},${y}`;
    }).join(' ');
    const startY = pad + (1 - rolling[0]) * (height - 2 * pad);
    const endY = pad + (1 - rolling[rolling.length - 1]) * (height - 2 * pad);
    return `
        <svg class="mini-graph" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
            <polyline fill="none" stroke="var(--gold)" stroke-width="2" points="${points}"/>
            <circle cx="${pad}" cy="${startY}" r="2.5" fill="var(--gold)"/>
            <circle cx="${width - pad}" cy="${endY}" r="2.5" fill="var(--gold)"/>
        </svg>
        <div class="mini-graph-labels">
            <span>${Math.round(rolling[0] * 100)}%</span>
            <span>вҶ’</span>
            <span>${Math.round(rolling[rolling.length - 1] * 100)}%</span>
        </div>
    `;
}

function toggleSetting(key, btn) {
    const next = updateSetting(key, !getSettings()[key]);
    const on = next[key];
    btn.classList.toggle('on', on);
    btn.setAttribute('aria-checked', on ? 'true' : 'false');
    if (key === 'animations') applyAnimationPref();
    // Give immediate feedback so the user can hear/feel the change.

async function selectSection(section) {

        desserts: 'Р”РөСҒРөСҖСӮСӢ',
        drinks: 'РқР°РҝРёСӮРәРё',
        drink_pf: 'РҹРӨ РқР°РҝРёСӮРәРҫРІ',
        kitchen_pf: 'РҹРӨ РҡСғС…РҪРё'

    state.sectionLabel = labels[section] || section;
    state.isDrinksChapter = (section === 'drinks' || section === 'drink_pf');

    app.innerHTML = `<div class="loading-screen"><div class="loader"></div><p>Р—Р°РіСҖСғР·РәР°...</p></div>`;

    const fileMap = {
        kitchen: 'dishes.json',
        desserts: 'desserts.json',
        drinks: 'drinks.json',
        drink_pf: 'drink_pf.json',
        kitchen_pf: 'kitchen_pf.json'
    };
    const fileName = fileMap[section];
    try {
        const response = await fetch(fileName);
        if (!response.ok) throw new Error('File not found');
        const data = await response.json();
        state.allData = data.map(normalizeItem);
        buildLessons();
        goToScreen('path');
    } catch (e) {

            </div>
        `;
    }
}

function buildLessons() {
    const data = state.allData;
    const lessonSize = 8;
    const reviewCount = 2;
    state.lessons = [];
    for (let i = 0; i < data.length; i += lessonSize) {
        let lessonItems = data.slice(i, i + lessonSize);
        if (i > 0 && lessonItems.length >= lessonSize) {
            const prevItems = data.slice(0, i);
            const existing = new Set(lessonItems.map(d => d.name));
            const candidates = prevItems.filter(d => !existing.has(d.name));
            const reviewItems = shuffle(candidates).slice(0, reviewCount);
            lessonItems = lessonItems.slice(0, lessonSize - reviewCount).concat(reviewItems);
        }
        state.lessons.push(lessonItems);
    }
}

// ====================== QUESTION GENERATION ======================
function getAllIngredients() {
    const allIngredientsSet = new Set();
    (state.allData || []).forEach(d => {
        const nd = normalizeItem(d);
        nd._ingredients.forEach(i => allIngredientsSet.add(i));
        (nd._wrongPool || []).forEach(i => allIngredientsSet.add(i));
        (nd._pool || []).forEach(i => allIngredientsSet.add(i));
    });
    return [...allIngredientsSet];
}

function buildWrongPool(nd, allIngredients) {
    const correctSet = new Set(nd._ingredients);
    let wrongPool = (nd._wrongPool || []).filter(p => !correctSet.has(p));
    if (wrongPool.length < 4) {
        const extra = allIngredients.filter(i => !correctSet.has(i) && !wrongPool.includes(i));
        wrongPool = wrongPool.concat(shuffle(extra).slice(0, 5 - wrongPool.length));
    }
    if (wrongPool.length < 4) {
        const generic = GENERIC_DISTRACTORS.filter(i => !correctSet.has(i) && !wrongPool.includes(i));
        wrongPool = wrongPool.concat(shuffle(generic).slice(0, 6 - wrongPool.length));
    }
    return wrongPool;
}

function gramSettingsFor(nd) {
    const venueSettings = (typeof getVenueSettings === 'function') ? getVenueSettings() : { showGrams: false, requireGrams: false };
    const fallback = !state.venue && state.isDrinksChapter;
    const showGrams = nd._hasGrams && (venueSettings.showGrams !== false || fallback);
    const requireGrams = showGrams && (venueSettings.requireGrams !== false || fallback);
    return { showGrams, requireGrams };
}

function buildBasicSelect(nd, wrongPool) {
    const correctCount = nd._ingredients.length;
    const minDistractors = Math.max(2, Math.ceil(correctCount * 0.4));
    const target = correctCount + minDistractors;
    const pool = [...nd._ingredients];
    const used = new Set(nd._ingredients);
    const remaining = target - pool.length;
    if (remaining > 0) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i)).slice(0, remaining);
        pool.push(...extra);
    }
    const { showGrams, requireGrams } = gramSettingsFor(nd);
    return {
        type: 'select',
        item: nd,
        pool: shuffle(pool),
        format: 'logical',
        showGrams,
        requireGrams,
    };
}

function buildRemediationSet(item, allIngredients) {
    const nd = normalizeItem(item);
    const wrongPool = buildWrongPool(nd, allIngredients);
    const enabled = getEnabledQuestionFormats();
    const typeMap = { missing: 'missing', color_fill: 'color_coded', spatial: 'spatial' };
    let order = shuffle(['missing', 'color_fill', 'spatial']).filter(t => enabled.includes(typeMap[t]));
    if (!order.length) order = ['missing', 'color_fill', 'spatial'];
    const questions = [];
    for (const type of order) {
        let q = null;
        if (type === 'missing') q = buildQuestionByFormat('missing', nd, wrongPool, allIngredients);
        else if (type === 'color_fill') q = buildQuestionByFormat('color_coded', nd, wrongPool, allIngredients);
        else if (type === 'spatial') q = buildQuestionByFormat('spatial', nd, wrongPool, allIngredients);
        if (!q) q = buildQuestionByFormat('logical', nd, wrongPool, allIngredients);
        if (q) questions.push(q);
    }
    return questions;
}

function generateQuestions(items) {
    const questions = [];
    const allIngredients = getAllIngredients();

    for (const item of shuffle(items)) {
        const nd = normalizeItem(item);
        const wrongPool = buildWrongPool(nd, allIngredients);

        let q = buildQuestionByFormat(pickFormat(), nd, wrongPool, allIngredients);
        if (!q) {
            for (const f of getEnabledQuestionFormats()) {
                q = buildQuestionByFormat(f, nd, wrongPool, allIngredients);
                if (q) break;
            }
        }
        if (!q) q = buildQuestionByFormat('logical', nd, wrongPool, allIngredients);

        if (q) questions.push(q);
    }

    return shuffle(questions);
}

function buildColorFillQuestion(nd, wrongPool, allIngredients) {
    const byCat = {};
    nd._ingredients.forEach(ing => {
        const cat = getColorCategory(ing);
        if (!byCat[cat]) byCat[cat] = [];
        byCat[cat].push(ing);
    });

    const missingByCat = {};
    const shownByCat = {};
    const missing = [];
    let totalSlots = 0;

    for (const [cat, ings] of Object.entries(byCat)) {
        if (ings.length < 2) continue;
        const maxMissing = Math.min(2, ings.length - 1);
        const count = maxMissing === 1 ? 1 : (Math.random() < 0.5 ? 1 : 2);
        const shuffled = shuffle(ings);
        missingByCat[cat] = shuffled.slice(0, count);
        shownByCat[cat] = shuffled.slice(count);
        missing.push(...missingByCat[cat]);
        totalSlots += count;
    }

    for (const [cat, ings] of Object.entries(byCat)) {
        if (!shownByCat[cat]) shownByCat[cat] = [...ings];
    }

    if (missing.length < 1) return null;

    const used = new Set([...nd._ingredients, ...missing]);
    const missingCats = Object.keys(missingByCat);
    let distractors = [];
    for (const cat of missingCats) {
        const candidates = allIngredients.filter(i => !used.has(i) && getColorCategory(i) === cat);
        distractors.push(...shuffle(candidates).slice(0, 2));
    }
    if (distractors.length < 3) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i) && !distractors.includes(i) && missingCats.includes(getColorCategory(i))).slice(0, 4 - distractors.length);
        distractors.push(...extra);
    }
    if (distractors.length < 3) {
        const generic = GENERIC_DISTRACTORS.filter(i => !used.has(i) && !distractors.includes(i) && missingCats.includes(getColorCategory(i)));
        distractors.push(...shuffle(generic).slice(0, 5 - distractors.length));
    }
    if (distractors.length === 0) return null;

    const choices = shuffle([...missing, ...distractors]);
    return {
        type: 'color_fill',
        item: nd,
        missingByCat,
        shownByCat,
        missing,
        choices,
        totalSlots,
        format: 'color_coded',
    };
}

function buildSpatialSelect(nd, wrongPool, allIngredients, format) {
    if (wrongPool.length < 2) return null;
    const correctCount = nd._ingredients.length;
    const minDistractors = Math.max(2, Math.ceil(correctCount * 0.4));
    const target = correctCount + minDistractors;

    const pool = [...nd._ingredients];
    const used = new Set(nd._ingredients);

    // Add at least one distractor into every zone so each column has a wrong option
    const correctByZone = {};
    nd._ingredients.forEach(ing => {
        const z = categorizeIngredient(ing);
        if (!correctByZone[z]) correctByZone[z] = [];
        correctByZone[z].push(ing);
    });
    for (const [zone, items] of Object.entries(correctByZone)) {
        const zoneDistractors = allIngredients.filter(i => !used.has(i) && categorizeIngredient(i) === zone);
        if (zoneDistractors.length > 0) {
            const d = shuffle(zoneDistractors)[0];
            pool.push(d);
            used.add(d);
        }
    }

    // Fill the rest with random distractors up to the target
    const remaining = target - pool.length;
    if (remaining > 0) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i)).slice(0, remaining);
        pool.push(...extra);
    }

    // Guarantee at least 2 distractors even if the pool above fell short
    const poolDistractors = pool.filter(i => !nd._ingredients.includes(i));
    if (poolDistractors.length < 2) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i)).slice(0, 2 - poolDistractors.length);
        pool.push(...extra);
    }

    const displayPool = shuffle(pool);
    const { showGrams, requireGrams } = gramSettingsFor(nd);
    return {
        type: 'select',
        item: nd,
        pool: displayPool,
        format: format,
        showGrams,
        requireGrams,
    };
}

function buildMissingQuestion(nd, wrongPool, format) {
    if (nd._ingredients.length <= 2 || wrongPool.length < 2) return null;
    const correctByCat = {};
    nd._ingredients.forEach(ing => {
        const cat = getCategory(ing);
        if (!correctByCat[cat]) correctByCat[cat] = [];
        correctByCat[cat].push(ing);
    });
    const catsWithMulti = Object.keys(correctByCat).filter(c => correctByCat[c].length > 1);
    if (catsWithMulti.length > 0) {
        const cat = catsWithMulti[Math.floor(Math.random() * catsWithMulti.length)];
        const catIngredients = correctByCat[cat];
        const missingIdx = Math.floor(Math.random() * catIngredients.length);
        const missingIng = catIngredients[missingIdx];
        const shown = nd._ingredients.filter(i => i !== missingIng);
        const distractors = shuffle(wrongPool).slice(0, 3);
        const choices = shuffle([missingIng, ...distractors]);
        return {
            type: 'missing',
            item: nd,
            shown: shown,
            missing: missingIng,
            missingCategory: cat,
            choices: choices,
            format: format,
            showGrams: false,
        };
    }

    const missingIdx = Math.floor(Math.random() * nd._ingredients.length);
    const missingIng = nd._ingredients[missingIdx];
    const shown = nd._ingredients.filter((_, i) => i !== missingIdx);
    const distractors = shuffle(wrongPool).slice(0, 3);
    const choices = shuffle([missingIng, ...distractors]);
    return {
        type: 'missing',
        item: nd,
        shown: shown,
        missing: missingIng,
        choices: choices,
        format: format,
        showGrams: false,
    };
}

function buildTrueFalseQuestion(nd, wrongPool, format) {
    if (wrongPool.length < 1) return null;
    const isTrue = Math.random() > 0.5;
    let ingredient;
    if (isTrue) {
        ingredient = nd._ingredients[Math.floor(Math.random() * nd._ingredients.length)];
    } else {
        ingredient = wrongPool[Math.floor(Math.random() * wrongPool.length)];
    }
    return {
        type: 'truefalse',
        item: nd,
        ingredient: ingredient,
        answer: isTrue,
        format: format,
        showGrams: false,
    };
}

function buildSimpleSelect(nd, wrongPool, format) {
    const { showGrams, requireGrams } = gramSettingsFor(nd);
    return {
        type: 'select',
        item: nd,
        pool: shuffle(nd._pool),
        format: format,
        showGrams,
        requireGrams,
    };
}

function buildPhotoQuestion(nd, wrongPool, allIngredients) {
    if (!nd._image) return null;
    const correctCount = nd._ingredients.length;
    const minDistractors = Math.max(3, Math.ceil(correctCount * 0.5));
    const correctSet = new Set(nd._ingredients);
    const used = new Set(nd._ingredients);
    let pool = [...nd._ingredients];

    // Prefer real wrong options from the menu
    let extras = [...wrongPool].filter(i => !correctSet.has(i) && !used.has(i));
    extras = shuffle(extras).slice(0, minDistractors);
    for (const e of extras) {
        pool.push(e);
        used.add(e);
    }

    // Pad with generic distractors if still not enough
    if (pool.length - correctCount < 3) {
        const generic = GENERIC_DISTRACTORS.filter(i => !correctSet.has(i) && !used.has(i));
        const needed = 4 - (pool.length - correctCount);
        for (const g of shuffle(generic).slice(0, needed)) {
            pool.push(g);
            used.add(g);
        }
    }

    return {
        type: 'photo',
        item: nd,
        pool: shuffle(pool),
        format: 'photo',
        showGrams: false,
        requireGrams: false,
    };
}

function buildQuestionByFormat(format, nd, wrongPool, allIngredients) {
    if (format === 'photo') return buildPhotoQuestion(nd, wrongPool, allIngredients) || buildBasicSelect(nd, wrongPool);
    if (format === 'color_coded') return buildColorFillQuestion(nd, wrongPool, allIngredients) || buildBasicSelect(nd, wrongPool);
    if (format === 'spatial') return buildSpatialSelect(nd, wrongPool, allIngredients, 'spatial') || buildBasicSelect(nd, wrongPool);
    if (format === 'missing') return buildMissingQuestion(nd, wrongPool, 'missing') || buildBasicSelect(nd, wrongPool);
    // logical
    let q = buildBasicSelect(nd, wrongPool);
    if (!q) q = buildTrueFalseQuestion(nd, wrongPool, 'logical');
    if (!q) q = buildSimpleSelect(nd, wrongPool, 'logical');
    return q;
}

function getColorHex(cat) {
    const map = { red: '#ff4444', white: '#ffffff', yellow: '#ffd700', orange: '#ff8c00', green: '#32cd32', blue: '#1e90ff', brown: '#8b4513', neutral: '#aaaaaa' };
    return map[cat] || '#aaaaaa';

function renderIngredientsForFormat(ingredients, format, isClickable, q) {
    if (format === 'color_coded') {
        return renderColorCoded(ingredients, isClickable, q);
    }
    if (format === 'spatial') {
        return renderSpatial(ingredients, isClickable, q);
    }
    return renderLogical(ingredients, isClickable, q);
}

function renderLogical(pool, isClickable, q) {
    const fb = state.feedbackShown;
    const correctSet = new Set(q.item._ingredients);
    return `<div class="options-grid">${pool.map((ing, idx) => {
        let cls = '';
        let gramHTML = '';
        if (fb) {
            const isCorrectIng = correctSet.has(ing);
            const wasSelected = state.selectedOptions.has(idx);
            if (isCorrectIng && wasSelected) cls = 'correct-reveal';
            else if (isCorrectIng && !wasSelected) cls = 'correct-unselected';
            else if (wasSelected) cls = 'wrong-selected';
            else { cls = 'wrong-reveal'; }
            if (q.showGrams && isCorrectIng && Number(q.item._grams[ing]) > 0) {
                const correctGram = q.item._grams[ing];
                const userGram = state.gramInputs[idx];
                const gramOk = userGram !== undefined && Math.abs(userGram - correctGram) <= 2;
                gramHTML = `<div class="gram-selector"><input class="gram-input ${gramOk ? 'gram-correct' : (wasSelected ? 'gram-wrong' : '')}" value="${userGram !== undefined ? userGram : ''}" disabled><span class="gram-unit">вҶ’ ${correctGram}${q.item._gramUnit[ing] || 'Рі'}</span></div>`;
            }
        } else {
            cls = state.selectedOptions.has(idx) ? 'selected' : '';
            if (q.requireGrams && Number(q.item._grams[ing]) > 0 && state.selectedOptions.has(idx)) {
                gramHTML = `<div class="gram-selector"><input class="gram-input" type="number" placeholder="${q.item._gramUnit[ing] || 'Рі'}" value="${state.gramInputs[idx] !== undefined ? state.gramInputs[idx] : ''}" onclick="event.stopPropagation()" oninput="setGram(${idx}, this.value)"><span class="gram-unit">${q.item._gramUnit[ing] || 'Рі'}</span></div>`;
            }
        }
        return `<button class="option-btn ${cls}" style="${cementStyle()}" onclick="${fb ? '' : `toggleOption(${idx})`}">${ing}${gramHTML}</button>`;
    }).join('')}</div>`;
}

function renderColorCoded(pool, isClickable, q) {

        base: ['РһСҒРҪРҫРІР°', 'cat-base'],

        for (const { ing, idx } of items) {
            let btnCls = '';

            if (fb) {

                else { btnCls = 'wrong-reveal'; }
                if (q.showGrams && isCorrectIng && Number(q.item._grams[ing]) > 0) {
                    const correctGram = q.item._grams[ing];
                    const userGram = state.gramInputs[idx];
                    const gramOk = userGram !== undefined && Math.abs(userGram - correctGram) <= 2;
                    gramHTML = `<div class="gram-selector"><input class="gram-input ${gramOk ? 'gram-correct' : (wasSelected ? 'gram-wrong' : '')}" value="${userGram !== undefined ? userGram : ''}" disabled><span class="gram-unit">вҶ’ ${correctGram}${q.item._gramUnit[ing] || 'Рі'}</span></div>`;
                }
            } else {
                btnCls = state.selectedOptions.has(idx) ? 'selected' : '';
                if (q.requireGrams && Number(q.item._grams[ing]) > 0 && state.selectedOptions.has(idx)) {
                    gramHTML = `<div class="gram-selector"><input class="gram-input" type="number" placeholder="${q.item._gramUnit[ing] || 'Рі'}" value="${state.gramInputs[idx] !== undefined ? state.gramInputs[idx] : ''}" onclick="event.stopPropagation()" oninput="setGram(${idx}, this.value)"><span class="gram-unit">${q.item._gramUnit[ing] || 'Рі'}</span></div>`;

                cls = state.selectedOptions.has(idx) ? 'selected' : '';
                if (q.requireGrams && Number(q.item._grams[ing]) > 0 && state.selectedOptions.has(idx)) {
                    gramHTML = `<div class="gram-selector"><input class="gram-input" type="number" placeholder="${q.item._gramUnit[ing] || 'Рі'}" value="${state.gramInputs[idx] !== undefined ? state.gramInputs[idx] : ''}" onclick="event.stopPropagation()" oninput="setGram(${idx}, this.value)"><span class="gram-unit">${q.item._gramUnit[ing] || 'Рі'}</span></div>`;
                }
            }
            html += `<button class="option-btn ${cls}" style="width:100%;margin-bottom:4px;${cementStyle()}" onclick="${fb ? '' : `toggleOption(${idx})`}">${ing}${gramHTML}</button>`;
        }
        html += `</div>`;
    }
    html += `</div>`;
    return html;
}

// ====================== LESSON RENDERING ======================
function renderLesson() {
    const q = state.questions[state.currentQIdx];
    if (!q) {
        finishLesson();
        return;
    }

    const fb = state.feedbackShown;
    const progressTotal = Math.max(state._phaseTotal || state.questions.length, state.currentQIdx + 1);
    const progress = ((state.currentQIdx + (fb ? 1 : 0)) / progressTotal) * 100;
    const heartsStr = String(state.hearts);
    const correctSet = new Set(q.item._ingredients);

    const venueSettings = (typeof getVenueSettings === 'function') ? getVenueSettings() : { speedMode: { enabled: false } };
    const speedMode = venueSettings.speedMode || { enabled: false, timeLimit: 15 };
    const speedEnabled = !fb && speedMode.enabled;

    if (state._timerInterval) { clearInterval(state._timerInterval); state._timerInterval = null; }
    let timerPct = 100;
    if (speedEnabled) {
        const limit = Math.max(5, Number(speedMode.timeLimit) || 15) * 1000;
        const start = Date.now();
        state._timerInterval = setInterval(() => {
            if (state.screen !== 'lesson' || state.feedbackShown) { clearInterval(state._timerInterval); state._timerInterval = null; return; }
            const elapsed = Date.now() - start;
            const pct = Math.max(0, 100 - (elapsed / limit) * 100);
            const fill = document.getElementById('timer-fill');
            if (fill) { fill.style.width = pct + '%'; if (pct < 25) fill.classList.add('low'); }
            if (elapsed >= limit) {
                clearInterval(state._timerInterval);
                state._timerInterval = null;
                handleQuestionTimeout();
            }
        }, 100);
    }

    let questionHTML = '';
    let resultStripHTML = '';

    if (fb) {
        const ic = state._lastCorrect;
        let extraInfo = '';
        if (!ic && q.requireGrams) {
            extraInfo = ' (РҝСҖРҫРІРөСҖСҢСӮРө РіСҖР°РјРјРҫРІРәРё)';
        }
        const speedBonusText = ic && (state._lastSpeedBonus || 0) > 0 ? ` +${state._lastSpeedBonus} XP` : '';
        resultStripHTML = `<div class="inline-result ${ic ? 'correct' : 'wrong'}">
            ${ic ? 'Р’РөСҖРҪРҫ!' + speedBonusText : 'РқРөРІРөСҖРҪРҫ' + extraInfo}
        </div>`;
    }

    const catInfo = getSectionCategory(state.section) || getDishCategory(q.item.name);
    const categoryBadge = catInfo ? `<span class="category-badge ${catInfo.cls}">${catInfo.label}</span>` : '';
    const dishPhotoHTML = q.type === 'photo' && q.item._image
        ? `<img class="dish-photo" src="${q.item._image}" alt="" style="max-height:220px;width:auto;object-fit:cover;border-radius:10px;margin:10px auto;display:block;" onerror="this.style.display='none'">`
        : '';

    if (q.type === 'select' || q.type === 'photo') {
        const dishName = q.item.name;
        const ingredientsHTML = renderIngredientsForFormat(q.pool, q.format, !fb, q);
        const title = q.type === 'photo' ? `РҹРҫ С„РҫСӮРҫ СҒРҫРұРөСҖРё СҒРҫСҒСӮР°РІ:` : `Р’СӢРұРөСҖРё СҒРҫСҒСӮР°РІ:`;

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    ${dishPhotoHTML}
                    <div class="question-title">
                        ${title} <span class="question-dish-name">${dishName}</span>
                        ${q.requireGrams ? '<div style="font-size:12px;color:rgba(24,24,27,0.55);margin-top:4px">РЈРәР°Р¶РёСӮРө РіСҖР°РјРјРҫРІРәРё РҙР»СҸ РәР°Р¶РҙРҫРіРҫ РёРҪРіСҖРөРҙРёРөРҪСӮР°</div>' : ''}
                    </div>
                </div>
                ${resultStripHTML}
                ${ingredientsHTML}
            </div>
        `;
    } else if (q.type === 'missing') {
        const dishName = q.item.name;

        const byCat = {};
        q.shown.forEach(ing => {
            const cat = getCategory(ing);
            if (!byCat[cat]) byCat[cat] = [];
            byCat[cat].push(ing);
        });
        const missingCat = q.missingCategory || getCategory(q.missing);
        if (!byCat[missingCat]) byCat[missingCat] = [];

        const catLabels = { vegetable: 'РһРІРҫСүРё', fruit: 'РӨСҖСғРәСӮСӢ', berry: 'РҜРіРҫРҙСӢ', liquid: 'Р–РёРҙРәРҫСҒСӮРё', bulk: 'РЎСӢРҝСғСҮРөРө', other: 'Р”СҖСғРіРҫРө' };
        const cats = ['vegetable', 'fruit', 'berry', 'liquid', 'bulk', 'other'];

        const columnsHTML = cats.map(cat => {
            if (!byCat[cat]) return '';
            const items = byCat[cat].map(ing => `<span class="missing-item" style="${cementStyle()}">${ing}</span>`).join('');
            const missingSlot = missingCat === cat ? (fb
                ? `<span class="missing-item ${state._lastCorrect ? 'correct-reveal' : 'wrong-reveal'}">${q.missing}</span>`
                : `<span class="missing-slot">?</span>`) : '';
            return `<div class="sort-column" style="${cementStyle()}">
                <div class="sort-column-label">${catLabels[cat]}</div>
                <div class="sort-column-items">${items}${missingSlot}</div>
            </div>`;
        }).join('');

        const choicesHTML = q.choices.map((c, idx) => {
            let cls = '';
            if (fb) {
                if (c === q.missing) cls = 'correct-reveal';
                else { cls = 'wrong-reveal'; }
            } else {
                cls = state.selectedChoice === idx ? 'selected' : '';
            }
            return `<button class="choice-btn ${cls}" style="${cementStyle()}" onclick="${fb ? '' : `selectChoice(${idx})`}">${c}</button>`;
        }).join('');

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    ${dishPhotoHTML}
                    <div class="question-title">
                        Р§РөРіРҫ РҪРө С…РІР°СӮР°РөСӮ РІ <span class="question-dish-name">${dishName}</span>?
                    </div>
                </div>
                ${resultStripHTML}
                <div class="sort-columns">${columnsHTML}</div>
                <div class="choice-grid">${choicesHTML}</div>
            </div>
        `;
    } else if (q.type === 'color_fill') {
        const dishName = q.item.name;
        const cats = ['red', 'white', 'yellow', 'orange', 'green', 'blue', 'brown', 'neutral'];

        const selectedByCat = {};
        for (const idx of state.selectedOptions) {
            const ing = q.choices[idx];
            const cat = getColorCategory(ing);
            if (!selectedByCat[cat]) selectedByCat[cat] = [];
            selectedByCat[cat].push({ ing, idx });
        }

        const columnsHTML = cats.map(cat => {
            const shown = q.shownByCat[cat] || [];
            const slots = (q.missingByCat[cat] || []).length;
            if (shown.length === 0 && slots === 0) return '';
            const selected = selectedByCat[cat] || [];
            const colorClass = `color-cat-${cat}`;
            const hex = getColorHex(cat);
            const shownHTML = shown.map(ing => `<span class="option-btn ${colorClass} color-fill-tablet" style="${cementStyle()}">${ing}</span>`).join('');
            let slotsHTML = '';
            if (!fb) {
                for (let i = 0; i < slots; i++) {
                    if (selected[i]) {
                        slotsHTML += `<span class="option-btn ${colorClass} color-fill-tablet selected" style="${cementStyle()}">${selected[i].ing}</span>`;
                    } else {
                        slotsHTML += `<span class="option-btn ${colorClass} color-fill-tablet" style="border:2px dashed var(--concrete-dark); opacity:0.7;">?</span>`;
                    }
                }
            } else {
                const selectedIngSet = new Set(selected.map(s => s.ing));
                (q.missingByCat[cat] || []).forEach(ing => {
                    const isSelected = selectedIngSet.has(ing);
                    const bg = isSelected ? '#a8d5a2' : '#e8a8a5';
                    const col = isSelected ? '#1b5e20' : '#b71c1c';
                    slotsHTML += `<span class="option-btn color-fill-tablet" style="background:${bg};color:${col}; border:2px solid ${col};">${ing}</span>`;
                });
            }
            return `<div class="color-fill-column" style="border-color:${hex}">
                <div class="color-fill-header" style="background:${hex}"></div>
                <div class="color-fill-items">${shownHTML}${slotsHTML}</div>
            </div>`;
        }).join('');

        const choicesHTML = q.choices.map((c, idx) => {
            const cat = getColorCategory(c);
            const colorClass = `color-cat-${cat}`;
            let cls = '';
            if (fb) {
                if (q.missing.includes(c)) cls = 'correct-reveal';
                else { cls = 'wrong-reveal'; }
            } else {
                cls = state.selectedOptions.has(idx) ? 'selected' : '';
            }
            return `<button class="option-btn ${colorClass} color-fill-interactive ${cls}" style="${cementStyle()}" onclick="${fb ? '' : `toggleColorChoice(${idx})`}">${c}</button>`;
        }).join('');

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    ${dishPhotoHTML}
                    <div class="question-title">
                        Р”РҫРұР°РІСҢ РҪРөРҙРҫСҒСӮР°СҺСүРёРө РёРҪРіСҖРөРҙРёРөРҪСӮСӢ РІ <span class="question-dish-name">${dishName}</span>
                    </div>
                </div>
                ${resultStripHTML}
                <div class="color-fill-categories">${columnsHTML}</div>
                <div class="color-fill-choices">${choicesHTML}</div>
            </div>
        `;
    } else if (q.type === 'truefalse') {
        const dishName = q.item.name;

        let yesClass = 'tf-btn tf-yes';
        let noClass = 'tf-btn tf-no';
        if (fb) {
            yesClass += q.answer === true ? ' tf-correct' : ' tf-wrong';
            noClass += q.answer === false ? ' tf-correct' : ' tf-wrong';
            yesClass += ' disabled';
            noClass += ' disabled';
        }

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    ${dishPhotoHTML}
                    <div class="question-title">
                        <span class="question-dish-name">${q.ingredient}</span>
                        РІС…РҫРҙРёСӮ РІ <span class="question-dish-name">${dishName}</span>?
                    </div>
                </div>
                ${resultStripHTML}
                <div class="tf-buttons">
                    <button class="${yesClass}" style="${cementStyle()}" onclick="${fb ? '' : 'checkTFAnswer(true)'}">Р”Р°</button>
                    <button class="${noClass}" style="${cementStyle()}" onclick="${fb ? '' : 'checkTFAnswer(false)'}">РқРөСӮ</button>
                </div>
            </div>
        `;
    }

    const bottomBg = fb ? (state._lastCorrect ? '#a8d5a2' : '#e8a8a5') : '';
    const bottomColor = fb ? (state._lastCorrect ? '#1b5e20' : '#b71c1c') : '';
    const bottomHTML = fb
        ? `<div class="bottom-area">
            <button class="check-btn active" onclick="nextQuestion()" style="background:${bottomBg};color:${bottomColor}">
                ${state.hearts <= 0 ? 'Р РөР·СғР»СҢСӮР°СӮСӢ' : 'Р”Р°Р»СҢСҲРө'}
            </button>
           </div>`
        : (q.type === 'truefalse' ? '' : `<div class="bottom-area">
            <button class="check-btn ${(q.type === 'color_fill' ? state.selectedOptions.size === q.totalSlots : ((q.type === 'select' || q.type === 'photo') ? state.selectedOptions.size > 0 : state.selectedChoice !== null)) ? 'active' : 'disabled'}"
                    onclick="${(q.type === 'color_fill' ? (state.selectedOptions.size === q.totalSlots ? 'checkColorFillAnswer()' : '') : ((q.type === 'select' || q.type === 'photo') ? (state.selectedOptions.size > 0 ? 'checkSelectAnswer()' : '') : (state.selectedChoice !== null ? 'checkMissingAnswer()' : '')))}">
                РҹСҖРҫРІРөСҖРёСӮСҢ
            </button>
           </div>`);

    const timerBarHTML = speedMode.enabled ? `
        <div class="timer-bar" id="timer-bar">
            <div class="timer-fill" id="timer-fill" style="width:${timerPct}%"></div>
        </div>
    ` : '';

    app.innerHTML = `
        <div class="lesson-screen">
            <div class="lesson-header">
                <button class="close-btn" onclick="confirmQuit()">вң•</button>
                <div style="flex:1;display:flex;flex-direction:column;gap:4px">
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" style="width:${progress}%"></div>
                    </div>
                    ${timerBarHTML}
                </div>
                <div class="hearts-display" id="hearts-display">${heartsStr}</div>
            </div>
            ${questionHTML}
            ${bottomHTML}
        </div>
    `;

    if (fb && !state._lastCorrect) {
        const display = document.getElementById('hearts-display');
        if (display) display.classList.add('heart-break');
    }
}

function setGram(idx, value) {
    state.gramInputs[idx] = value === '' ? undefined : parseFloat(value);
}

function toggleOption(idx) {
    if (state.feedbackShown) return;
    if (state.selectedOptions.has(idx)) {
        state.selectedOptions.delete(idx);
        delete state.gramInputs[idx];
    } else {
        state.selectedOptions.add(idx);
    }
    tapFeedback();
    const btns = document.querySelectorAll('.option-btn');
    if (btns[idx]) {
        btns[idx].classList.add('crack-effect');
        setTimeout(() => btns[idx].classList.remove('crack-effect'), 400);
    }
    render();
}

function selectChoice(idx) {
    if (state.feedbackShown) return;
    state.selectedChoice = idx;
    tapFeedback();
    const btns = document.querySelectorAll('.choice-btn');
    if (btns[idx]) {
        btns[idx].classList.add('crack-effect');
        setTimeout(() => btns[idx].classList.remove('crack-effect'), 400);
    }
    render();
}

function toggleColorChoice(idx) {
    if (state.feedbackShown) return;
    const q = state.questions[state.currentQIdx];
    if (state.selectedOptions.has(idx)) {
        state.selectedOptions.delete(idx);
    } else {
        const ing = q.choices[idx];
        const cat = getColorCategory(ing);
        const catSlots = (q.missingByCat[cat] || []).length;
        const catSelected = [...state.selectedOptions].filter(i => getColorCategory(q.choices[i]) === cat).length;
        if (catSelected < catSlots) {
            state.selectedOptions.add(idx);
        }
    }
    tapFeedback();
    render();
}

// ====================== ANSWER CHECKING ======================
function checkSelectAnswer() {
    const q = state.questions[state.currentQIdx];
    const selectedItems = [...state.selectedOptions].map(i => q.pool[i]);
    const correctSet = new Set(q.item._ingredients);
    const selectedSet = new Set(selectedItems);
    let isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(c => selectedSet.has(c));

    // Check grams if applicable
    let gramsCorrect = true;
    if (q.requireGrams && isCorrect) {
        for (const idx of state.selectedOptions) {
            const ing = q.pool[idx];
            const correctGram = Number(q.item._grams[ing]);
            if (correctGram > 0) {
                const userGram = state.gramInputs[idx];
                const isCount = q.item._gramUnit[ing] === 'СҲСӮ';
                const tolerance = isCount ? 0 : 2;
                if (userGram === undefined || userGram === '' || Math.abs(Number(userGram) - correctGram) > tolerance) {
                    gramsCorrect = false;
                    break;
                }
            }
        }
        if (!gramsCorrect) isCorrect = false;
    }

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function checkMissingAnswer() {
    const q = state.questions[state.currentQIdx];
    const selected = q.choices[state.selectedChoice];
    const isCorrect = selected === q.missing;

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function checkTFAnswer(userAnswer) {
    const q = state.questions[state.currentQIdx];
    const isCorrect = userAnswer === q.answer;

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function checkColorFillAnswer() {
    const q = state.questions[state.currentQIdx];
    const selected = [...state.selectedOptions].map(i => q.choices[i]);
    const missingSet = new Set(q.missing);
    const selectedSet = new Set(selected);
    const isCorrect = selectedSet.size === missingSet.size && [...missingSet].every(m => selectedSet.has(m));

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function handleQuestionTimeout() {
    if (state.feedbackShown) return;
    const q = state.questions[state.currentQIdx];
    if (!q) return;
    const venueSettings = (typeof getVenueSettings === 'function') ? getVenueSettings() : { speedMode: { timeLimit: 15 } };
    const timeLimit = Number((venueSettings.speedMode && venueSettings.speedMode.timeLimit) || 15);
    processAnswer(false, q.item, q.format, timeLimit);
}

function processAnswer(isCorrect, item, format, timeTaken) {
    state.sessionTotal++;
    recordAnswer(item.name, isCorrect);
    recordFormatAnswer(format, isCorrect, timeTaken);
    saveTrainingResult(item.name, isCorrect, format, timeTaken);

    state._lastSpeedBonus = 0;
    if (isCorrect) {
        state.sessionCorrect++;
        state.sessionXP += 10;
        state._lastCorrect = true;

        const venueSettings = (typeof getVenueSettings === 'function') ? getVenueSettings() : { speedMode: { enabled: false } };
        const speedMode = venueSettings.speedMode || { enabled: false, timeLimit: 15 };
        if (speedMode.enabled && typeof timeTaken === 'number' && timeTaken < Number(speedMode.timeLimit || 15)) {
            const limit = Number(speedMode.timeLimit) || 15;
            const bonus = Math.max(0, Math.round((1 - timeTaken / limit) * 10));
            if (bonus > 0) {
                state.sessionXP += bonus;
                state._lastSpeedBonus = bonus;
            }
        }

        playSound('correct');
        haptic(40);
    } else {
        state.hearts--;
        state._lastCorrect = false;
        playSound('wrong');
        haptic([60, 50, 90]);
        if (!state.mistakeIds.includes(item.name)) {
            state.mistakeIds.push(item.name);
        }
        if (state.phase === 'basic' && !state.basicMistakeIds.includes(item.name)) {
            state.basicMistakeIds.push(item.name);
        }

        // Duolingo-style: immediate spaced reinforcement for the missed item
        const currentQ = state.questions[state.currentQIdx];
        if (state.phase === 'basic' && currentQ && !currentQ.isReinforce) {
            const allIngredients = getAllIngredients();
            const reinforceSet = buildRemediationSet(item, allIngredients).map(q => ({ ...q, isReinforce: true }));
            if (reinforceSet.length >= 1) {
                const idx1 = Math.min(state.currentQIdx + 2, state.questions.length);
                state.questions.splice(idx1, 0, reinforceSet[0]);
            }
            if (reinforceSet.length >= 2) {
                const idx2 = Math.min(state.currentQIdx + 4, state.questions.length);
                state.questions.splice(idx2, 0, reinforceSet[1]);
            }
        }
    }

    state._lastItem = item;
    state.feedbackShown = true;
    render();

}

function nextQuestion() {
    if (state.hearts <= 0) {
        finishLesson();
        return;
    }

    state.currentQIdx++;
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.gramInputs = {};
    state._lastSpeedBonus = 0;
    state._questionStartTime = Date.now();

    if (state.currentQIdx >= state.questions.length) {
        if (!state.isPractice && state.phase === 'basic' && state.basicMistakeIds.length > 0) {
            const allIngredients = getAllIngredients();
            const mistakeItems = state.basicMistakeIds.map(name => state.allData.find(d => d.name === name)).filter(Boolean);
            state.questions = shuffle(mistakeItems).flatMap(item => buildRemediationSet(item, allIngredients));
            state._phaseTotal = state.questions.length;
            state.phase = 'remediation';
            state.currentQIdx = 0;
            render();
            return;
        }
        if (!state.isPractice && state.phase === 'remediation' && state.basicMistakeIds.length > 0) {
            const allIngredients = getAllIngredients();
            const mistakeItems = state.basicMistakeIds.map(name => state.allData.find(d => d.name === name)).filter(Boolean);
            state.questions = shuffle(mistakeItems).map(item => {
                const nd = normalizeItem(item);
                return buildBasicSelect(nd, buildWrongPool(nd, allIngredients));
            });
            state._phaseTotal = state.questions.length;
            state.phase = 'consolidation';
            state.currentQIdx = 0;
            render();
            return;
        }
        finishLesson();
    } else {
        render();
    }
}

function finishLesson() {
    const xpEarned = state.sessionXP + (state.hearts > 0 ? 15 : 0);
    const perfect = state.sessionCorrect === state.sessionTotal && state.sessionTotal > 0;
    if (perfect) {
        const p = getProgress();
        p.perfectLessons = (p.perfectLessons || 0) + 1;
        saveProgress(p);
    }
    const { justMetGoal } = addXP(xpEarned);

    if (!state.isPractice && state.currentLessonIdx >= 0 && state.hearts > 0) {
        saveLessonComplete(state.section, state.currentLessonIdx, state.sessionCorrect, state.sessionTotal);
    }

    state._finalXP = xpEarned;
    replaceScreen('result');

    playSound('finish');
    haptic(perfect ? [40, 60, 40, 60, 120] : 60);
    if (perfect && getSettings().confetti) {
        setTimeout(showConfetti, 300);
    }
    setTimeout(() => showXPPopup(xpEarned), 500);
    if (justMetGoal) {
        setTimeout(() => { playSound('goal'); haptic([50, 40, 90]); }, 900);
    }
    const newly = checkAchievements();
    if (newly.length) setTimeout(() => celebrateAchievements(newly), justMetGoal ? 1600 : 1200);
}

function renderResult() {
    const accuracy = state.sessionTotal > 0
        ? Math.round((state.sessionCorrect / state.sessionTotal) * 100)
        : 0;

    const barColor = accuracy >= 80 ? 'var(--green)' : accuracy >= 50 ? 'var(--gold)' : 'var(--red)';
    const resultTitle = accuracy === 100 ? 'РҳРҙРөР°Р»СҢРҪРҫ!' :
                        accuracy >= 80 ? 'РһСӮР»РёСҮРҪР°СҸ СҖР°РұРҫСӮР°!' :
                        accuracy >= 50 ? 'РқРөРҝР»РҫС…Рҫ!' : 'РқСғР¶РҪРҫ РөСүС‘ РҝРҫСӮСҖРөРҪРёСҖРҫРІР°СӮСҢСҒСҸ';
    const resultSub = state.hearts <= 0 ? 'Р–РёР·РҪРё Р·Р°РәРҫРҪСҮРёР»РёСҒСҢ, РҪРҫ СӮСӢ РјРҫР»РҫРҙРөСҶ!' :
                      `РўСӢ Р·Р°СҖР°РұРҫСӮР°Р» ${state._finalXP} XP!`;

    app.innerHTML = `
        <div class="result-screen">
            <div class="result-title">${resultTitle}</div>
            <div class="result-subtitle">${resultSub}</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--green)">${state.sessionCorrect}</div>
                    <div class="result-stat-label">Р’РөСҖРҪРҫ</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--red)">${state.sessionTotal - state.sessionCorrect}</div>
                    <div class="result-stat-label">РһСҲРёРұРҫРә</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--gold)">${state._finalXP}</div>
                    <div class="result-stat-label">XP</div>
                </div>
            </div>
            <div class="result-accuracy-bar">
                <div class="result-accuracy-fill" style="width:0%;background:${barColor}"></div>
            </div>
            <p style="color:var(--text-secondary);margin-bottom:24px;font-weight:700">${accuracy}% СӮРҫСҮРҪРҫСҒСӮСҢ</p>
            <button class="result-btn primary" onclick="returnToPath()">РҹСҖРҫРҙРҫР»Р¶РёСӮСҢ</button>
            ${state.mistakeIds.length > 0 ? `<button class="result-btn secondary" onclick="retryMistakes()">РҹРҫРІСӮРҫСҖРёСӮСҢ РҫСҲРёРұРәРё (${state.mistakeIds.length})</button>` : ''}
        </div>
    `;

    setTimeout(() => {
        const fill = document.querySelector('.result-accuracy-fill');
        if (fill) fill.style.width = accuracy + '%';
    }, 100);
}

function returnToPath() {
    goBack();
}

function retryMistakes() {
    const mistakeItems = state.allData.filter(d => state.mistakeIds.includes(d.name));
    if (mistakeItems.length === 0) {
        returnToPath();
        return;
    }
    state.isPractice = true;
    state.questions = generateQuestions(mistakeItems);
    state.currentQIdx = 0;
    state.hearts = 5;
    state.sessionXP = 0;
    state.sessionCorrect = 0;
    state.sessionTotal = 0;
    state.mistakeIds = [];
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.gramInputs = {};
    state._lastSpeedBonus = 0;
    state._questionStartTime = Date.now();
    replaceScreen('lesson');
}

// ====================== QUIT CONFIRMATION ======================
function confirmQuit() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-content">
            <div class="modal-title">Р’СӢР№СӮРё РёР· СғСҖРҫРәР°?</div>
            <div class="modal-text">РўРІРҫР№ РҝСҖРҫРіСҖРөСҒСҒ РІ СҚСӮРҫРј СғСҖРҫРәРө РҪРө СҒРҫС…СҖР°РҪРёСӮСҒСҸ.</div>
            <button class="modal-btn primary" onclick="this.closest('.modal-overlay').remove()">РһСҒСӮР°СӮСҢСҒСҸ</button>
            <button class="modal-btn secondary" onclick="quitLesson()">Р’СӢР№СӮРё</button>
        </div>
    `;
    document.body.appendChild(overlay);
}

function quitLesson() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
    goBack();
}

// ====================== INIT ======================
const saved = getProgress();
if (saved.profile) {
    state.profile = migrateProfileAvatar(saved.profile);
}
if (!state.profile) {
    state.screen = 'onboarding';
    state.onboardingStep = 'nickname';
    state.onboardingNickname = '';
    state.onboardingAvatar = null;
}
// Platform auth routing overrides the initial screen.
initPlatform();
</script>
</body>
</html>
