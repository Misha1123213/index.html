<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТТК Академия 🦉</title>
    <style>
        .levels-grid { 
    display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px 0; 
}
.level-node { 
    width: 60px; height: 60px; border-radius: 50%; 
    background: #334155; border: 4px solid #475569; 
    display: flex; align-items: center; justify-content: center; 
    font-weight: bold; cursor: pointer; color: #94a3b8; 
}
.level-node.unlocked { background: #58cc02; border-color: #46a302; color: white; }

        body { background: #131924; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; text-align: center; }
        .section-btn { 
            display: block; width: 100%; padding: 20px; margin: 15px 0; 
            background: #334155; border: 4px solid #475569; border-radius: 16px; 
            color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .section-btn:hover { background: #475569; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="app-container" id="main-menu">
    <h2>Выбери направление:</h2>
    <button class="section-btn" onclick="selectSection('kitchen')">🍳 Кухня</button>
    <button class="section-btn" onclick="selectSection('desserts')">🍰 Десерты</button>
    <button class="section-btn" onclick="selectSection('drinks')">🍹 Напитки</button>
</div>

<script>
    async function selectSection(section) {
    // Если пользователь выбрал "Кухня", мы грузим 'dishes.json'
    // Если выберет другое — можно будет дописать логику для других файлов
    const fileName = (section === 'kitchen') ? 'dishes.json' : `${section}.json`;

    document.getElementById('main-menu').innerHTML = "<h2>Загрузка данных...</h2>";

    try {
        const response = await fetch(fileName);
        const data = await response.json();
        
        console.log("Данные загружены из", fileName);
        renderLevels(data, section);
    } catch (error) {
        console.error("Ошибка:", error);
        document.getElementById('main-menu').innerHTML = `
            <h2>Ошибка: файл ${fileName} не найден!</h2>
            <button class="section-btn" onclick="location.reload()">Назад</button>
        `;
    }
}

            // Здесь будет переход к отрисовке уровней этой главы
            renderLevels(data, section);
        } catch (error) {
            console.error("Ошибка:", error);
            document.getElementById('main-menu').innerHTML = 
                `<h2>Ошибка загрузки!</h2>
                <button class="section-btn" onclick="location.reload()">Назад</button>`;
        }
    }

    function renderLevels(data, sectionName) {
    const container = document.getElementById('main-menu');
    container.innerHTML = `
        <h2>${sectionName.toUpperCase()}</h2>
        <div class="levels-grid" id="levels-container"></div>
        <button class="section-btn" style="background:#475569" onclick="location.reload()">Назад</button>
    `;

    const levelsContainer = document.getElementById('levels-container');
    const totalLevels = Math.ceil(data.length / 10); // По 10 вопросов на уровень

    for (let i = 0; i < totalLevels; i++) {
        const div = document.createElement('div');
        div.className = 'level-node unlocked';
        div.innerText = i + 1;
        div.onclick = () => alert("Запуск уровня " + (i + 1)); // Скоро заменим на старт игры
        levelsContainer.appendChild(div);
    }
}

</script>
</body>
</html>
