<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MET Академия ☕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #4CAF50;
            --green-dark: #388E3C;
            --green-light: #66BB6A;
            --blue: #78909C;
            --blue-dark: #546E7A;
            --red: #E53935;
            --red-dark: #C62828;
            --gold: #FFC107;
            --gold-dark: #FFA000;
            --purple: #9E9E9E;
            --orange: #FF9800;
            --bg-dark: #1a1a1a;
            --bg-card: rgba(38,38,38,0.92);
            --bg-card-hover: rgba(50,50,50,0.95);
            --bg-modal: #2a2a2a;
            --text-primary: #FAFAFA;
            --text-secondary: #B0B0B0;
            --text-dim: #707070;
            --border: rgba(255,255,255,0.12);
            --border-light: rgba(255,255,255,0.2);
            --shadow: rgba(0,0,0,0.5);
            --concrete: #b5b0a8;
            --concrete-light: #c5c0b8;
            --concrete-dark: #9a958d;
            --concrete-text: #2a2a2a;
            --concrete-border: rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            background-image: url('img/bg-cafe.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(20,20,20,0.82);
            z-index: 0;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        /* Header bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
        }
        .top-bar-stat .icon { font-size: 20px; }
        .streak-count { color: var(--gold); }
        .xp-count { color: var(--text-primary); }
        .hearts-count { color: var(--red); }

        /* Home screen */
        .home-screen { padding: 14px 12px 30px; }
        .mascot-area {
            text-align: center;
            padding: 18px 0 12px;
        }
        .mascot {
            font-size: 60px;
            display: block;
            animation: mascotBounce 2s ease-in-out infinite;
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .app-title {
            font-size: 22px;
            font-weight: 900;
            color: var(--text-primary);
            margin: 6px 0 2px;
            letter-spacing: -0.5px;
        }
        .app-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }

        /* Cement texture classes for variety */
        .cement-1 { background-image: url('img/cement-1.jpg'); background-size: 400px 400px; }
        .cement-2 { background-image: url('img/cement-2.jpg'); background-size: 400px 400px; }
        .cement-3 { background-image: url('img/cement-3.jpg'); background-size: 400px 400px; }
        .cement-4 { background-image: url('img/cement-4.jpg'); background-size: 400px 400px; }
        .cement-5 { background-image: url('img/cement-5.jpg'); background-size: 400px 400px; }
        .cement-main { background-image: url('img/cement-main.jpg'); background-size: 800px 500px; }

        /* Section cards - concrete tablet style */
        .section-card {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 0;
            margin-bottom: 10px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            overflow: hidden;
            position: relative;
            box-shadow: 2px 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);
        }
        .section-card:hover { transform: translateY(-3px); box-shadow: 3px 6px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25); }
        .section-card:active { transform: translateY(0px); box-shadow: 1px 2px 6px rgba(0,0,0,0.4); }
        .section-card .card-img {
            width: 70px; height: 70px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 4px 0 0 4px;
        }
        .section-card .card-info {
            flex: 1;
            padding: 12px 0;
        }
        .section-card .card-info small {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: rgba(42,42,42,0.6);
            margin-top: 3px;
        }
        .section-card .card-arrow {
            color: rgba(42,42,42,0.4);
            font-size: 22px;
            padding-right: 16px;
        }

        /* Daily stats bar */
        .daily-stats {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .daily-stat-card {
            flex: 1;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            padding: 10px 8px;
            text-align: center;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .daily-stat-card .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--concrete-text);
        }
        .daily-stat-card .stat-label {
            font-size: 11px;
            color: rgba(42,42,42,0.6);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Learning Stats button */
        .stats-btn {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .stats-btn:hover { transform: translateY(-2px); box-shadow: 3px 5px 14px rgba(0,0,0,0.45); }

        /* Path screen */
        .path-screen { padding: 14px 12px 80px; }
        .path-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 4px;
            background: var(--concrete);
            border: none;
            color: var(--concrete-text);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .back-btn:hover { background: var(--concrete-light); }
        .path-title {
            font-size: 18px;
            font-weight: 900;
        }

        /* Lesson path nodes */
        .path-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            position: relative;
        }
        .path-row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .path-connector {
            width: 3px;
            height: 30px;
            background: var(--concrete-dark);
            margin: 0 auto;
        }
        .path-connector.completed { background: rgba(76,175,80,0.6); }

        .lesson-node {
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 4px solid;
            font-family: inherit;
            color: var(--text-primary);
        }
        .lesson-node .node-sub {
            font-size: 9px;
            font-weight: 700;
            opacity: 0.8;
        }
        .lesson-node.locked {
            background: var(--concrete-dark);
            border-color: rgba(0,0,0,0.15);
            color: rgba(42,42,42,0.4);
            cursor: default;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35);
        }
        .lesson-node.available {
            background: var(--concrete-light);
            border-color: var(--concrete-text);
            color: var(--concrete-text);
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            animation: nodePulse 2s ease-in-out infinite;
        }
        .lesson-node.available:hover { transform: translateY(-3px); }
        .lesson-node.available:active {
            transform: translateY(2px);
            box-shadow: 0 1px 4px rgba(255,255,255,0.1);
        }
        @keyframes nodePulse {
            0%, 100% { box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 0 0 rgba(181,176,168,0.4); }
            50% { box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 0 8px rgba(181,176,168,0); }
        }
        .lesson-node.completed {
            background: var(--concrete);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .lesson-node.completed:hover { transform: translateY(-3px); }
        .lesson-node.completed:active {
            transform: translateY(2px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .lesson-node.practice {
            background: var(--concrete);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
        .lesson-node.practice:hover { transform: translateY(-3px); }

        /* Crown badges */
        .crown-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--gold);
            color: #333;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--gold-dark);
        }

        /* Practice button */
        .practice-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .practice-btn:hover { background: var(--concrete-light); }

        /* Lesson screen */
        .lesson-screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .lesson-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .close-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: none;
            border: 2px solid var(--border);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: inherit;
        }
        .close-btn:hover { border-color: var(--text-secondary); }

        .progress-bar-container {
            flex: 1;
            height: 12px;
            background: rgba(181,176,168,0.3);
            border-radius: 3px;
            overflow: hidden;
            border: none;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--concrete);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .hearts-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 800;
            font-size: 16px;
            color: var(--red);
        }

        /* Question area - concrete tablet panel */
        .question-area {
            flex: 1;
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
        }
        .question-panel {
            background: var(--concrete);
            border-radius: 4px;
            padding: 12px 14px;
            margin-bottom: 10px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .question-type-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(42,42,42,0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .question-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0;
            color: var(--concrete-text);
        }
        .question-dish-name {
            color: var(--concrete-text);
            font-weight: 800;
        }

        /* Category badge */
        .category-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .category-badge.breakfast { background: rgba(255,152,0,0.18); color: #E65100; }
        .category-badge.lunch { background: rgba(76,175,80,0.18); color: #2E7D32; }
        .category-badge.sandwich { background: rgba(120,144,156,0.25); color: #37474F; }
        .category-badge.dessert { background: rgba(156,39,176,0.15); color: #7B1FA2; }
        .category-badge.drink { background: rgba(0,150,136,0.18); color: #00796B; }
        .category-badge.drink_pf { background: rgba(255,193,7,0.18); color: #F57F17; }

        /* Ingredient buttons grid - concrete tablet style */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .option-btn {
            padding: 8px 12px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            user-select: none;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .option-btn:hover { background-color: var(--concrete-light); transform: translateY(-1px); box-shadow: 3px 4px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }
        .option-btn:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .option-btn.selected {
            outline: 3px solid #333;
            color: var(--concrete-text);
            box-shadow: 0 0 16px rgba(255,255,255,0.5), 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
            transform: translateY(-2px) scale(1.03);
            filter: brightness(1.25);
        }
        .option-btn.correct-reveal {
            background: #a8d5a2;
            color: #1b5e20;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }
        .option-btn.correct-unselected {
            background: #c8e6c5;
            color: #1b5e20;
            opacity: 0.55;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.2);
        }
        .option-btn.wrong-reveal {
            background: #e8a8a5;
            color: #b71c1c;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }
        /* Crack overlay on wrong answer tablets before they break */
        .option-btn.crack-overlay::after,
        .choice-btn.crack-overlay::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: url('img/concrete-cracks.png') center/cover no-repeat;
            opacity: 0.7;
            pointer-events: none;
            animation: crackAppear 0.3s ease-out forwards;
            z-index: 2;
        }
        @keyframes crackAppear {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        /* Break apart into fragments animation */
        .option-btn.crumble-away,
        .choice-btn.crumble-away {
            animation: none;
        }
        /* Crack effect on click */
        .option-btn.crack-effect::after,
        .choice-btn.crack-effect::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: url('img/concrete-cracks.png') center/cover no-repeat;
            opacity: 0;
            animation: crackFlash 0.4s ease-out forwards;
            pointer-events: none;
            border-radius: 4px;
            z-index: 2;
        }
        @keyframes crackFlash {
            0% { opacity: 0; transform: scale(0.85); }
            40% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        /* Concrete fragment for break animation */
        .concrete-fragment {
            position: fixed;
            background: var(--concrete);
            z-index: 9999;
            pointer-events: none;
            border-radius: 1px;
        }
        @keyframes fragmentFly {
            0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--fx), var(--fy)) rotate(var(--fr)); opacity: 0; }
        }

        /* True/False buttons - concrete tablet */
        .tf-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .tf-btn {
            flex: 1;
            padding: 14px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            overflow: hidden;
            background: var(--concrete);
        }
        .tf-btn:active { transform: translateY(2px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .tf-btn.tf-yes { color: #2e7d32; }
        .tf-btn.tf-yes:hover { background-color: var(--concrete-light); }
        .tf-btn.tf-no { color: #c62828; }
        .tf-btn.tf-no:hover { background-color: var(--concrete-light); }

        /* Missing ingredient choices */
        .missing-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .missing-item {
            padding: 6px 10px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 14px;
            font-weight: 600;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .missing-slot {
            padding: 8px 14px;
            background: rgba(181,176,168,0.3);
            border: 2px dashed var(--concrete-dark);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            animation: slotPulse 1.5s ease-in-out infinite;
        }
        @keyframes slotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .choice-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            width: 100%;
            padding: 10px 14px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.12s;
            text-align: left;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .choice-btn:hover { background-color: var(--concrete-light); transform: translateY(-1px); }
        .choice-btn:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .choice-btn.selected { outline: 3px solid #333; color: var(--concrete-text); box-shadow: 0 0 16px rgba(255,255,255,0.5), 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5); transform: translateY(-2px) scale(1.03); filter: brightness(1.25); }
        .choice-btn.correct-reveal { background: #a8d5a2; color: #1b5e20; }
        .choice-btn.wrong-reveal { background: #e8a8a5; color: #b71c1c; }
        .choice-btn.crumble-away { animation: none; }

        /* Check button - concrete tablet */
        .bottom-area {
            padding: 10px 12px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }
        .check-btn {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }
        .check-btn.active {
            background: var(--concrete-light);
            color: var(--concrete-text);
            box-shadow: 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.1);
        }
        .check-btn.active:hover { background-color: #d0cbc3; transform: translateY(-1px); box-shadow: 3px 4px 12px rgba(0,0,0,0.45); }

        /* Disabled state for answered buttons */

        @keyframes fadeIn {

        /* Result screen */
        .result-screen {

        }

        .result-accuracy-bar {

            height: 12px;

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;

        .modal-content {

            font-size: 20px;
            font-weight: 800;

        .modal-text {

        .modal-btn {

        /* Learning Stats Modal */
        .stats-modal {

        /* Color coded format */
        .color-category {

        .color-category-label {
            display: inline-block;

        .cat-base { background: rgba(33,150,243,0.15); color: #1565C0; }
        .cat-flavor { background: rgba(76,175,80,0.15); color: #2E7D32; }
        .cat-topping { background: rgba(255,152,0,0.15); color: #E65100; }
        .cat-liquid { background: rgba(156,39,176,0.15); color: #7B1FA2; }

        /* Spatial format */
        .spatial-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;

        }
        .spatial-zone {
            border: 2px dashed var(--concrete-dark);

        .spatial-zone-label {
            font-size: 10px;
            color: var(--concrete-text);

        /* Confetti */
        .confetti-container {
            position: fixed;

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;

            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }

        /* XP popup */
        .xp-popup {
            position: fixed;
            top: 50%;
            left: 50%;

        }
        @keyframes xpPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Heart break */
        @keyframes heartBreak {
            0% { transform: scale(1); }
            25% { transform: scale(1.4); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .heart-break { animation: heartBreak 0.5s ease; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        /* Loading spinner */
        .loader {
            width: 50px; height: 50px;
            border: 3px solid var(--concrete-border);
            border-top-color: var(--text-primary);

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .loading-screen p {
            color: var(--text-secondary);
            margin-top: 16px;
            font-weight: 700;
        }

        /* Drill badge */
        .drill-badge {
            display: inline-block;
            background: rgba(255,152,0,0.2);
            color: #FF9800;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Category Sorting - drag and drop */
        .sorting-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sorting-zones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }
        .sorting-zone {
            border: 2px dashed var(--concrete-dark);
            border-radius: 6px;
            padding: 8px;
            min-height: 80px;
            background: rgba(181,176,168,0.12);
            transition: all 0.2s;
        }
        .sorting-zone.drag-over {
            border-color: var(--blue);
            background: rgba(120,144,156,0.2);
            box-shadow: inset 0 0 12px rgba(120,144,156,0.15);
        }
        .sorting-zone-label {
            font-size: 11px;
            color: var(--concrete-text);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-align: center;
            background: var(--concrete);
            border-radius: 3px;
            padding: 4px 6px;
        }
        .sorting-zone-items {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 30px;
        }
        .sorting-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;

        .sorting-pool-label {
            font-size: 10px;

        .drag-item {

            color: var(--concrete-text);

            font-weight: 600;
            cursor: grab;
            user-select: none;
            transition: all 0.15s;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);

        .drag-item:active { cursor: grabbing; }
        .drag-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .drag-item.tap-selected {
            outline: 2px solid #333;
            filter: brightness(1.2);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255,255,255,0.4), 2px 3px 8px rgba(0,0,0,0.4);
        }
        .drag-item.sort-correct {
            background: #4A6B42;
            color: #e8f5e9;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.3);

        .drag-item.sort-wrong {

            color: #ffebee;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.3);

        .drag-item.sort-missed {
            background: #4A6B42;
            color: #e8f5e9;
            opacity: 0.5;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.2);
        }

        /* Cement texture applied dynamically via JS */
        [data-cement] {
            background-size: 400px 400px !important;

</head>
<body>
<div id="app"></div>
<script>
// ====================== STATE ======================
const APP_KEY = 'ttk_academy_v3';

let state = {
    screen: 'home',
    section: null,
    sectionLabel: '',
    allData: [],
    lessons: [],
    currentLessonIdx: null,
    questions: [],
    currentQIdx: 0,
    hearts: 5,
    sessionXP: 0,
    sessionCorrect: 0,
    sessionTotal: 0,
    mistakeIds: [],
    feedbackShown: false,
    selectedOptions: new Set(),
    selectedChoice: null,
    isPractice: false,
    isDrinksChapter: false,
    gramInputs: {},
    sortingPlacements: {},
    tapSelectedItem: null,
    drilledItems: new Set(),
};

// Cement texture images for variety
const CEMENT_IMAGES = ['img/cement-1.jpg','img/cement-2.jpg','img/cement-3.jpg','img/cement-4.jpg','img/cement-5.jpg'];
let cementCounter = 0;
function nextCement() {
    const img = CEMENT_IMAGES[cementCounter % CEMENT_IMAGES.length];
    cementCounter++;
    return img;
}
function cementStyle() {
    return `background-image:url('${nextCement()}');background-size:400px 400px;`;
}

// ====================== PERSISTENCE ======================
function loadProgress() {
    try {
        const raw = localStorage.getItem(APP_KEY);
        return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
}
function saveProgress(data) {
    const current = loadProgress();
    Object.assign(current, data);
    localStorage.setItem(APP_KEY, JSON.stringify(current));
}
function getProgress() { return loadProgress(); }

function getSectionProgress(section) {
    const p = getProgress();
    return p[section] || {};
}
function saveLessonComplete(section, lessonIdx, score, total) {
    const p = getProgress();
    if (!p[section]) p[section] = {};
    const key = `lesson_${lessonIdx}`;
    const prev = p[section][key] || { completed: false, crowns: 0, bestScore: 0 };
    prev.completed = true;
    prev.crowns = Math.min(5, prev.crowns + 1);
    prev.bestScore = Math.max(prev.bestScore, score);
    p[section][key] = prev;
    saveProgress(p);
}
function getGlobalStats() {
    const p = getProgress();
    return {
        totalXP: p.totalXP || 0,
        streak: p.streak || 0,
        lastDate: p.lastDate || null,
        totalLessons: p.totalLessons || 0,
    };
}
function addXP(amount) {
    const p = getProgress();
    p.totalXP = (p.totalXP || 0) + amount;
    const today = new Date().toDateString();
    if (p.lastDate !== today) {
        if (p.lastDate === new Date(Date.now() - 86400000).toDateString()) {
            p.streak = (p.streak || 0) + 1;
        } else if (p.lastDate !== today) {
            p.streak = 1;
        }
        p.lastDate = today;
    }
    p.totalLessons = (p.totalLessons || 0) + 1;
    saveProgress(p);
}

function recordAnswer(itemName, correct) {
    const p = getProgress();
    if (!p.itemStrength) p.itemStrength = {};
    const s = p.itemStrength[itemName] || { strength: 3, attempts: 0 };
    s.attempts++;
    if (correct) {
        s.strength = Math.min(5, s.strength + 1);
    } else {
        s.strength = Math.max(0, s.strength - 1.5);
    }
    s.lastSeen = Date.now();
    p.itemStrength[itemName] = s;
    saveProgress(p);
}
function getWeakItems(section) {
    const p = getProgress();
    if (!p.itemStrength) return [];
    const sectionData = state.allData;
    return sectionData
        .filter(d => {
            const s = p.itemStrength[d.name];
            return s && s.strength < 3;
        })
        .sort((a, b) => {
            const sa = (p.itemStrength[a.name] || {}).strength || 3;
            const sb = (p.itemStrength[b.name] || {}).strength || 3;
            return sa - sb;
        });
}

// ====================== ADAPTIVE ENGINE ======================
const FORMATS = ['logical', 'color_coded', 'spatial'];
const CALIBRATION_COUNT = 9;

function getAdaptiveData() {
    const p = getProgress();
    if (!p.adaptive) p.adaptive = {
        totalQuestions: 0,
        formats: {}
    };
    for (const f of FORMATS) {
        if (!p.adaptive.formats[f]) {
            p.adaptive.formats[f] = { correct: 0, attempts: 0, totalTime: 0 };
        }
    }
    return p.adaptive;
}

function saveAdaptiveData(ad) {
    const p = getProgress();
    p.adaptive = ad;
    saveProgress(p);
}

function recordFormatAnswer(format, correct, timeTaken) {
    const ad = getAdaptiveData();
    ad.totalQuestions++;
    const fd = ad.formats[format];
    fd.attempts++;
    if (correct) fd.correct++;
    fd.totalTime += timeTaken;
    saveAdaptiveData(ad);
}

function getFormatScore(format) {
    const ad = getAdaptiveData();
    const fd = ad.formats[format];
    if (!fd || fd.attempts === 0) return 0;
    const accuracy = fd.correct / fd.attempts;
    const avgTime = fd.totalTime / fd.attempts;
    return accuracy * (1 / Math.max(avgTime, 0.5));
}

function pickFormat() {
    const ad = getAdaptiveData();
    if (ad.totalQuestions < CALIBRATION_COUNT) {
        return FORMATS[ad.totalQuestions % FORMATS.length];
    }
    const scores = FORMATS.map(f => ({ format: f, score: getFormatScore(f) }));
    scores.sort((a, b) => b.score - a.score);
    const dominant = scores[0].format;
    if (Math.random() < 0.7) return dominant;
    const others = FORMATS.filter(f => f !== dominant);
    return others[Math.floor(Math.random() * others.length)];
}

function getDominantFormat() {
    const scores = FORMATS.map(f => ({ format: f, score: getFormatScore(f) }));
    scores.sort((a, b) => b.score - a.score);
    return scores[0];
}

function getFormatLabel(f) {
    const labels = {
        logical: 'Логический',
        color_coded: 'Визуальный',
        spatial: 'Пространственный'
    };
    return labels[f] || f;
}

function getFormatDescription(f) {
    const desc = {
        logical: 'Текстовые списки ингредиентов',
        color_coded: 'Цветовая группировка по категориям',
        spatial: 'Визуальное расположение компонентов'
    };
    return desc[f] || '';
}

function getDishCategory(name) {
    const n = name.toLowerCase();
    if (n.includes('крок-') || n.includes('гриль-чиз') || n.includes('гирос')) return { label: 'Сэндвич', cls: 'sandwich' };
    if (n.includes('суп') || n.includes('бульон') || n.includes('орзо') || n.includes('ньокки') || n.includes('салат') || n.includes('щёчки') || n.includes('щечки')) return { label: 'Обед', cls: 'lunch' };
    if (n.includes('каша') || n.includes('сырник') || n.includes('шакшука') || n.includes('завтрак') || n.includes('скрэмбл') || n.includes('бенедикт') || n.includes('дранник') || n.includes('френч-тост') || n.includes('гречка')) return { label: 'Завтрак', cls: 'breakfast' };
    return { label: 'Завтрак', cls: 'breakfast' };
}

function getSectionCategory(section) {
    if (section === 'desserts') return { label: 'Десерт', cls: 'dessert' };
    if (section === 'drinks') return { label: 'Напиток', cls: 'drink' };
    if (section === 'drink_pf') return { label: 'ПФ Напитков', cls: 'drink_pf' };
    return null;
}

function getChapterTotals() {
    return {
        kitchen: { file: 'dishes.json', label: '🍳 Кухня' },
        desserts: { file: 'desserts.json', label: '🍰 Десерты' },
        drinks: { file: 'drinks.json', label: '🍹 Напитки' },
        drink_pf: { file: 'drink_pf.json', label: '🧪 ПФ Напитков' }
    };
}

function getChapterProgress() {
    const p = getProgress();
    const chapters = getChapterTotals();
    const result = {};
    for (const [key, info] of Object.entries(chapters)) {
        const sp = p[key] || {};
        let completed = 0;
        let total = 0;
        for (const k of Object.keys(sp)) {
            if (k.startsWith('lesson_')) {
                total++;
                if (sp[k].completed) completed++;
            }
        }
        result[key] = { completed, total, label: info.label };
    }
    return result;
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// Normalize item data: handle both old format (correct: string[], pool: string[])
// and new format (correct: [{ingredient, grams}], wrong: string[])
function normalizeItem(item) {
    if (!item._normalized) {
        if (item.correct && item.correct.length > 0 && typeof item.correct[0] === 'object') {
            item._ingredients = item.correct.map(c => c.ingredient);
            item._grams = {};
            item.correct.forEach(c => { item._grams[c.ingredient] = c.grams; });
            item._pool = [...item._ingredients, ...(item.wrong || [])];
            item._wrongPool = item.wrong || [];
            item._hasGrams = true;
        } else {
            item._ingredients = item.correct || [];
            item._grams = {};
            item._pool = item.pool || [...(item.correct || []), ...(item.wrong || [])];
            item._wrongPool = (item.pool || []).filter(p => !(item.correct || []).includes(p));
            if (item.wrong) item._wrongPool = item.wrong;
            item._hasGrams = false;
        }
        item._normalized = true;
    }
    return item;
}

        drinks: '🍹 Напитки',
        drink_pf: '🧪 ПФ Напитков'

        desserts: 'desserts.json',
        drinks: 'drinks.json',
        drink_pf: 'drink_pf.json'
    };
    const fileName = fileMap[section];
    try {

// ====================== QUESTION GENERATION ======================
function generateQuestions(items) {
    const questions = [];

    const allIngredientsSet = new Set();
    (state.allData || []).forEach(d => {
        const nd = normalizeItem(d);
        nd._ingredients.forEach(i => allIngredientsSet.add(i));
        (nd._wrongPool || []).forEach(i => allIngredientsSet.add(i));
        (nd._pool || []).forEach(i => allIngredientsSet.add(i));
    });
    const allIngredients = [...allIngredientsSet];

    for (const item of shuffle(items)) {
        const nd = normalizeItem(item);
        const correctSet = new Set(nd._ingredients);
        let wrongPool = nd._wrongPool.filter(p => !correctSet.has(p));

        if (wrongPool.length < 4) {
            const extra = allIngredients.filter(i => !correctSet.has(i) && !wrongPool.includes(i));
            wrongPool = wrongPool.concat(shuffle(extra).slice(0, 5 - wrongPool.length));
        }

        const format = pickFormat();
        const rand = Math.random();

        if (rand < 0.25 && nd._ingredients.length >= 3) {
            const categories = {};
            nd._ingredients.forEach(ing => {
                const cat = categorizeIngredient(ing);
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(ing);
            });
            const usedCats = Object.keys(categories).filter(c => categories[c].length > 0);
            if (usedCats.length >= 2) {
                const sortItems = [...nd._ingredients];
                const wrongToAdd = shuffle(wrongPool).slice(0, Math.min(2, wrongPool.length));
                const allSortItems = shuffle([...sortItems, ...wrongToAdd]);
                const correctMap = {};
                nd._ingredients.forEach(ing => { correctMap[ing] = categorizeIngredient(ing); });
                const hasWrong = wrongToAdd.length > 0;
                wrongToAdd.forEach(ing => { correctMap[ing] = '_wrong'; });
                const cats = hasWrong ? [...usedCats, '_wrong'] : usedCats;
                questions.push({
                    type: 'category_sorting',
                    item: nd,
                    sortItems: allSortItems,
                    categories: cats,
                    correctMap: correctMap,
                    format: format,
                    showGrams: false,
                });
                continue;
            }
        }

        if (rand < 0.45 && wrongPool.length >= 3) {
            const displayPool = shuffle([...nd._ingredients, ...shuffle(wrongPool).slice(0, Math.max(4, Math.ceil(nd._ingredients.length * 0.6)))]);
            questions.push({
                type: 'select',
                item: nd,
                pool: displayPool,
                format: format,
                showGrams: state.isDrinksChapter && nd._hasGrams,
            });
        } else if (rand < 0.7 && nd._ingredients.length > 2 && wrongPool.length >= 2) {
            const missingIdx = Math.floor(Math.random() * nd._ingredients.length);
            const missingIng = nd._ingredients[missingIdx];
            const shown = nd._ingredients.filter((_, i) => i !== missingIdx);
            const distractors = shuffle(wrongPool).slice(0, 3);
            const choices = shuffle([missingIng, ...distractors]);

            questions.push({
                type: 'missing',
                item: nd,
                shown: shown,
                missing: missingIng,
                choices: choices,
                format: format,
                showGrams: false,
            });
        } else if (wrongPool.length >= 1) {
            const isTrue = Math.random() > 0.5;
            let ingredient;
            if (isTrue) {
                ingredient = nd._ingredients[Math.floor(Math.random() * nd._ingredients.length)];
            } else {
                ingredient = wrongPool[Math.floor(Math.random() * wrongPool.length)];
            }
            questions.push({
                type: 'truefalse',
                item: nd,
                ingredient: ingredient,
                answer: isTrue,
                format: format,
                showGrams: false,
            });
        } else {
            questions.push({
                type: 'select',
                item: nd,
                pool: shuffle(nd._pool),
                format: format,
                showGrams: state.isDrinksChapter && nd._hasGrams,
            });
        }
    }

    return shuffle(questions);
}

function generateDrillQuestions(item, usedType) {
    const nd = normalizeItem(item);
    const correctSet = new Set(nd._ingredients);
    const allIngredientsSet = new Set();
    (state.allData || []).forEach(d => {
        const n = normalizeItem(d);
        n._ingredients.forEach(i => allIngredientsSet.add(i));
        (n._wrongPool || []).forEach(i => allIngredientsSet.add(i));
        (n._pool || []).forEach(i => allIngredientsSet.add(i));
    });
    let wrongPool = (nd._wrongPool || []).filter(p => !correctSet.has(p));
    if (wrongPool.length < 4) {
        const extra = [...allIngredientsSet].filter(i => !correctSet.has(i) && !wrongPool.includes(i));
        wrongPool = wrongPool.concat(shuffle(extra).slice(0, 5 - wrongPool.length));
    }

    const drills = [];
    const format = pickFormat();
    const types = ['select', 'missing', 'truefalse', 'category_sorting'].filter(t => t !== usedType);

    for (const type of types) {
        if (type === 'select' && wrongPool.length >= 3) {
            const displayPool = shuffle([...nd._ingredients, ...shuffle(wrongPool).slice(0, Math.max(4, Math.ceil(nd._ingredients.length * 0.6)))]);
            drills.push({ type: 'select', item: nd, pool: displayPool, format, showGrams: state.isDrinksChapter && nd._hasGrams, isDrill: true });
        } else if (type === 'missing' && nd._ingredients.length > 2 && wrongPool.length >= 2) {
            const missingIdx = Math.floor(Math.random() * nd._ingredients.length);
            const missingIng = nd._ingredients[missingIdx];
            const shown = nd._ingredients.filter((_, i) => i !== missingIdx);
            const distractors = shuffle(wrongPool).slice(0, 3);
            const choices = shuffle([missingIng, ...distractors]);
            drills.push({ type: 'missing', item: nd, shown, missing: missingIng, choices, format, showGrams: false, isDrill: true });
        } else if (type === 'truefalse' && wrongPool.length >= 1) {
            const isTrue = Math.random() > 0.5;
            const ingredient = isTrue
                ? nd._ingredients[Math.floor(Math.random() * nd._ingredients.length)]
                : wrongPool[Math.floor(Math.random() * wrongPool.length)];
            drills.push({ type: 'truefalse', item: nd, ingredient, answer: isTrue, format, showGrams: false, isDrill: true });
        } else if (type === 'category_sorting' && nd._ingredients.length >= 3) {
            const categories = {};
            nd._ingredients.forEach(ing => { const cat = categorizeIngredient(ing); if (!categories[cat]) categories[cat] = []; categories[cat].push(ing); });
            const usedCats = Object.keys(categories).filter(c => categories[c].length > 0);
            if (usedCats.length >= 2) {
                const wrongToAdd = shuffle(wrongPool).slice(0, Math.min(2, wrongPool.length));
                const allSortItems = shuffle([...nd._ingredients, ...wrongToAdd]);
                const correctMap = {};
                nd._ingredients.forEach(ing => { correctMap[ing] = categorizeIngredient(ing); });
                const hasWrong = wrongToAdd.length > 0;
                wrongToAdd.forEach(ing => { correctMap[ing] = '_wrong'; });
                const cats = hasWrong ? [...usedCats, '_wrong'] : usedCats;
                drills.push({ type: 'category_sorting', item: nd, sortItems: allSortItems, categories: cats, correctMap, format, showGrams: false, isDrill: true });
            }
        }
    }
    return shuffle(drills);
}

// ====================== FORMAT RENDERERS ======================
function categorizeIngredient(ing) {
    const lower = ing.toLowerCase();
    if (lower.includes('молоко') || lower.includes('сливки') || lower.includes('вода') ||
        lower.includes('чай') || lower.includes('кофе') || lower.includes('эспрессо') ||
        lower.includes('колд брю') || lower.includes('тоник') || lower.includes('газ.')) {
        return 'liquid';
    }
    if (lower.includes('сироп') || lower.includes('пюре') || lower.includes('сок') ||
        lower.includes('концентрат') || lower.includes('экстракт') || lower.includes('премикс') ||
        lower.includes('кордиал') || lower.includes('шраб') || lower.includes('варенье')) {
        return 'flavor';
    }
    if (lower.includes('пена') || lower.includes('крем') || lower.includes('топпинг') ||
        lower.includes('сахарная') || lower.includes('какао') || lower.includes('маршмеллоу') ||
        lower.includes('лепестки') || lower.includes('посыпка')) {
        return 'topping';
    }
    return 'base';
}

function renderIngredientsForFormat(ingredients, format, isClickable, q) {
    if (format === 'color_coded') {
        return renderColorCoded(ingredients, isClickable, q);
    }
    if (format === 'spatial') {
        return renderSpatial(ingredients, isClickable, q);
    }
    return renderLogical(ingredients, isClickable, q);
}

function renderLogical(pool, isClickable, q) {
    const fb = state.feedbackShown;
    const correctSet = new Set(q.item._ingredients);
    return `<div class="options-grid">${pool.map((ing, idx) => {
        let cls = '';
        let dataCrumble = '';
        let gramHTML = '';
        if (fb) {
            const isCorrectIng = correctSet.has(ing);
            const wasSelected = state.selectedOptions.has(idx);
            if (isCorrectIng && wasSelected) cls = 'correct-reveal';
            else if (isCorrectIng && !wasSelected) cls = 'correct-unselected';
            else { cls = 'wrong-reveal crumble-away'; dataCrumble = 'data-crumble="1"'; }
            if (q.showGrams && isCorrectIng) {
                const correctGram = q.item._grams[ing];
                const userGram = state.gramInputs[idx];
                const gramOk = userGram !== undefined && Math.abs(userGram - correctGram) <= 2;
                gramHTML = `<div class="gram-selector"><input class="gram-input ${gramOk ? 'gram-correct' : (wasSelected ? 'gram-wrong' : '')}" value="${userGram !== undefined ? userGram : ''}" disabled><span class="gram-unit">→ ${correctGram}г</span></div>`;
            }
        } else {
            cls = state.selectedOptions.has(idx) ? 'selected' : '';
            if (q.showGrams && state.selectedOptions.has(idx)) {
                gramHTML = `<div class="gram-selector"><input class="gram-input" type="number" placeholder="г" value="${state.gramInputs[idx] !== undefined ? state.gramInputs[idx] : ''}" onclick="event.stopPropagation()" oninput="setGram(${idx}, this.value)"><span class="gram-unit">г</span></div>`;
            }
        }
        return `<button class="option-btn ${cls}" ${dataCrumble} style="${cementStyle()}" onclick="${fb ? '' : `toggleOption(${idx})`}">${ing}${gramHTML}</button>`;
    }).join('')}</div>`;
}

        for (const { ing, idx } of items) {

                if (q.showGrams && isCorrectIng) {

// ====================== LESSON RENDERING ======================
function renderLesson() {
    const q = state.questions[state.currentQIdx];
    if (!q) {
        finishLesson();
        return;
    }

    const fb = state.feedbackShown;
    const progress = ((state.currentQIdx + (fb ? 1 : 0)) / state.questions.length) * 100;
    const heartsStr = '❤️'.repeat(Math.max(0, state.hearts));
    const correctSet = new Set(q.item._ingredients);

    let questionHTML = '';
    let resultStripHTML = '';

    if (fb) {
        const ic = state._lastCorrect;
        let extraInfo = '';
        if (!ic && q.showGrams) {
            extraInfo = ' (проверьте граммовки)';
        }
        resultStripHTML = `<div class="inline-result ${ic ? 'correct' : 'wrong'}">
            <span class="result-icon">${ic ? '✓' : '✗'}</span>
            ${ic ? 'Верно!' : 'Неверно' + extraInfo}
        </div>`;
    }

    const catInfo = state.section === 'kitchen' ? getDishCategory(q.item.name) : getSectionCategory(state.section);
    const categoryBadge = catInfo ? `<span class="category-badge ${catInfo.cls}">${catInfo.label}</span>` : '';
    const drillBadge = q.isDrill ? '<span class="drill-badge">🔁 повтор</span>' : '';

    if (q.type === 'select') {
        const dishName = q.item.name;
        const ingredientsHTML = renderIngredientsForFormat(q.pool, q.format, !fb, q);

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    <div class="question-title">
                        Выбери состав: <span class="question-dish-name">${dishName}</span>${drillBadge}
                        ${q.showGrams ? '<div style="font-size:12px;color:rgba(42,42,42,0.6);margin-top:4px">Укажите граммовки для каждого ингредиента</div>' : ''}
                    </div>
                </div>
                ${resultStripHTML}
                ${ingredientsHTML}
            </div>
        `;
    } else if (q.type === 'missing') {
        const dishName = q.item.name;

        const slotContent = fb
            ? `<span class="missing-item" style="background:${state._lastCorrect ? '#a8d5a2' : '#e8a8a5'};color:${state._lastCorrect ? '#1b5e20' : '#b71c1c'}">${q.missing}</span>`
            : `<span class="missing-slot">?</span>`;
        const shownHTML = q.shown.map(ing =>
            `<span class="missing-item" style="${cementStyle()}">${ing}</span>`
        ).join('') + slotContent;

        const choicesHTML = q.choices.map((c, idx) => {
            let cls = '';
            let dataCrumble = '';
            if (fb) {
                if (c === q.missing) cls = 'correct-reveal';
                else { cls = 'wrong-reveal crumble-away'; dataCrumble = 'data-crumble="1"'; }
            } else {
                cls = state.selectedChoice === idx ? 'selected' : '';
            }
            return `<button class="choice-btn ${cls}" ${dataCrumble} style="${cementStyle()}" onclick="${fb ? '' : `selectChoice(${idx})`}">${c}</button>`;
        }).join('');

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    <div class="question-title">
                        Пропущенное в <span class="question-dish-name">${dishName}</span>?${drillBadge}
                    </div>
                </div>
                ${resultStripHTML}
                <div class="missing-list">${shownHTML}</div>
                <div class="choice-grid">${choicesHTML}</div>
            </div>
        `;
    } else if (q.type === 'category_sorting') {
        const dishName = q.item.name;
        const catLabels = { base: 'Основа', liquid: 'Жидкости', flavor: 'Вкусовые', topping: 'Топпинг', _wrong: 'Лишнее ❌' };

        let zonesHTML = '';
        for (const cat of q.categories) {
            const placedItems = Object.entries(state.sortingPlacements)
                .filter(([_, c]) => c === cat)
                .map(([ingIdx]) => {
                    const ing = q.sortItems[parseInt(ingIdx)];
                    let itemCls = '';
                    if (fb) {
                        const correctCat = q.correctMap[ing];
                        if (correctCat === cat) itemCls = 'sort-correct';
                        else if (correctCat === '_wrong') itemCls = 'sort-wrong';
                        else itemCls = 'sort-wrong';
                    }
                    return `<span class="drag-item ${itemCls}" style="${cementStyle()}" ${fb ? '' : `onclick="returnFromZone(${ingIdx})"`}>${ing}</span>`;
                }).join('');

            let missedHTML = '';
            if (fb) {
                q.sortItems.forEach((ing, idx) => {
                    if (q.correctMap[ing] === cat && state.sortingPlacements[idx] !== cat) {
                        missedHTML += `<span class="drag-item sort-missed" style="${cementStyle()}">${ing}</span>`;
                    }
                });
            }

            zonesHTML += `
                <div class="sorting-zone" data-zone="${cat}"
                    ondragover="event.preventDefault();this.classList.add('drag-over')"
                    ondragleave="this.classList.remove('drag-over')"
                    ondrop="dropInZone(event,'${cat}');this.classList.remove('drag-over')"
                    ${fb ? '' : `onclick="tapZone('${cat}')"`}>
                    <div class="sorting-zone-label">${catLabels[cat] || cat}</div>
                    <div class="sorting-zone-items">${placedItems}${missedHTML}</div>
                </div>
            `;
        }

        const poolItems = q.sortItems.map((ing, idx) => {
            if (state.sortingPlacements[idx] !== undefined) return '';
            let itemCls = '';
            if (state.tapSelectedItem === idx) itemCls = 'tap-selected';
            return `<span class="drag-item ${itemCls}" style="${cementStyle()}"
                draggable="true"
                ondragstart="dragStart(event,${idx})"
                ondragend="dragEnd(event)"
                onclick="${fb ? '' : `tapItem(${idx})`}">${ing}</span>`;
        }).join('');

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    <div class="question-title">
                        Распредели ингредиенты: <span class="question-dish-name">${dishName}</span>${drillBadge}
                    </div>
                </div>
                ${resultStripHTML}
                <div class="sorting-container">
                    <div class="sorting-zones">${zonesHTML}</div>
                    ${poolItems ? `<div class="sorting-pool-label">Ингредиенты:</div><div class="sorting-pool">${poolItems}</div>` : ''}
                </div>
            </div>
        `;
    } else if (q.type === 'truefalse') {
        const dishName = q.item.name;

        let yesClass = 'tf-btn tf-yes';
        let noClass = 'tf-btn tf-no';
        if (fb) {
            yesClass += q.answer === true ? ' tf-correct' : ' tf-wrong';
            noClass += q.answer === false ? ' tf-correct' : ' tf-wrong';
            yesClass += ' disabled';
            noClass += ' disabled';
        }

        questionHTML = `
            <div class="question-area">
                <div class="question-panel" style="${cementStyle()}">
                    ${categoryBadge}
                    <div class="question-title">
                        <span class="question-dish-name">${q.ingredient}</span>
                        входит в <span class="question-dish-name">${dishName}</span>?${drillBadge}
                    </div>
                </div>
                ${resultStripHTML}
                <div class="tf-buttons">
                    <button class="${yesClass}" style="${cementStyle()}" onclick="${fb ? '' : 'checkTFAnswer(true)'}">Да</button>
                    <button class="${noClass}" style="${cementStyle()}" onclick="${fb ? '' : 'checkTFAnswer(false)'}">Нет</button>
                </div>
            </div>
        `;
    }

    const bottomBg = fb ? (state._lastCorrect ? '#a8d5a2' : '#e8a8a5') : '';
    const bottomColor = fb ? (state._lastCorrect ? '#1b5e20' : '#b71c1c') : '';
    const bottomHTML = fb
        ? `<div class="bottom-area">
            <button class="check-btn active" onclick="nextQuestion()" style="background:${bottomBg};color:${bottomColor}">
                ${state.hearts <= 0 ? 'Результаты' : 'Дальше'}
            </button>
           </div>`
        : (q.type !== 'truefalse' ? (() => {
            let canCheck = false;
            let checkFn = '';
            if (q.type === 'select') {
                canCheck = state.selectedOptions.size > 0;
                checkFn = 'checkSelectAnswer()';
            } else if (q.type === 'missing') {
                canCheck = state.selectedChoice !== null;
                checkFn = 'checkMissingAnswer()';
            } else if (q.type === 'category_sorting') {
                const placedCount = Object.keys(state.sortingPlacements).length;
                canCheck = placedCount === q.sortItems.length;
                checkFn = 'checkSortingAnswer()';
            }
            return `<div class="bottom-area">
                <button class="check-btn ${canCheck ? 'active' : 'disabled'}"
                        onclick="${canCheck ? checkFn : ''}">
                    Проверить
                </button>
               </div>`;
        })() : '');

    app.innerHTML = `
        <div class="lesson-screen">
            <div class="lesson-header">
                <button class="close-btn" onclick="confirmQuit()">✕</button>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width:${progress}%"></div>
                </div>
                <div class="hearts-display" id="hearts-display">${heartsStr}</div>
            </div>
            ${questionHTML}
            ${bottomHTML}
        </div>
    `;

    if (fb && !state._lastCorrect) {
        const display = document.getElementById('hearts-display');
        if (display) display.classList.add('heart-break');
    }
}

function setGram(idx, value) {
    state.gramInputs[idx] = value === '' ? undefined : parseFloat(value);
}

function toggleOption(idx) {
    if (state.feedbackShown) return;
    if (state.selectedOptions.has(idx)) {
        state.selectedOptions.delete(idx);
        delete state.gramInputs[idx];
    } else {
        state.selectedOptions.add(idx);
    }
    const btns = document.querySelectorAll('.option-btn');
    if (btns[idx]) {
        btns[idx].classList.add('crack-effect');
        setTimeout(() => btns[idx].classList.remove('crack-effect'), 400);
    }
    render();
}

function selectChoice(idx) {
    if (state.feedbackShown) return;
    state.selectedChoice = idx;
    const btns = document.querySelectorAll('.choice-btn');
    if (btns[idx]) {
        btns[idx].classList.add('crack-effect');
        setTimeout(() => btns[idx].classList.remove('crack-effect'), 400);
    }
    render();
}

// Break a concrete tablet into flying fragments
function breakTablet(btn) {
    const rect = btn.getBoundingClientRect();
    btn.classList.add('crack-overlay');

    setTimeout(() => {
        const count = 12 + Math.floor(Math.random() * 8);
        for (let i = 0; i < count; i++) {
            const frag = document.createElement('div');
            frag.className = 'concrete-fragment';
            const isChunk = i < 5;
            const w = isChunk ? (15 + Math.random() * 25) : (4 + Math.random() * 10);
            const h = isChunk ? (10 + Math.random() * 20) : (3 + Math.random() * 8);
            frag.style.width = w + 'px';
            frag.style.height = h + 'px';
            frag.style.left = (rect.left + Math.random() * rect.width) + 'px';
            frag.style.top = (rect.top + Math.random() * rect.height) + 'px';
            if (isChunk) {
                const p1 = Math.random() * 30;
                const p2 = 70 + Math.random() * 30;
                const p3 = Math.random() * 30;
                const p4 = 70 + Math.random() * 30;
                frag.style.clipPath = `polygon(${p1}% 0%, ${p2}% ${p3}%, 100% ${p4}%, ${100-p1}% 100%, ${p3}% ${p2}%, 0% ${100-p4}%)`;
            }
            const fx = (Math.random() - 0.5) * 200;
            const fy = 40 + Math.random() * 120;
            const fr = (Math.random() - 0.5) * 540;
            frag.style.setProperty('--fx', fx + 'px');
            frag.style.setProperty('--fy', fy + 'px');
            frag.style.setProperty('--fr', fr + 'deg');
            const dur = 0.5 + Math.random() * 0.5;
            frag.style.animation = `fragmentFly ${dur}s cubic-bezier(.2,0,.8,.4) forwards`;
            document.body.appendChild(frag);
            setTimeout(() => frag.remove(), 1200);
        }
        btn.style.visibility = 'hidden';
    }, 350);
}

// ====================== DRAG & DROP / TAP SORTING ======================
let _dragIdx = null;

function dragStart(e, idx) {
    _dragIdx = idx;
    e.dataTransfer.setData('text/plain', idx);
    e.target.classList.add('dragging');
}

function dragEnd(e) {
    e.target.classList.remove('dragging');
    _dragIdx = null;
}

function dropInZone(e, zone) {
    e.preventDefault();
    const idx = parseInt(e.dataTransfer.getData('text/plain'));
    if (isNaN(idx) || state.feedbackShown) return;
    state.sortingPlacements[idx] = zone;
    state.tapSelectedItem = null;
    render();
}

function tapItem(idx) {
    if (state.feedbackShown) return;
    if (state.tapSelectedItem === idx) {
        state.tapSelectedItem = null;
    } else {
        state.tapSelectedItem = idx;
    }
    render();
}

function tapZone(zone) {
    if (state.feedbackShown || state.tapSelectedItem === null) return;
    state.sortingPlacements[state.tapSelectedItem] = zone;
    state.tapSelectedItem = null;
    render();
}

function returnFromZone(idx) {
    if (state.feedbackShown) return;
    delete state.sortingPlacements[idx];
    render();
}

function checkSortingAnswer() {
    const q = state.questions[state.currentQIdx];
    let correctCount = 0;
    q.sortItems.forEach((ing, idx) => {
        const correctCat = q.correctMap[ing];
        if (state.sortingPlacements[idx] === correctCat) correctCount++;
    });
    const isCorrect = correctCount === q.sortItems.length;
    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

// ====================== ANSWER CHECKING ======================
function checkSelectAnswer() {
    const q = state.questions[state.currentQIdx];
    const selectedItems = [...state.selectedOptions].map(i => q.pool[i]);
    const correctSet = new Set(q.item._ingredients);
    const selectedSet = new Set(selectedItems);
    let isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(c => selectedSet.has(c));

    // Check grams if applicable
    let gramsCorrect = true;
    if (q.showGrams && isCorrect) {
        for (const idx of state.selectedOptions) {
            const ing = q.pool[idx];
            if (q.item._grams[ing] !== undefined) {
                const userGram = state.gramInputs[idx];
                if (userGram === undefined || Math.abs(userGram - q.item._grams[ing]) > 2) {
                    gramsCorrect = false;
                    break;
                }
            }
        }
        if (!gramsCorrect) isCorrect = false;
    }

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function checkMissingAnswer() {
    const q = state.questions[state.currentQIdx];
    const selected = q.choices[state.selectedChoice];
    const isCorrect = selected === q.missing;

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function checkTFAnswer(userAnswer) {
    const q = state.questions[state.currentQIdx];
    const isCorrect = userAnswer === q.answer;

    const timeTaken = (Date.now() - (state._questionStartTime || Date.now())) / 1000;
    processAnswer(isCorrect, q.item, q.format, timeTaken);
}

function processAnswer(isCorrect, item, format, timeTaken) {
    state.sessionTotal++;
    recordAnswer(item.name, isCorrect);
    recordFormatAnswer(format, isCorrect, timeTaken);

    const currentQ = state.questions[state.currentQIdx];

    if (isCorrect) {
        state.sessionCorrect++;
        state.sessionXP += 10;
        state._lastCorrect = true;
    } else {
        state.hearts--;
        state._lastCorrect = false;
        if (!state.mistakeIds.includes(item.name)) {
            state.mistakeIds.push(item.name);
        }
        if (!state.drilledItems.has(item.name) && !(currentQ && currentQ.isDrill)) {
            state.drilledItems.add(item.name);
            const drillQs = generateDrillQuestions(item, currentQ ? currentQ.type : 'select');
            if (drillQs.length > 0) {
                state.questions.splice(state.currentQIdx + 1, 0, ...drillQs);
            }
        }
    }

    state._lastItem = item;
    state.feedbackShown = true;
    render();

    setTimeout(() => {
        document.querySelectorAll('[data-crumble]').forEach(btn => {
            breakTablet(btn);
        });
    }, 50);
}

function nextQuestion() {
    if (state.hearts <= 0) {
        finishLesson();
        return;
    }

    state.currentQIdx++;
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.gramInputs = {};
    state.sortingPlacements = {};
    state.tapSelectedItem = null;
    state._questionStartTime = Date.now();

    if (state.currentQIdx >= state.questions.length) {
        finishLesson();
    } else {
        render();
    }
}

function finishLesson() {
    const xpEarned = state.sessionXP + (state.hearts > 0 ? 15 : 0);
    addXP(xpEarned);

    if (!state.isPractice && state.currentLessonIdx >= 0 && state.hearts > 0) {
        saveLessonComplete(state.section, state.currentLessonIdx, state.sessionCorrect, state.sessionTotal);
    }

    state.screen = 'result';
    state._finalXP = xpEarned;
    render();

    if (state.sessionCorrect === state.sessionTotal && state.sessionTotal > 0) {
        setTimeout(showConfetti, 300);
    }
    setTimeout(() => showXPPopup(xpEarned), 500);
}

function renderResult() {
    const accuracy = state.sessionTotal > 0
        ? Math.round((state.sessionCorrect / state.sessionTotal) * 100)
        : 0;

    const barColor = accuracy >= 80 ? 'var(--green)' : accuracy >= 50 ? 'var(--gold)' : 'var(--red)';
    const resultEmoji = accuracy === 100 ? '🏆' : accuracy >= 80 ? '🌟' : accuracy >= 50 ? '👍' : '💪';
    const resultTitle = accuracy === 100 ? 'Идеально!' :
                        accuracy >= 80 ? 'Отличная работа!' :
                        accuracy >= 50 ? 'Неплохо!' : 'Нужно ещё потренироваться';
    const resultSub = state.hearts <= 0 ? 'Жизни закончились, но ты молодец!' :
                      `Ты заработал ${state._finalXP} XP!`;

    app.innerHTML = `
        <div class="result-screen">
            <div class="result-mascot">${resultEmoji}</div>
            <div class="result-title">${resultTitle}</div>
            <div class="result-subtitle">${resultSub}</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--green)">${state.sessionCorrect}</div>
                    <div class="result-stat-label">Верно</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--red)">${state.sessionTotal - state.sessionCorrect}</div>
                    <div class="result-stat-label">Ошибок</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--gold)">${state._finalXP}</div>
                    <div class="result-stat-label">XP</div>
                </div>
            </div>
            <div class="result-accuracy-bar">
                <div class="result-accuracy-fill" style="width:0%;background:${barColor}"></div>
            </div>
            <p style="color:var(--text-secondary);margin-bottom:24px;font-weight:700">${accuracy}% точность</p>
            <button class="result-btn primary" onclick="returnToPath()">Продолжить</button>
            ${state.mistakeIds.length > 0 ? `<button class="result-btn secondary" onclick="retryMistakes()">🔄 Повторить ошибки (${state.mistakeIds.length})</button>` : ''}
        </div>
    `;

    setTimeout(() => {
        const fill = document.querySelector('.result-accuracy-fill');
        if (fill) fill.style.width = accuracy + '%';
    }, 100);
}

function returnToPath() {
    state.screen = 'path';
    render();
}

function retryMistakes() {
    const mistakeItems = state.allData.filter(d => state.mistakeIds.includes(d.name));
    if (mistakeItems.length === 0) {
        returnToPath();
        return;
    }
    state.isPractice = true;
    state.questions = generateQuestions(mistakeItems);
    state.currentQIdx = 0;
    state.hearts = 5;
    state.sessionXP = 0;
    state.sessionCorrect = 0;
    state.sessionTotal = 0;
    state.mistakeIds = [];
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.gramInputs = {};
    state.sortingPlacements = {};
    state.tapSelectedItem = null;
    state.drilledItems = new Set();
    state._questionStartTime = Date.now();
    state.screen = 'lesson';
    render();
}

// ====================== QUIT CONFIRMATION ======================
function confirmQuit() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-content">
            <div class="modal-title">Выйти из урока?</div>
            <div class="modal-text">Твой прогресс в этом уроке не сохранится.</div>
            <button class="modal-btn primary" onclick="this.closest('.modal-overlay').remove()">Остаться</button>
            <button class="modal-btn secondary" onclick="quitLesson()">Выйти</button>
        </div>
    `;
    document.body.appendChild(overlay);
}

function quitLesson() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
    state.screen = 'path';
    render();
}

// ====================== INIT ======================
render();
</script>
</body>
</html>
