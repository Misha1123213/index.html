<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТТК Duolingo — Темная Тема</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #131f24; color: #f1f7fb; display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        .app-container { background: #1b2c34; width: 100%; max-width: 450px; border-radius: 20px; border: 2px solid #37464f; padding: 20px; display: flex; flex-direction: column; position: relative; }
        
        /* Прогресс-бар Duolingo */
        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .close-btn { font-size: 24px; color: #4b5a63; cursor: pointer; border: none; background: none; }
        .progress-bar { background: #37464f; height: 16px; flex-grow: 1; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: #58cc02; height: 100%; width: 0%; transition: width 0.3s ease; border-radius: 10px; }

        .question-title { font-size: 18px; font-weight: 700; color: #afbbca; margin-bottom: 8px; text-align: center; }
        .dish-name { font-size: 22px; color: #1cb0f6; font-weight: 800; text-align: center; margin-bottom: 25px; }
        
        /* Зона сборки рецепта */
        .preview-zone { min-height: 100px; border: 2px dashed #4b5a63; border-radius: 15px; padding: 15px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 8px; background: #131f24; align-content: flex-start; }
        .preview-item { background: #184e68; color: #70d2ff; padding: 8px 12px; border-radius: 10px; font-weight: 600; font-size: 14px; border: 1px solid #287194; cursor: pointer; }

        /* Сетка ингредиентов / вариантов ответов */
        .ingredients-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: auto; }
        .ing-btn { background: #1b2c34; border: 2px solid #37464f; border-bottom: 4px solid #37464f; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: bold; color: #f1f7fb; cursor: pointer; transition: all 0.1s; text-align: center; }
        .ing-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
        .ing-btn.selected { background: #24353f; border-color: #4b5a63; color: #4b5a63; border-bottom-width: 2px; transform: translateY(2px); pointer-events: none; }

        /* Специальный стиль для кнопок аллергенов (один в ряд для удобства чтения) */
        .ingredients-grid.allergen-mode { grid-template-columns: 1fr; }

        /* Нижняя панель */
        .check-panel { margin-top: 30px; display: flex; gap: 10px; }
        .main-action-btn { width: 100%; background: #58cc02; border: none; border-bottom: 4px solid #46a302; color: white; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.8px; }
        .main-action-btn:active { border-bottom-width: 0px; transform: translateY(4px); }
        .main-action-btn:disabled { background: #37464f; border-bottom: 4px solid #24353f; color: #4b5a63; cursor: not-allowed; }
        .reset-btn { background: #cc2a2a; border-bottom: 4px solid #9e1b1b; max-width: 80px; }

        /* Окно результата */
        .result-screen { display: none; position: absolute; bottom: 0; left: 0; right: 0; background: #24353f; border-top: 2px solid #37464f; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 25px; box-shadow: 0 -8px 24px rgba(0,0,0,0.3); animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .result-status { font-size: 22px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .result-status.success { color: #58cc02; }
        .result-status.error { color: #ff4b4b; }
        .result-details { font-size: 15px; color: #afbbca; margin-bottom: 20px; line-height: 1.5; white-space: pre-line; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-container">
        <button class="close-btn" onclick="location.reload()">×</button>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="question-title" id="question-type-title">Собери состав для:</div>
    <div class="dish-name" id="dish-title">Загрузка...</div>

    <div class="preview-zone" id="preview-zone"></div>
    <div class="ingredients-grid" id="ingredients-grid"></div>

    <div class="check-panel">
        <button class="main-action-btn reset-btn" id="reset-btn" onclick="resetCurrentQuestion()">↩</button>
        <button class="main-action-btn" id="action-btn" disabled onclick="checkAnswer()">Проверить</button>
    </div>

    <div class="result-screen" id="result-screen">
        <div class="result-status" id="result-status"></div>
        <div class="result-details" id="result-details"></div>
        <button class="main-action-btn" id="next-btn" onclick="nextQuestion()">Дальше</button>
    </div>
</div>

<script>
    let DISHES_DB = [];
    let currentQuestionIndex = 0;
    let selectedAnswers = [];

    async function loadDishes() {
        try {
            const response = await fetch('dishes.json');
            DISHES_DB = await response.json();
            // Перемешиваем весь массив вопросов, чтобы они шли случайно каждую игру
            DISHES_DB.sort(() => Math.random() - 0.5);
            initQuestion();
        } catch (error) {
            document.getElementById('dish-title').innerText = "Ошибка загрузки данных 😢";
            console.error(error);
        }
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initQuestion() {
        if (!DISHES_DB.length) return;
        if (currentQuestionIndex >= DISHES_DB.length) {
            currentQuestionIndex = 0;
            DISHES_DB.sort(() => Math.random() - 0.5);
        }

        const currentItem = DISHES_DB[currentQuestionIndex];
        selectedAnswers = [];
        
        // Прогресс
        const progressPercent = (currentQuestionIndex / DISHES_DB.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;

        // Настройка типа вопроса
        const typeTitle = document.getElementById('question-type-title');
        const previewZone = document.getElementById('preview-zone');
        const grid = document.getElementById('ingredients-grid');

        if (currentItem.type === "allergen") {
            typeTitle.innerText = "Какие главные АЛЛЕРГЕНЫ содержит:";
            previewZone.style.minHeight = "60px";
            grid.className = "ingredients-grid allergen-mode";
        } else {
            typeTitle.innerText = "Выбери все ингредиенты, входящие в:";
            previewZone.style.minHeight = "100px";
            grid.className = "ingredients-grid";
        }

        document.getElementById('dish-title').innerText = currentItem.name;
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('action-btn').disabled = true;
        
        renderPreview();

        grid.innerHTML = '';
        const shuffledPool = shuffle([...currentItem.pool]);
        
        shuffledPool.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'ing-btn';
            btn.innerText = item;
            btn.onclick = () => toggleSelect(item, btn);
            grid.appendChild(btn);
        });
    }

    function toggleSelect(item, btn) {
        const index = selectedAnswers.indexOf(item);
        if (index > -1) {
            selectedAnswers.splice(index, 1);
            btn.classList.remove('selected');
            btn.innerText = item;
        } else {
            selectedAnswers.push(item);
            btn.classList.add('selected');
            btn.innerText += " ✅";
        }
        
        document.getElementById('action-btn').disabled = selectedAnswers.length === 0;
        renderPreview();
    }

    function resetCurrentQuestion() {
        selectedAnswers = [];
        document.getElementById('action-btn').disabled = true;
        renderPreview();
        const buttons = document.querySelectorAll('.ing-btn');
        buttons.forEach(btn => {
            btn.classList.remove('selected');
            // Убираем галочку из текста
            if (btn.innerText.includes(" ✅")) {
                btn.innerText = btn.innerText.replace(" ✅", "");
            }
        });
    }

    function renderPreview() {
        const zone = document.getElementById('preview-zone');
        zone.innerHTML = '';
        if (selectedAnswers.length === 0) {
            zone.innerHTML = '<span style="color:#4b5a63; text-align:center; font-size:14px; margin:auto;">Нажимай на варианты ниже...</span>';
            return;
        }
        selectedAnswers.forEach((item) => {
            const el = document.createElement('div');
            el.className = 'preview-item';
            el.innerText = item;
            zone.appendChild(el);
        });
    }

    function checkAnswer() {
        const currentItem = DISHES_DB[currentQuestionIndex];
        
        // Логика проверки без учета порядка (сравниваем через сортированные массивы)
        const sortedSelected = [...selectedAnswers].sort();
        const sortedCorrect = [...currentItem.correct].sort();
        const isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        
        const screen = document.getElementById('result-screen');
        const status = document.getElementById('result-status');
        const details = document.getElementById('result-details');
        const nextBtn = document.getElementById('next-btn');

                if (isCorrect) {
            status.className = 'result-status success';
            status.innerText = '🎉 Правильно!';
            details.innerText = currentItem.type === "allergen" ? 'Аллергены определены абсолютно верно.' : 'Состав блюда/полуфабриката выбран верно.';
            nextBtn.style.background = '#58cc02';
            nextBtn.style.borderBottom = '4px solid #46a302';
            currentQuestionIndex++;
        } else {
            status.className = 'result-status error';
            status.innerText = '❌ Ошибка!';
            details.innerText = currentItem.info_text;
            nextBtn.style.background = '#ff4b4b';
            nextBtn.style.borderBottom = '4px solid #ea2b2b';
        }
    }

    function nextQuestion() {
        initQuestion();
    }

    loadDishes();
</script>
</body>
</html>
