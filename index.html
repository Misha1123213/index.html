<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MET Академия ☕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #4CAF50;
            --green-dark: #388E3C;
            --green-light: #66BB6A;
            --blue: #78909C;
            --blue-dark: #546E7A;
            --red: #E53935;
            --red-dark: #C62828;
            --gold: #FFC107;
            --gold-dark: #FFA000;
            --purple: #9E9E9E;
            --orange: #FF9800;
            --bg-dark: #1a1a1a;
            --bg-card: rgba(38,38,38,0.92);
            --bg-card-hover: rgba(50,50,50,0.95);
            --bg-modal: #2a2a2a;
            --text-primary: #FAFAFA;
            --text-secondary: #B0B0B0;
            --text-dim: #707070;
            --border: rgba(255,255,255,0.12);
            --border-light: rgba(255,255,255,0.2);
            --shadow: rgba(0,0,0,0.5);
            --concrete: #b5b0a8;
            --concrete-light: #c5c0b8;
            --concrete-dark: #9a958d;
            --concrete-text: #2a2a2a;
            --concrete-border: rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            background-image: url('img/bg-cafe.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(20,20,20,0.82);
            z-index: 0;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        /* Header bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
        }
        .top-bar-stat .icon { font-size: 20px; }
        .streak-count { color: var(--gold); }
        .xp-count { color: var(--text-primary); }
        .hearts-count { color: var(--red); }

        /* Home screen */
        .home-screen { padding: 20px 16px 40px; }
        .mascot-area {
            text-align: center;
            padding: 30px 0 20px;
        }
        .mascot {
            font-size: 80px;
            display: block;
            animation: mascotBounce 2s ease-in-out infinite;
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .app-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-primary);
            margin: 10px 0 4px;
            letter-spacing: -0.5px;
        }
        .app-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Concrete texture mixin */
        .concrete-tex {
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
        }

        /* Section cards - concrete tablet style */
        .section-card {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 0;
            margin-bottom: 16px;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            overflow: hidden;
            position: relative;
            box-shadow: 2px 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);
        }
        .section-card:hover { transform: translateY(-3px); box-shadow: 3px 6px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25); }
        .section-card:active { transform: translateY(0px); box-shadow: 1px 2px 6px rgba(0,0,0,0.4); }
        .section-card .card-img {
            width: 90px; height: 90px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 4px 0 0 4px;
        }
        .section-card .card-info {
            flex: 1;
            padding: 18px 0;
        }
        .section-card .card-info small {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(42,42,42,0.6);
            margin-top: 3px;
        }
        .section-card .card-arrow {
            color: rgba(42,42,42,0.4);
            font-size: 22px;
            padding-right: 16px;
        }

        /* Daily stats bar */
        .daily-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .daily-stat-card {
            flex: 1;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
            border: none;
            border-radius: 4px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .daily-stat-card .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--concrete-text);
        }
        .daily-stat-card .stat-label {
            font-size: 11px;
            color: rgba(42,42,42,0.6);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Path screen */
        .path-screen { padding: 20px 16px 100px; }
        .path-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 4px;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            border: none;
            color: var(--concrete-text);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .back-btn:hover { background: var(--concrete-light); }
        .path-title {
            font-size: 22px;
            font-weight: 900;
        }

        /* Lesson path nodes */
        .path-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            position: relative;
        }
        .path-row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .path-connector {
            width: 3px;
            height: 30px;
            background: var(--concrete-dark);
            margin: 0 auto;
        }
        .path-connector.completed { background: rgba(76,175,80,0.6); }

        .lesson-node {
            width: 70px; height: 70px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 4px solid;
            font-family: inherit;
            color: var(--text-primary);
        }
        .lesson-node .node-sub {
            font-size: 9px;
            font-weight: 700;
            opacity: 0.8;
        }
        .lesson-node.locked {
            background: var(--concrete-dark);
            border-color: rgba(0,0,0,0.15);
            color: rgba(42,42,42,0.4);
            cursor: default;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35);
        }
        .lesson-node.available {
            background: var(--concrete-light);
            border-color: var(--concrete-text);
            color: var(--concrete-text);
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            animation: nodePulse 2s ease-in-out infinite;
        }
        .lesson-node.available:hover { transform: translateY(-3px); }
        .lesson-node.available:active {
            transform: translateY(2px);
            box-shadow: 0 1px 4px rgba(255,255,255,0.1);
        }
        @keyframes nodePulse {
            0%, 100% { box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 0 0 rgba(181,176,168,0.4); }
            50% { box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 0 8px rgba(181,176,168,0); }
        }
        .lesson-node.completed {
            background: var(--concrete);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .lesson-node.completed:hover { transform: translateY(-3px); }
        .lesson-node.completed:active {
            transform: translateY(2px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .lesson-node.practice {
            background: var(--concrete);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
        .lesson-node.practice:hover { transform: translateY(-3px); }

        /* Crown badges */
        .crown-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--gold);
            color: #333;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--gold-dark);
        }

        /* Practice button */
        .practice-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .practice-btn:hover { background: var(--concrete-light); }

        /* Lesson screen */
        .lesson-screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .lesson-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .close-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: none;
            border: 2px solid var(--border);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: inherit;
        }
        .close-btn:hover { border-color: var(--text-secondary); }

        .progress-bar-container {
            flex: 1;
            height: 12px;
            background: rgba(181,176,168,0.3);
            border-radius: 3px;
            overflow: hidden;
            border: none;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--concrete);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .hearts-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 800;
            font-size: 16px;
            color: var(--red);
        }

        /* Question area - concrete tablet panel */
        .question-area {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
        }
        .question-panel {
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
            border-radius: 4px;
            padding: 18px 20px;
            margin-bottom: 16px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .question-type-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(42,42,42,0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .question-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0;
            color: var(--concrete-text);
        }
        .question-dish-name {
            color: var(--concrete-text);
            font-weight: 800;
        }

        /* Ingredient buttons grid - concrete tablet style */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .option-btn {
            padding: 10px 16px;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            user-select: none;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .option-btn:hover { background-color: var(--concrete-light); transform: translateY(-1px); box-shadow: 3px 4px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }
        .option-btn:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .option-btn.selected {
            background: #e8e4dc;
            outline: 2px solid #555;
            color: var(--concrete-text);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
        }
        .option-btn.correct-reveal {
            background: #a8d5a2;
            color: #1b5e20;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }
        .option-btn.wrong-reveal {
            background: #e8a8a5;
            color: #b71c1c;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }
        /* Crack overlay on wrong answer tablets before they break */
        .option-btn.crack-overlay::after,
        .choice-btn.crack-overlay::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: url('img/concrete-cracks.png') center/cover no-repeat;
            opacity: 0.7;
            pointer-events: none;
            animation: crackAppear 0.3s ease-out forwards;
            z-index: 2;
        }
        @keyframes crackAppear {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        /* Break apart into fragments animation */
        .option-btn.crumble-away,
        .choice-btn.crumble-away {
            animation: none;
        }
        /* Crack effect on click */
        .option-btn.crack-effect::after,
        .choice-btn.crack-effect::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: url('img/concrete-cracks.png') center/cover no-repeat;
            opacity: 0;
            animation: crackFlash 0.4s ease-out forwards;
            pointer-events: none;
            border-radius: 4px;
            z-index: 2;
        }
        @keyframes crackFlash {
            0% { opacity: 0; transform: scale(0.85); }
            40% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        /* True/False buttons - concrete tablet */
        .tf-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .tf-btn {
            flex: 1;
            padding: 20px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            overflow: hidden;
        }
        .tf-btn:active { transform: translateY(2px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .tf-btn.tf-yes {
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            color: #2e7d32;
        }
        .tf-btn.tf-yes:hover { background-color: var(--concrete-light); }
        .tf-btn.tf-no {
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            color: #c62828;
        }
        .tf-btn.tf-no:hover { background-color: var(--concrete-light); }

        /* Missing ingredient choices */
        .missing-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .missing-item {
            padding: 8px 14px;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 14px;
            font-weight: 600;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .missing-slot {
            padding: 8px 14px;
            background: rgba(181,176,168,0.3);
            border: 2px dashed var(--concrete-dark);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            animation: slotPulse 1.5s ease-in-out infinite;
        }
        @keyframes slotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .choice-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            width: 100%;
            padding: 14px 18px;
            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.12s;
            text-align: left;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .choice-btn:hover { background-color: var(--concrete-light); transform: translateY(-1px); }
        .choice-btn:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .choice-btn.selected { background: #e8e4dc; outline: 2px solid #555; color: var(--concrete-text); }
        .choice-btn.correct-reveal {
            background: #a8d5a2;
            color: #1b5e20;
        }
        .choice-btn.wrong-reveal {
            background: #e8a8a5;
            color: #b71c1c;
        }
        .choice-btn.crumble-away {
            animation: none;
        }

        /* Check button - concrete tablet */
        .bottom-area {
            padding: 16px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }
        .check-btn {
            width: 100%;
            padding: 16px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }
        .check-btn.active {
            background: var(--concrete-light);
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
            color: var(--concrete-text);
            box-shadow: 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.1);
        }
        .check-btn.active:hover { background-color: #d0cbc3; transform: translateY(-1px); box-shadow: 3px 4px 12px rgba(0,0,0,0.45); }
        .check-btn.active:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .check-btn.disabled {
            background: rgba(181,176,168,0.3);
            color: var(--text-dim);
            cursor: default;
            box-shadow: none;
        }

        /* Inline feedback result strip */
        .inline-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }
        .inline-result.correct {
            background: #a8d5a2;
            color: #1b5e20;
        }
        .inline-result.wrong {
            background: #e8a8a5;
            color: #b71c1c;
        }
        .inline-result .result-icon { font-size: 20px; }

        /* Disabled state for answered buttons */
        .option-btn.disabled, .choice-btn.disabled, .tf-btn.disabled {
            pointer-events: none;
            opacity: 0.5;
        }
        .option-btn.correct-reveal, .choice-btn.correct-reveal {
            opacity: 1 !important;
        }
        .option-btn.wrong-reveal, .choice-btn.wrong-reveal {
            opacity: 1 !important;
        }
        
        /* Concrete fragment particles for break animation */
        .concrete-fragment {
            position: fixed;
            background-image: url('img/concrete-texture.jpg');
            background-size: 100px 100px;
            border-radius: 1px;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.4);
        }
        @keyframes fragmentFly {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            30% { opacity: 1; }
            100% { transform: translate(var(--fx), var(--fy)) rotate(var(--fr)) scale(0.3); opacity: 0; }
        }

        .tf-btn.tf-correct {

        }

        }

        /* Result screen */
        .result-screen {
            min-height: 100dvh;

        /* Modal overlay */

            background: var(--concrete);
            background-image: url('img/concrete-texture.jpg');
            background-size: 300px 300px;
            border: none;
            border-radius: 4px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            animation: modalPop 0.3s ease;
            box-shadow: 3px 5px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--concrete-text);
        }
        .modal-text {
            font-size: 14px;
            color: rgba(42,42,42,0.7);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            margin-bottom: 10px;

        .modal-btn.primary {
            background: var(--concrete-light);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            color: var(--concrete-text);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .modal-btn.secondary {
            background: var(--concrete-dark);
            background-image: url('img/concrete-texture.jpg');
            background-size: 200px 200px;
            color: rgba(42,42,42,0.7);
        }

        /* Info tooltip */
        .info-box {
            background: rgba(181,176,168,0.15);
            border: none;
            border-radius: 4px;
            padding: 14px 16px;
            margin-top: 12px;

        /* XP popup */
        .xp-popup {
            position: fixed;
            top: 50%;

        /* Shake animation */
        @keyframes shake {

<body>
<div id="app"></div>
<script>
// ====================== STATE ======================
const APP_KEY = 'ttk_academy_v2';

let state = {
    screen: 'home',
    section: null,
    sectionLabel: '',
    allData: [],
    lessons: [],
    currentLessonIdx: null,
    questions: [],
    currentQIdx: 0,
    hearts: 5,
    sessionXP: 0,
    sessionCorrect: 0,
    sessionTotal: 0,
    mistakeIds: [],
    feedbackShown: false,
    selectedOptions: new Set(),
    selectedChoice: null,
    isPractice: false,
};

function loadProgress() {
    try {
        const raw = localStorage.getItem(APP_KEY);
        return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
}
function saveProgress(data) {
    const current = loadProgress();
    Object.assign(current, data);
    localStorage.setItem(APP_KEY, JSON.stringify(current));
}
function getProgress() { return loadProgress(); }

function getSectionProgress(section) {
    const p = getProgress();
    return p[section] || {};
}
function saveLessonComplete(section, lessonIdx, score, total) {
    const p = getProgress();
    if (!p[section]) p[section] = {};
    const key = `lesson_${lessonIdx}`;
    const prev = p[section][key] || { completed: false, crowns: 0, bestScore: 0 };
    prev.completed = true;
    prev.crowns = Math.min(5, prev.crowns + 1);
    prev.bestScore = Math.max(prev.bestScore, score);
    p[section][key] = prev;
    saveProgress(p);
}
function getGlobalStats() {
    const p = getProgress();
    return {
        totalXP: p.totalXP || 0,
        streak: p.streak || 0,
        lastDate: p.lastDate || null,
        totalLessons: p.totalLessons || 0,
    };
}
function addXP(amount) {
    const p = getProgress();
    p.totalXP = (p.totalXP || 0) + amount;
    const today = new Date().toDateString();
    if (p.lastDate !== today) {
        if (p.lastDate === new Date(Date.now() - 86400000).toDateString()) {
            p.streak = (p.streak || 0) + 1;
        } else if (p.lastDate !== today) {
            p.streak = 1;
        }
        p.lastDate = today;
    }
    p.totalLessons = (p.totalLessons || 0) + 1;
    saveProgress(p);
}

// Track weak items for spaced repetition
function recordAnswer(itemName, correct) {
    const p = getProgress();
    if (!p.itemStrength) p.itemStrength = {};
    const s = p.itemStrength[itemName] || { strength: 3, attempts: 0 };
    s.attempts++;
    if (correct) {
        s.strength = Math.min(5, s.strength + 1);
    } else {
        s.strength = Math.max(0, s.strength - 1.5);
    }
    s.lastSeen = Date.now();
    p.itemStrength[itemName] = s;
    saveProgress(p);
}
function getWeakItems(section) {
    const p = getProgress();
    if (!p.itemStrength) return [];
    const sectionData = state.allData;
    return sectionData
        .filter(d => {
            const s = p.itemStrength[d.name];
            return s && s.strength < 3;
        })
        .sort((a, b) => {
            const sa = (p.itemStrength[a.name] || {}).strength || 3;
            const sb = (p.itemStrength[b.name] || {}).strength || 3;
            return sa - sb;
        });
}

// ====================== UTILITIES ======================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function showConfetti() {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);
    const colors = ['#58CC02', '#1CB0F6', '#FFC800', '#FF9600', '#CE82FF', '#FF4B4B'];
    for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        container.appendChild(piece);
    }
    setTimeout(() => container.remove(), 4000);
}

function showXPPopup(amount) {
    const popup = document.createElement('div');
    popup.className = 'xp-popup';
    popup.textContent = `+${amount} XP`;
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 1600);
}

// ====================== RENDERING ======================
const app = document.getElementById('app');

function render() {
    switch (state.screen) {
        case 'home': renderHome(); break;
        case 'path': renderPath(); break;
        case 'lesson': renderLesson(); break;
        case 'result': renderResult(); break;
    }
}

function renderHome() {
    const stats = getGlobalStats();
    app.innerHTML = `
        <div class="top-bar">
            <div class="top-bar-stat">
                <span class="icon">🔥</span>
                <span class="streak-count">${stats.streak}</span>
            </div>
            <div class="top-bar-stat">
                <span class="icon">⚡</span>
                <span class="xp-count">${stats.totalXP} XP</span>
            </div>
            <div class="top-bar-stat">
                <span class="icon">📚</span>
                <span style="color:var(--purple)">${stats.totalLessons}</span>
            </div>
        </div>
        <div class="home-screen">
            <div class="mascot-area">
                <span class="mascot">☕</span>
                <div class="app-title">MET Академия</div>
                <div class="app-subtitle">Изучай составы блюд</div>
            </div>
            <div class="daily-stats">
                <div class="daily-stat-card">
                    <div class="stat-value streak-count">🔥 ${stats.streak}</div>
                    <div class="stat-label">Серия дней</div>
                </div>
                <div class="daily-stat-card">
                    <div class="stat-value xp-count">⚡ ${stats.totalXP}</div>
                    <div class="stat-label">Всего XP</div>
                </div>
                <div class="daily-stat-card">
                    <div class="stat-value" style="color:var(--green)">📚 ${stats.totalLessons}</div>
                    <div class="stat-label">Уроков</div>
                </div>
            </div>
            <button class="section-card" onclick="selectSection('kitchen')">
                <img class="card-img" src="img/shakshuka.jpg" alt="Кухня">
                <div class="card-info">
                    Кухня
                    <small>Завтраки, супы, салаты, сэндвичи</small>
                </div>
                <div class="card-arrow">›</div>
            </button>
            <button class="section-card" onclick="selectSection('desserts')">
                <img class="card-img" src="img/tart.jpg" alt="Десерты">
                <div class="card-info">
                    Десерты
                    <small>Выпечка, кексы, печенье</small>
                </div>
                <div class="card-arrow">›</div>
            </button>
            <button class="section-card" onclick="selectSection('drinks')">
                <img class="card-img" src="img/cappuccino.jpg" alt="Напитки">
                <div class="card-info">
                    Напитки
                    <small>Кофе, лимонады, чай</small>
                </div>
                <div class="card-arrow">›</div>
            </button>
        </div>
    `;
}

async function selectSection(section) {
    state.section = section;
    const labels = { kitchen: '🍳 Кухня', desserts: '🍰 Десерты', drinks: '🍹 Напитки' };
    state.sectionLabel = labels[section] || section;

    app.innerHTML = `<div class="loading-screen"><div class="loader"></div><p>Загрузка...</p></div>`;

    const fileName = (section === 'kitchen') ? 'dishes.json' : `${section}.json`;
    try {
        const response = await fetch(fileName);
        if (!response.ok) throw new Error('File not found');
        state.allData = await response.json();
        buildLessons();
        state.screen = 'path';
        render();
    } catch (e) {
        app.innerHTML = `
            <div class="loading-screen">
                <span style="font-size:60px">😔</span>
                <p>Файл ${fileName} не найден</p>
                <button class="result-btn secondary" style="margin-top:20px;max-width:280px" onclick="goHome()">Назад</button>
            </div>
        `;
    }
}

function buildLessons() {
    const data = state.allData;
    const lessonSize = 8;
    state.lessons = [];
    for (let i = 0; i < data.length; i += lessonSize) {
        state.lessons.push(data.slice(i, i + lessonSize));
    }
}

function renderPath() {
    const stats = getGlobalStats();
    const sp = getSectionProgress(state.section);
    const weakItems = getWeakItems(state.section);

    // Determine which lesson is the first incomplete
    let firstIncomplete = state.lessons.length;
    for (let i = 0; i < state.lessons.length; i++) {
        const ld = sp[`lesson_${i}`];
        if (!ld || !ld.completed) {
            firstIncomplete = i;
            break;
        }
    }

    let nodesHTML = '';
    const offsets = [0, 40, 60, 40, 0, -40, -60, -40];

    for (let i = 0; i < state.lessons.length; i++) {
        const ld = sp[`lesson_${i}`] || {};
        let nodeClass = 'locked';
        let clickHandler = '';

        if (i < firstIncomplete) {
            nodeClass = 'completed';
            clickHandler = `onclick="startLesson(${i})"`;
        } else if (i === firstIncomplete) {
            nodeClass = 'available';
            clickHandler = `onclick="startLesson(${i})"`;
        }

        const offset = offsets[i % offsets.length];
        const crownHTML = ld.crowns > 0 ? `<span class="crown-badge">👑${ld.crowns > 1 ? ld.crowns : ''}</span>` : '';
        const connectorClass = i < firstIncomplete ? 'completed' : '';

        if (i > 0) {
            nodesHTML += `<div class="path-connector ${connectorClass}"></div>`;
        }

        nodesHTML += `
            <div class="path-row">
                <button class="lesson-node ${nodeClass}" ${clickHandler} style="margin-left:${offset}px">
                    ${crownHTML}
                    ${i + 1}
                    <span class="node-sub">${state.lessons[i].length} карт</span>
                </button>
            </div>
        `;
    }

    const practiceHTML = weakItems.length > 0 ? `
        <button class="practice-btn" onclick="startPractice()">
            🏋️ Тренировка слабых мест (${weakItems.length})
        </button>
    ` : '';

    app.innerHTML = `
        <div class="top-bar">
            <div class="top-bar-stat">
                <span class="icon">🔥</span>
                <span class="streak-count">${stats.streak}</span>
            </div>
            <div class="top-bar-stat">
                <span class="icon">⚡</span>
                <span class="xp-count">${stats.totalXP} XP</span>
            </div>
            <div class="top-bar-stat">
                <span class="icon">❤️</span>
                <span class="hearts-count">5</span>
            </div>
        </div>
        <div class="path-screen">
            <div class="path-header">
                <button class="back-btn" onclick="goHome()">←</button>
                <div class="path-title">${state.sectionLabel}</div>
            </div>
            ${practiceHTML}
            <div class="path-container">
                ${nodesHTML}
            </div>
        </div>
    `;
}

function goHome() {
    state.screen = 'home';
    state.section = null;
    render();
}

// ====================== LESSON LOGIC ======================
function startLesson(idx) {
    state.currentLessonIdx = idx;
    state.isPractice = false;
    const lessonData = state.lessons[idx];
    state.questions = generateQuestions(lessonData);
    state.currentQIdx = 0;
    state.hearts = 5;
    state.sessionXP = 0;
    state.sessionCorrect = 0;
    state.sessionTotal = 0;
    state.mistakeIds = [];
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.screen = 'lesson';
    render();
}

function startPractice() {
    const weakItems = getWeakItems(state.section);
    if (weakItems.length === 0) return;
    state.isPractice = true;
    state.currentLessonIdx = -1;
    const practiceData = weakItems.slice(0, 15);
    state.questions = generateQuestions(practiceData);
    state.currentQIdx = 0;
    state.hearts = 5;
    state.sessionXP = 0;
    state.sessionCorrect = 0;
    state.sessionTotal = 0;
    state.mistakeIds = [];
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.screen = 'lesson';
    render();
}

function generateQuestions(items) {
    const questions = [];
    const shuffled = shuffle(items);

    // Collect all ingredients across all loaded data for fallback distractors
    const allIngredientsSet = new Set();
    (state.allData || []).forEach(d => {
        (d.correct || []).forEach(i => allIngredientsSet.add(i));
        (d.pool || []).forEach(i => allIngredientsSet.add(i));
    });
    const allIngredients = [...allIngredientsSet];

    for (const item of shuffled) {
        const correctSet = new Set(item.correct);
        let wrongPool = item.pool.filter(p => !correctSet.has(p));

        // If not enough wrong options, supplement from global pool
        if (wrongPool.length < 4) {
            const extra = allIngredients.filter(i => !correctSet.has(i) && !wrongPool.includes(i));
            wrongPool = wrongPool.concat(shuffle(extra).slice(0, 5 - wrongPool.length));
        }

        const rand = Math.random();

        if (rand < 0.4 && wrongPool.length >= 3) {
            // Type 1: Select correct items — ensure pool has mix of correct + wrong
            const displayPool = shuffle([...item.correct, ...shuffle(wrongPool).slice(0, Math.max(4, Math.ceil(item.correct.length * 0.6)))]);
            questions.push({
                type: 'select',
                item: item,
                pool: displayPool,
            });
        } else if (rand < 0.7 && item.correct.length > 2 && wrongPool.length >= 2) {
            // Type 2: Missing ingredient
            const missingIdx = Math.floor(Math.random() * item.correct.length);
            const missingIng = item.correct[missingIdx];
            const shown = item.correct.filter((_, i) => i !== missingIdx);
            const distractors = shuffle(wrongPool).slice(0, 3);
            const choices = shuffle([missingIng, ...distractors]);

            questions.push({
                type: 'missing',
                item: item,
                shown: shown,
                missing: missingIng,
                choices: choices,
            });
        } else if (wrongPool.length >= 1) {
            // Type 3: True/False
            const isTrue = Math.random() > 0.5;
            let ingredient;
            if (isTrue) {
                ingredient = item.correct[Math.floor(Math.random() * item.correct.length)];
            } else {
                ingredient = wrongPool[Math.floor(Math.random() * wrongPool.length)];
            }
            questions.push({
                type: 'truefalse',
                item: item,
                ingredient: ingredient,
                answer: isTrue,
            });
        } else {
            // Last fallback: select type with original pool
            questions.push({
                type: 'select',
                item: item,
                pool: shuffle(item.pool),
            });
        }
    }

    return shuffle(questions);
}

// ====================== LESSON RENDERING ======================
function renderLesson() {
    const q = state.questions[state.currentQIdx];
    if (!q) {
        finishLesson();
        return;
    }

    const fb = state.feedbackShown;
    const progress = ((state.currentQIdx + (fb ? 1 : 0)) / state.questions.length) * 100;
    const heartsStr = '❤️'.repeat(Math.max(0, state.hearts));
    const correctSet = new Set(q.item.correct);

    let questionHTML = '';
    let resultStripHTML = '';

    if (fb) {
        const ic = state._lastCorrect;
        resultStripHTML = `<div class="inline-result ${ic ? 'correct' : 'wrong'}">
            <span class="result-icon">${ic ? '✓' : '✗'}</span>
            ${ic ? 'Верно!' : 'Неверно'}
        </div>`;
    }

    if (q.type === 'select') {
        const dishName = q.item.name;
        let optionsHTML = q.pool.map((ing, idx) => {
            let cls = '';
            let dataCrumble = '';
            if (fb) {
                const isCorrectIng = correctSet.has(ing);
                const wasSelected = state.selectedOptions.has(idx);
                if (isCorrectIng) cls = 'correct-reveal';
                else if (wasSelected && !isCorrectIng) { cls = 'wrong-reveal crumble-away'; dataCrumble = 'data-crumble="1"'; }
                else cls = 'disabled';
            } else {
                cls = state.selectedOptions.has(idx) ? 'selected' : '';
            }
            return `<button class="option-btn ${cls}" ${dataCrumble} onclick="${fb ? '' : `toggleOption(${idx})`}">${ing}</button>`;
        }).join('');

        questionHTML = `
            <div class="question-area">
                <div class="question-panel">
                    <div class="question-title">
                        Выбери состав: <span class="question-dish-name">${dishName}</span>
                    </div>
                </div>
                ${resultStripHTML}
                <div class="options-grid">${optionsHTML}</div>
            </div>
        `;
    } else if (q.type === 'missing') {
        const dishName = q.item.name;

        const slotContent = fb
            ? `<span class="missing-item" style="background:${state._lastCorrect ? '#a8d5a2' : '#e8a8a5'};color:${state._lastCorrect ? '#1b5e20' : '#b71c1c'}">${q.missing}</span>`
            : `<span class="missing-slot">?</span>`;
        const shownHTML = q.shown.map(ing =>
            `<span class="missing-item">${ing}</span>`
        ).join('') + slotContent;

        const choicesHTML = q.choices.map((c, idx) => {
            let cls = '';
            let dataCrumble = '';
            if (fb) {
                if (c === q.missing) cls = 'correct-reveal';
                else if (state.selectedChoice === idx) { cls = 'wrong-reveal crumble-away'; dataCrumble = 'data-crumble="1"'; }
                else cls = 'disabled';
            } else {
                cls = state.selectedChoice === idx ? 'selected' : '';
            }
            return `<button class="choice-btn ${cls}" ${dataCrumble} onclick="${fb ? '' : `selectChoice(${idx})`}">${c}</button>`;
        }).join('');

        questionHTML = `
            <div class="question-area">
                <div class="question-panel">
                    <div class="question-title">
                        Пропущенное в <span class="question-dish-name">${dishName}</span>?
                    </div>
                </div>
                ${resultStripHTML}
                <div class="missing-list">${shownHTML}</div>
                <div class="choice-grid">${choicesHTML}</div>
            </div>
        `;
    } else if (q.type === 'truefalse') {
        const dishName = q.item.name;

        let yesClass = 'tf-btn tf-yes';
        let noClass = 'tf-btn tf-no';
        if (fb) {
            yesClass += q.answer === true ? ' tf-correct' : ' tf-wrong';
            noClass += q.answer === false ? ' tf-correct' : ' tf-wrong';
            yesClass += ' disabled';
            noClass += ' disabled';
        }

        questionHTML = `
            <div class="question-area">
                <div class="question-panel">
                    <div class="question-title">
                        <span class="question-dish-name">${q.ingredient}</span>
                        входит в <span class="question-dish-name">${dishName}</span>?
                    </div>
                </div>
                ${resultStripHTML}
                <div class="tf-buttons">
                    <button class="${yesClass}" onclick="${fb ? '' : 'checkTFAnswer(true)'}">Да</button>
                    <button class="${noClass}" onclick="${fb ? '' : 'checkTFAnswer(false)'}">Нет</button>
                </div>
            </div>
        `;
    }

    const bottomBg = fb ? (state._lastCorrect ? '#a8d5a2' : '#e8a8a5') : '';
    const bottomColor = fb ? (state._lastCorrect ? '#1b5e20' : '#b71c1c') : '';
    const bottomHTML = fb
        ? `<div class="bottom-area">
            <button class="check-btn active" onclick="nextQuestion()" style="background:${bottomBg};color:${bottomColor}">
                ${state.hearts <= 0 ? 'Результаты' : 'Дальше'}
            </button>
           </div>`
        : (q.type !== 'truefalse' ? `<div class="bottom-area">
            <button class="check-btn ${(q.type === 'select' ? state.selectedOptions.size > 0 : state.selectedChoice !== null) ? 'active' : 'disabled'}"
                    onclick="${(q.type === 'select' ? (state.selectedOptions.size > 0 ? 'checkSelectAnswer()' : '') : (state.selectedChoice !== null ? 'checkMissingAnswer()' : ''))}">
                Проверить
            </button>
           </div>` : '');

    app.innerHTML = `
        <div class="lesson-screen">
            <div class="lesson-header">
                <button class="close-btn" onclick="confirmQuit()">✕</button>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width:${progress}%"></div>
                </div>
                <div class="hearts-display" id="hearts-display">${heartsStr}</div>
            </div>
            ${questionHTML}
            ${bottomHTML}
        </div>
    `;

    if (fb && !state._lastCorrect) {
        const display = document.getElementById('hearts-display');
        if (display) display.classList.add('heart-break');
    }
}

function toggleOption(idx) {
    if (state.feedbackShown) return;
    if (state.selectedOptions.has(idx)) {
        state.selectedOptions.delete(idx);
    } else {
        state.selectedOptions.add(idx);
    }
    // Crack effect on the button
    const btns = document.querySelectorAll('.option-btn');
    if (btns[idx]) {
        btns[idx].classList.add('crack-effect');
        setTimeout(() => btns[idx].classList.remove('crack-effect'), 400);
    }
    render();
}

function selectChoice(idx) {
    if (state.feedbackShown) return;
    state.selectedChoice = idx;
    // Crack effect on the button
    const btns = document.querySelectorAll('.choice-btn');
    if (btns[idx]) {
        btns[idx].classList.add('crack-effect');
        setTimeout(() => btns[idx].classList.remove('crack-effect'), 400);
    }
    render();
}

// Break a concrete tablet into flying fragments
function breakTablet(btn) {
    const rect = btn.getBoundingClientRect();
    // First show crack overlay
    btn.classList.add('crack-overlay');
    
    // After cracks appear, spawn fragments and hide the button
    setTimeout(() => {
        const count = 12 + Math.floor(Math.random() * 8);
        for (let i = 0; i < count; i++) {
            const frag = document.createElement('div');
            frag.className = 'concrete-fragment';
            // Mix of larger chunks and small debris
            const isChunk = i < 5;
            const w = isChunk ? (15 + Math.random() * 25) : (4 + Math.random() * 10);
            const h = isChunk ? (10 + Math.random() * 20) : (3 + Math.random() * 8);
            frag.style.width = w + 'px';
            frag.style.height = h + 'px';
            frag.style.left = (rect.left + Math.random() * rect.width) + 'px';
            frag.style.top = (rect.top + Math.random() * rect.height) + 'px';
            // Irregular shape via clip-path
            if (isChunk) {
                const p1 = Math.random() * 30;
                const p2 = 70 + Math.random() * 30;
                const p3 = Math.random() * 30;
                const p4 = 70 + Math.random() * 30;
                frag.style.clipPath = `polygon(${p1}% 0%, ${p2}% ${p3}%, 100% ${p4}%, ${100-p1}% 100%, ${p3}% ${p2}%, 0% ${100-p4}%)`;
            }
            const fx = (Math.random() - 0.5) * 200;
            const fy = 40 + Math.random() * 120;
            const fr = (Math.random() - 0.5) * 540;
            frag.style.setProperty('--fx', fx + 'px');
            frag.style.setProperty('--fy', fy + 'px');
            frag.style.setProperty('--fr', fr + 'deg');
            const dur = 0.5 + Math.random() * 0.5;
            frag.style.animation = `fragmentFly ${dur}s cubic-bezier(.2,0,.8,.4) forwards`;
            document.body.appendChild(frag);
            setTimeout(() => frag.remove(), 1200);
        }
        // Hide the original button
        btn.style.visibility = 'hidden';
    }, 350);
}

// ====================== ANSWER CHECKING ======================
function checkSelectAnswer() {
    const q = state.questions[state.currentQIdx];
    const selectedItems = [...state.selectedOptions].map(i => q.pool[i]);
    const correctSet = new Set(q.item.correct);
    const selectedSet = new Set(selectedItems);
    const isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(c => selectedSet.has(c));

    processAnswer(isCorrect, q.item);
}

function checkMissingAnswer() {
    const q = state.questions[state.currentQIdx];
    const selected = q.choices[state.selectedChoice];
    const isCorrect = selected === q.missing;

    processAnswer(isCorrect, q.item);
}

function checkTFAnswer(userAnswer) {
    const q = state.questions[state.currentQIdx];
    const isCorrect = userAnswer === q.answer;

    processAnswer(isCorrect, q.item);
}

function processAnswer(isCorrect, item) {
    state.sessionTotal++;
    recordAnswer(item.name, isCorrect);

    if (isCorrect) {
        state.sessionCorrect++;
        state.sessionXP += 10;
        state._lastCorrect = true;
    } else {
        state.hearts--;
        state._lastCorrect = false;
        if (!state.mistakeIds.includes(item.name)) {
            state.mistakeIds.push(item.name);
        }
    }

    state._lastItem = item;
    state.feedbackShown = true;
    render();

    // Break wrong-answer tablets with crack + fragment animation
    setTimeout(() => {
        document.querySelectorAll('[data-crumble]').forEach(btn => {
            breakTablet(btn);
        });
    }, 50);
}

function nextQuestion() {
    if (state.hearts <= 0) {
        finishLesson();
        return;
    }

    state.currentQIdx++;
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;

    if (state.currentQIdx >= state.questions.length) {
        finishLesson();
    } else {
        render();
    }
}

function finishLesson() {
    const xpEarned = state.sessionXP + (state.hearts > 0 ? 15 : 0);
    addXP(xpEarned);

    if (!state.isPractice && state.currentLessonIdx >= 0 && state.hearts > 0) {
        saveLessonComplete(state.section, state.currentLessonIdx, state.sessionCorrect, state.sessionTotal);
    }

    state.screen = 'result';
    state._finalXP = xpEarned;
    render();

    if (state.sessionCorrect === state.sessionTotal && state.sessionTotal > 0) {
        setTimeout(showConfetti, 300);
    }
    setTimeout(() => showXPPopup(xpEarned), 500);
}

function renderResult() {
    const accuracy = state.sessionTotal > 0
        ? Math.round((state.sessionCorrect / state.sessionTotal) * 100)
        : 0;

    const barColor = accuracy >= 80 ? 'var(--green)' : accuracy >= 50 ? 'var(--gold)' : 'var(--red)';
    const resultEmoji = accuracy === 100 ? '🏆' : accuracy >= 80 ? '🌟' : accuracy >= 50 ? '👍' : '💪';
    const resultTitle = accuracy === 100 ? 'Идеально!' :
                        accuracy >= 80 ? 'Отличная работа!' :
                        accuracy >= 50 ? 'Неплохо!' : 'Нужно ещё потренироваться';
    const resultSub = state.hearts <= 0 ? 'Жизни закончились, но ты молодец!' :
                      `Ты заработал ${state._finalXP} XP!`;

    app.innerHTML = `
        <div class="result-screen">
            <div class="result-mascot">${resultEmoji}</div>
            <div class="result-title">${resultTitle}</div>
            <div class="result-subtitle">${resultSub}</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--green)">${state.sessionCorrect}</div>
                    <div class="result-stat-label">Верно</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--red)">${state.sessionTotal - state.sessionCorrect}</div>
                    <div class="result-stat-label">Ошибок</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" style="color:var(--gold)">${state._finalXP}</div>
                    <div class="result-stat-label">XP</div>
                </div>
            </div>
            <div class="result-accuracy-bar">
                <div class="result-accuracy-fill" style="width:${accuracy}%;background:${barColor}"></div>
            </div>
            <p style="color:var(--text-secondary);margin-bottom:24px;font-weight:700">${accuracy}% точность</p>
            <button class="result-btn primary" onclick="returnToPath()">Продолжить</button>
            ${state.mistakeIds.length > 0 ? `<button class="result-btn secondary" onclick="retryMistakes()">🔄 Повторить ошибки (${state.mistakeIds.length})</button>` : ''}
        </div>
    `;

    // Animate the bar
    setTimeout(() => {
        const fill = document.querySelector('.result-accuracy-fill');
        if (fill) fill.style.width = accuracy + '%';
    }, 100);
}

function returnToPath() {
    state.screen = 'path';
    render();
}

function retryMistakes() {
    const mistakeItems = state.allData.filter(d => state.mistakeIds.includes(d.name));
    if (mistakeItems.length === 0) {
        returnToPath();
        return;
    }
    state.isPractice = true;
    state.questions = generateQuestions(mistakeItems);
    state.currentQIdx = 0;
    state.hearts = 5;
    state.sessionXP = 0;
    state.sessionCorrect = 0;
    state.sessionTotal = 0;
    state.mistakeIds = [];
    state.feedbackShown = false;
    state.selectedOptions = new Set();
    state.selectedChoice = null;
    state.screen = 'lesson';
    render();
}

// ====================== QUIT CONFIRMATION ======================
function confirmQuit() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-content">
            <div class="modal-title">Выйти из урока?</div>
            <div class="modal-text">Твой прогресс в этом уроке не сохранится.</div>
            <button class="modal-btn primary" onclick="this.closest('.modal-overlay').remove()">Остаться</button>
            <button class="modal-btn secondary" onclick="quitLesson()">Выйти</button>
        </div>
    `;
    document.body.appendChild(overlay);
}

function quitLesson() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
    state.screen = 'path';
    render();
}

// ====================== INIT ======================
render();
</script>
</body>
</html>
