<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ТТК Академия 🦉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #58CC02;
            --green-dark: #46A302;
            --green-light: #7ED321;
            --blue: #1CB0F6;
            --blue-dark: #1899D6;
            --red: #FF4B4B;
            --red-dark: #EA2B2B;
            --gold: #FFC800;
            --gold-dark: #E5B300;
            --purple: #CE82FF;
            --orange: #FF9600;
            --bg-dark: #131F24;
            --bg-card: #1A2B35;
            --bg-card-hover: #233845;
            --bg-modal: #1E3A47;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-dim: #56707C;
            --border: #37464F;
            --border-light: #4A6370;
            --shadow: rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Nunito', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh;
            position: relative;
        }

        /* Header bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
        }
        .top-bar-stat .icon { font-size: 20px; }
        .streak-count { color: var(--gold); }
        .xp-count { color: var(--blue); }
        .hearts-count { color: var(--red); }

        /* Home screen */
        .home-screen { padding: 20px 16px 40px; }
        .mascot-area {
            text-align: center;
            padding: 30px 0 20px;
        }
        .mascot {
            font-size: 80px;
            display: block;
            animation: mascotBounce 2s ease-in-out infinite;
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .app-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--green);
            margin: 10px 0 4px;
        }
        .app-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Section cards */
        .section-card {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 20px;
            margin-bottom: 14px;
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-bottom-width: 5px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            font-family: inherit;
        }
        .section-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
        .section-card:active { transform: translateY(1px); border-bottom-width: 3px; }
        .section-card .card-icon {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        .section-card .card-info { flex: 1; }
        .section-card .card-info small {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .section-card .card-arrow {
            color: var(--text-dim);
            font-size: 20px;
        }
        .card-kitchen .card-icon { background: rgba(88,204,2,0.15); }
        .card-desserts .card-icon { background: rgba(255,150,0,0.15); }
        .card-drinks .card-icon { background: rgba(28,176,246,0.15); }

        /* Daily stats bar */
        .daily-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .daily-stat-card {
            flex: 1;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
        }
        .daily-stat-card .stat-value {
            font-size: 22px;
            font-weight: 900;
        }
        .daily-stat-card .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Path screen */
        .path-screen { padding: 20px 16px 100px; }
        .path-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
            font-family: inherit;
        }
        .back-btn:hover { background: var(--bg-card-hover); }
        .path-title {
            font-size: 22px;
            font-weight: 900;
        }

        /* Lesson path nodes */
        .path-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            position: relative;
        }
        .path-row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .path-connector {
            width: 4px;
            height: 30px;
            background: var(--border);
            margin: 0 auto;
        }
        .path-connector.completed { background: var(--green); }

        .lesson-node {
            width: 70px; height: 70px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 4px solid;
            font-family: inherit;
            color: var(--text-primary);
        }
        .lesson-node .node-sub {
            font-size: 9px;
            font-weight: 700;
            opacity: 0.8;
        }
        .lesson-node.locked {
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text-dim);
            cursor: default;
        }
        .lesson-node.available {
            background: var(--green);
            border-color: var(--green-dark);
            box-shadow: 0 4px 0 var(--green-dark);
            animation: nodePulse 2s ease-in-out infinite;
        }
        .lesson-node.available:hover { transform: translateY(-3px); }
        .lesson-node.available:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--green-dark);
        }
        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 4px 0 var(--green-dark), 0 0 0 0 rgba(88,204,2,0.4); }
            50% { box-shadow: 0 4px 0 var(--green-dark), 0 0 0 8px rgba(88,204,2,0); }
        }
        .lesson-node.completed {
            background: var(--green);
            border-color: var(--green-dark);
            box-shadow: 0 4px 0 var(--green-dark);
        }
        .lesson-node.completed:hover { transform: translateY(-3px); }
        .lesson-node.completed:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--green-dark);
        }
        .lesson-node.practice {
            background: var(--gold);
            border-color: var(--gold-dark);
            box-shadow: 0 4px 0 var(--gold-dark);
        }
        .lesson-node.practice:hover { transform: translateY(-3px); }

        /* Crown badges */
        .crown-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--gold);
            color: #333;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--gold-dark);
        }

        /* Practice button */
        .practice-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--bg-card);
            border: 3px solid var(--gold);
            border-bottom-width: 5px;
            border-radius: 14px;
            color: var(--gold);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }
        .practice-btn:hover { background: rgba(255,200,0,0.08); }

        /* Lesson screen */
        .lesson-screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .lesson-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border-bottom: 2px solid var(--border);
        }
        .close-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: none;
            border: 2px solid var(--border);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: inherit;
        }
        .close-btn:hover { border-color: var(--text-secondary); }

        .progress-bar-container {
            flex: 1;
            height: 16px;
            background: var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--green);
            border-radius: 8px;
            transition: width 0.5s ease;
        }

        .hearts-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 800;
            font-size: 16px;
            color: var(--red);
        }

        /* Question area */
        .question-area {
            flex: 1;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
        }
        .question-type-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .question-title {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 24px;
        }
        .question-dish-name {
            color: var(--blue);
        }

        /* Ingredient buttons grid */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .option-btn {
            padding: 10px 16px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-bottom-width: 4px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s;
            font-family: inherit;
            user-select: none;
        }
        .option-btn:hover { background: var(--bg-card-hover); }
        .option-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
        .option-btn.selected {
            background: rgba(28,176,246,0.15);
            border-color: var(--blue);
            color: var(--blue);
        }
        .option-btn.correct-reveal {
            background: rgba(88,204,2,0.15);
            border-color: var(--green);
            color: var(--green);
        }
        .option-btn.wrong-reveal {
            background: rgba(255,75,75,0.15);
            border-color: var(--red);
            color: var(--red);
        }

        /* True/False buttons */
        .tf-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .tf-btn {
            flex: 1;
            padding: 20px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.15s;
            border-width: 3px;
            border-style: solid;
            border-bottom-width: 5px;
            font-family: inherit;
        }
        .tf-btn:active { border-bottom-width: 3px; transform: translateY(2px); }
        .tf-btn.tf-yes {
            background: rgba(88,204,2,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .tf-btn.tf-yes:hover { background: rgba(88,204,2,0.2); }
        .tf-btn.tf-no {
            background: rgba(255,75,75,0.1);
            border-color: var(--red);
            color: var(--red);
        }
        .tf-btn.tf-no:hover { background: rgba(255,75,75,0.2); }

        /* Missing ingredient choices */
        .missing-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .missing-item {
            padding: 8px 14px;
            background: rgba(88,204,2,0.1);
            border: 2px solid var(--green);
            border-radius: 10px;
            color: var(--green);
            font-size: 14px;
            font-weight: 700;
        }
        .missing-slot {
            padding: 8px 14px;
            background: rgba(255,200,0,0.1);
            border: 2px dashed var(--gold);
            border-radius: 10px;
            color: var(--gold);
            font-size: 14px;
            font-weight: 700;
            animation: slotPulse 1.5s ease-in-out infinite;
        }
        @keyframes slotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .choice-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-bottom-width: 4px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.12s;
            text-align: left;
            font-family: inherit;
        }
        .choice-btn:hover { background: var(--bg-card-hover); }
        .choice-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
        .choice-btn.selected { background: rgba(28,176,246,0.15); border-color: var(--blue); color: var(--blue); }

        /* Check button */
        .bottom-area {
            padding: 16px;
            background: var(--bg-dark);
            border-top: 2px solid var(--border);
        }
        .check-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            border-bottom: 4px solid;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .check-btn.active {
            background: var(--green);
            border-bottom-color: var(--green-dark);
            color: white;
        }
        .check-btn.active:hover { background: var(--green-light); }
        .check-btn.active:active { border-bottom-width: 2px; transform: translateY(2px); }
        .check-btn.disabled {
            background: var(--bg-card);
            border-bottom-color: var(--border);
            color: var(--text-dim);
            cursor: default;
        }

        /* Feedback banner */
        .feedback-banner {
            padding: 20px 16px;
            border-top: 2px solid;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .feedback-banner.correct {
            background: rgba(88,204,2,0.12);
            border-color: var(--green);
        }
        .feedback-banner.wrong {
            background: rgba(255,75,75,0.12);
            border-color: var(--red);
        }
        .feedback-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .feedback-icon { font-size: 28px; }
        .feedback-text {
            font-size: 20px;
            font-weight: 800;
        }
        .feedback-banner.correct .feedback-text { color: var(--green); }
        .feedback-banner.wrong .feedback-text { color: var(--red); }
        .feedback-detail {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 14px;
            white-space: pre-line;
        }
        .feedback-continue-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            border-bottom: 4px solid;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }
        .feedback-banner.correct .feedback-continue-btn {
            background: var(--green);
            border-bottom-color: var(--green-dark);
        }
        .feedback-banner.wrong .feedback-continue-btn {
            background: var(--red);
            border-bottom-color: var(--red-dark);
        }

        /* Result screen */
        .result-screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            text-align: center;
        }
        .result-mascot { font-size: 80px; margin-bottom: 16px; }
        .result-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .result-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 30px;
        }
        .result-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .result-stat {
            text-align: center;
        }
        .result-stat-value {
            font-size: 32px;
            font-weight: 900;
        }
        .result-stat-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .result-accuracy-bar {
            width: 100%;
            max-width: 300px;
            height: 12px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .result-accuracy-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease;
        }

        .result-btn {
            width: 100%;
            max-width: 340px;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            border-bottom: 4px solid;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            margin-bottom: 12px;
        }
        .result-btn.primary {
            background: var(--green);
            border-bottom-color: var(--green-dark);
        }
        .result-btn.secondary {
            background: var(--bg-card);
            border-bottom-color: var(--border);
            color: var(--text-secondary);
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: var(--bg-modal);
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .modal-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            border-bottom: 4px solid;
            font-family: inherit;
            margin-bottom: 10px;
        }
        .modal-btn.primary {
            background: var(--green);
            border-bottom-color: var(--green-dark);
            color: white;
        }
        .modal-btn.secondary {
            background: var(--bg-card);
            border-bottom-color: var(--border);
            color: var(--text-secondary);
        }

        /* Info tooltip */
        .info-box {
            background: rgba(28,176,246,0.08);
            border: 2px solid var(--blue);
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-line;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* XP popup */
        .xp-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 4px 20px rgba(255,200,0,0.5);
            animation: xpPop 1.5s ease forwards;
            z-index: 9998;
            pointer-events: none;
        }
        @keyframes xpPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Heart break */
        @keyframes heartBreak {
            0% { transform: scale(1); }
            25% { transform: scale(1.4); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .heart-break { animation: heartBreak 0.5s ease; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Loading spinner */
        .loader {
            width: 50px; height: 50px;
            border: 5px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .loading-screen p {
            color: var(--text-secondary);
            margin-top: 16px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>render();</script>
</body>
</html>
