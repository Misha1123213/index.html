<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТТК Академия 🦉</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: #1e293b; width: 100%; max-width: 440px; border-radius: 20px; padding: 24px; }
        .hidden { display: none; }
        
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.3s; }
        
        .dish-name { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .ing-btn { background: #334155; border: 2px solid #475569; color: white; padding: 10px; margin: 4px; border-radius: 8px; cursor: pointer; }
        .ing-btn.selected { border-color: #38bdf8; background: #0ea5e9; }
        
        /* Стили для встроенного результата */
        #result-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .success { background: #064e3b; border: 1px solid #10b981; color: #34d399; }
        .error { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; }
        
        .action-btn { width: 100%; background: #38bdf8; border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .level-btn { width: 100%; background: #334155; color: white; border: none; padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h2 style="text-align:center;">ТТК Академия 🦉</h2>
        <div id="levels-container"></div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div id="dish-name" class="dish-name"></div>
        <div id="ingredients-container"></div>
        <button id="check-btn" class="action-btn">Проверить</button>
        
        <div id="result-box" class="hidden"></div>
        <button id="next-btn" class="action-btn hidden">Дальше</button>
    </div>
</div>

<script>
    let data = [], currentLevel = [], currentIndex = 0, selected = [];

    async function init() {
        const res = await fetch('dishes.json');
        data = await res.json();
        const container = document.getElementById('levels-container');
        for(let i=0; i<Math.ceil(data.length/10); i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerText = `Уровень ${i+1}`;
            btn.onclick = () => startLevel(i);
            container.appendChild(btn);
        }
    }

    function startLevel(idx) {
        currentLevel = data.slice(idx * 10, idx * 10 + 10);
        currentIndex = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        selected = [];
        document.getElementById('result-box').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('check-btn').classList.remove('hidden');
        
        const q = currentLevel[currentIndex];
        document.getElementById('dish-name').innerText = q.name;
        document.getElementById('progress-fill').style.width = (currentIndex/currentLevel.length*100) + '%';
        const cont = document.getElementById('ingredients-container');
        cont.innerHTML = '';
        q.pool.forEach(ing => {
            const btn = document.createElement('button');
            btn.className = 'ing-btn';
            btn.innerText = ing;
            btn.onclick = () => {
                btn.classList.toggle('selected');
                selected.includes(ing) ? selected.splice(selected.indexOf(ing), 1) : selected.push(ing);
            };
            cont.appendChild(btn);
        });
    }

    document.getElementById('check-btn').onclick = () => {
        const q = currentLevel[currentIndex];
        const isWin = q.correct.length === selected.length && q.correct.every(i => selected.includes(i));
        const resBox = document.getElementById('result-box');
        
        resBox.innerHTML = isWin ? "✅ Верно!" : "❌ Ошибка. Правильно:<br>" + q.correct.join(', ');
        resBox.className = isWin ? "success" : "error";
        resBox.classList.remove('hidden');
        
        document.getElementById('check-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    };

    document.getElementById('next-btn').onclick = () => {
        currentIndex++;
        currentIndex < currentLevel.length ? showQuestion() : location.reload();
    };

    init();
</script>
</body>
</html>
