<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТТК Тренажёр — Кухня</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: #1e293b; width: 100%; max-width: 440px; border-radius: 20px; padding: 24px; }
        .menu-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        .level-btn { 
            width: 100%; background: #334155; color: white; border: none; 
            padding: 15px; margin-bottom: 10px; border-radius: 10px; 
            cursor: pointer; text-align: left; font-weight: bold;
        }
        .level-btn:hover { background: #475569; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="menu-title">ТТК Академия 🦉</div>
    <div id="path-kitchen">Загрузка...</div>
</div>

<script>
    async function init() {
        try {
            // Загружаем файл
            const response = await fetch('dishes.json');
            const allQuestions = await response.json();
            
            const container = document.getElementById('path-kitchen');
            container.innerHTML = ''; // Очищаем "Загрузка..."
            
            // Создаем кнопки (по 10 вопросов на уровень)
            const QUESTIONS_PER_LEVEL = 10;
            const totalLevels = Math.ceil(allQuestions.length / QUESTIONS_PER_LEVEL);
            
            for (let i = 0; i < totalLevels; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.innerText = `Уровень ${i + 1} (${allQuestions.length} позиций)`;
                btn.onclick = () => alert("Уровень " + (i + 1) + " выбран!");
                container.appendChild(btn);
            }
        } catch (error) {
            document.getElementById('path-kitchen').innerText = "Ошибка: " + error.message;
            console.error(error);
        }
    }
    init();
</script>

</body>
</html>
