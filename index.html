<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТТК Тренажёр — Кухня</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .app-container { 
            background: #1e293b; 
            width: 100%; 
            max-width: 440px; 
            border-radius: 20px; 
            padding: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Стили меню */
        .menu-title { 
            font-size: 24px; 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 24px; 
            color: #ffffff;
        }
        .category-section { 
            margin-bottom: 25px; 
            background: #0f172a; 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #334155;
        }
        .category-title { 
            color: #38bdf8; 
            text-transform: uppercase; 
            margin-bottom: 16px; 
            font-weight: 700; 
            font-size: 14px; 
            letter-spacing: 1px; 
        }
        .levels-path { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
    </style>
</head>
<body>
<div class="app-container">
    
    <!-- Главный экран меню -->
    <div class="screen active" id="menu-screen">
        <div class="menu-title">ТТК Академия 🦉</div>
        
        <div class="category-section">
            <div class="category-title">🍳 Кухня (858 позиций)</div>
            <div class="levels-path" id="path-kitchen">
                <!-- Сюда JS будет рендерить кнопки уровней (включая полуфабрикаты) -->
            </div>
        </div>
    </div>
    <!-- Экран вопроса (Тренажер) -->
    <div class="screen" id="game-screen">
        <div class="header">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="stats">
                <span id="level-indicator">Уровень 1</span>
                <span class="hearts" id="lives-counter">❤️❤️❤️</span>
            </div>
        </div>

        <div class="question-container">
            <div class="question-type" id="question-type">Состав</div>
            <h2 class="dish-name" id="dish-name">Название блюда</h2>
        </div>

        <!-- Сетка кнопок с ингредиентами -->
        <div class="ingredients-grid" id="ingredients-pool">
            <!-- Сюда JS будет рендерить варианты ответов -->
        </div>

        <button class="check-btn" id="check-btn" disabled>Проверить</button>
    </div>

    <!-- Модальное окно результата (Правильно/Ошибка) -->
    <div class="overlay" id="result-overlay"></div>
    <div class="modal" id="result-modal">
        <h3 class="modal-title" id="modal-title">Результат</h3>
        <p class="modal-info" id="modal-info">Информация о блюде (ТТК)</p>
        <button class="next-btn" id="next-btn">Дальше</button>
    </div>
</div> <!-- Закрываем .app-container -->

<style>
    /* Стили экрана игры */
    .header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.3s ease; }
    .stats { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: #94a3b8; }
    .hearts { color: #ef4444; letter-spacing: 2px; }
    
    .question-container { text-align: center; margin-bottom: 30px; }
    .question-type { color: #8b5cf6; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px; }
    .dish-name { font-size: 20px; line-height: 1.4; color: #ffffff; }
    
    /* Сетка ингредиентов */
    .ingredients-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
    .ingredient-btn { 
        background: #334155; 
        border: 2px solid transparent; 
        color: #e2e8f0; 
        padding: 10px 16px; 
        border-radius: 12px; 
        font-size: 14px; 
        font-weight: 500; 
        cursor: pointer; 
        transition: all 0.2s; 
        user-select: none; 
    }
    .ingredient-btn.selected { 
        background: #0ea5e9; 
        border-color: #38bdf8; 
        color: #fff; 
        transform: translateY(-2px); 
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); 
    }
    .ingredient-btn.correct { background: #10b981; border-color: #34d399; color: #fff; }
    .ingredient-btn.wrong { background: #ef4444; border-color: #f87171; color: #fff; }
    
    /* Основные кнопки */
    .check-btn, .next-btn { 
        width: 100%; 
        background: #38bdf8; 
        color: #0f172a; 
        border: none; 
        padding: 16px; 
        border-radius: 14px; 
        font-size: 16px; 
        font-weight: 700; 
        cursor: pointer; 
        transition: opacity 0.2s; 
    }
    .check-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
    
    /* Кнопки уровней в меню */
    .level-btn { 
        width: 100%;
        background: #1e293b; 
        color: #f8fafc; 
        border: 1px solid #334155; 
        text-align: left; 
        padding: 14px 20px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    .level-btn:hover { background: #334155; }
    .level-btn.completed { border-color: #10b981; color: #10b981; }
    
    /* Модальное окно */
    .overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); z-index: 10; }
    .modal { 
        display: none; 
        position: absolute; 
        bottom: 0; left: 0; right: 0; 
        background: #1e293b; 
        padding: 30px 24px; 
        border-radius: 24px 24px 0 0; 
        z-index: 20; 
        box-shadow: 0 -10px 40px rgba(0,0,0,0.5); 
        animation: slideUp 0.3s ease; 
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .modal-title { font-size: 22px; margin-bottom: 12px; }
    .modal-info { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; white-space: pre-wrap; }
    .title-success { color: #10b981; }
    .title-error { color: #ef4444; }
</style>
<script>
    // Состояние игры
    let allQuestions = [];
    let currentLevelQuestions = [];
    let currentQuestionIndex = 0;
    let selectedIngredients = [];
    let lives = 3;
    const QUESTIONS_PER_LEVEL = 10;

    // DOM Элементы
    const menuScreen = document.getElementById('menu-screen');
    const gameScreen = document.getElementById('game-screen');
    const pathKitchen = document.getElementById('path-kitchen');
    
    const dishNameEl = document.getElementById('dish-name');
    const questionTypeEl = document.getElementById('question-type');
    const ingredientsPoolEl = document.getElementById('ingredients-pool');
    const checkBtn = document.getElementById('check-btn');
    
    const progressFill = document.getElementById('progress-fill');
    const levelIndicator = document.getElementById('level-indicator');
    const livesCounter = document.getElementById('lives-counter');
    
    const resultOverlay = document.getElementById('result-overlay');
    const resultModal = document.getElementById('result-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalInfo = document.getElementById('modal-info');
    const nextBtn = document.getElementById('next-btn');

    // Инициализация: загрузка JSON
    async function init() {
        try {
            const response = await fetch('dishes.json');
            if (!response.ok) throw new Error('Файл не найден');
            allQuestions = await response.json();
            renderLevels();
        } catch (error) {
            pathKitchen.innerHTML = '<div style="color:#ef4444; padding:15px;">⚠️ Ошибка загрузки dishes.json. Проверьте, что файл лежит в той же папке.</div>';
            console.error(error);
        }
    }

   // Рендер кнопок уровней в меню
    function renderLevels() {
        const pathKitchen = document.getElementById('path-kitchen');
        pathKitchen.innerHTML = ''; // Очищаем контейнер
        
        // Делим 858 позиций на уровни по 10 штук
        const totalLevels = Math.ceil(allQuestions.length / QUESTIONS_PER_LEVEL);
        
        for (let i = 0; i < totalLevels; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            
            const startPos = i * QUESTIONS_PER_LEVEL + 1;
            const endPos = Math.min((i + 1) * QUESTIONS_PER_LEVEL, allQuestions.length);
            
            btn.innerHTML = `Уровень ${i + 1} 
                <span style="float:right; color:#94a3b8; font-size:12px; margin-top:2px;">
                    ${startPos} - ${endPos}
                </span>`;
            
            // Назначаем действие
            btn.onclick = () => startLevel(i);
            
            // ВАЖНО: Добавляем кнопку в DOM
            pathKitchen.appendChild(btn);
        }
    }

    // Запуск уровня
    function startLevel(levelIndex) {
        const startIndex = levelIndex * QUESTIONS_PER_LEVEL;
        currentLevelQuestions = allQuestions.slice(startIndex, startIndex + QUESTIONS_PER_LEVEL);
        
        currentQuestionIndex = 0;
        lives = 3;
        levelIndicator.textContent = `Уровень ${levelIndex + 1}`;
        updateLives();
        
        menuScreen.classList.remove('active');
        gameScreen.classList.add('active');
        
        renderQuestion();
    }

    function updateLives() {
        livesCounter.textContent = '❤️'.repeat(lives);
    }

    // Отрисовка текущего вопроса
    function renderQuestion() {
        selectedIngredients = [];
        checkBtn.disabled = true;
        
        const q = currentLevelQuestions[currentQuestionIndex];
        dishNameEl.textContent = q.name;
        
        // Меняем цвет бейджа в зависимости от типа вопроса
        if (q.type === 'allergen') {
            questionTypeEl.textContent = 'Аллергены';
            questionTypeEl.style.color = '#f43f5e'; // розово-красный
        } else {
            questionTypeEl.textContent = 'Состав';
            questionTypeEl.style.color = '#38bdf8'; // голубой
        }

        // Обновление прогресс-бара
        const progress = (currentQuestionIndex / currentLevelQuestions.length) * 100;
        progressFill.style.width = `${progress}%`;

        // Перемешиваем пул ингредиентов (Fisher-Yates)
        const shuffledPool = [...q.pool].sort(() => Math.random() - 0.5);
        
        ingredientsPoolEl.innerHTML = '';
        shuffledPool.forEach(ingredient => {
            const btn = document.createElement('button');
            btn.className = 'ingredient-btn';
            btn.textContent = ingredient;
            btn.onclick = () => toggleIngredient(btn, ingredient);
            ingredientsPoolEl.appendChild(btn);
        });
    }

    // Выбор/отмена выбора ингредиента
    function toggleIngredient(btn, ingredient) {
        if (selectedIngredients.includes(ingredient)) {
            selectedIngredients = selectedIngredients.filter(i => i !== ingredient);
            btn.classList.removeNormally I can help with things like this, but I don't seem to have access to that content. You can try again or ask me for something else.
                else {
            selectedNormally I can help with things like this, but I don't seem to have access to that content. You can try again or ask me for something else.
                selectedIngredients.push(ingredient);
            btn.classList.add('selected');
        }
        checkBtn.disabled = selectedIngredients.length === 0;
    }

    // Проверка ответа
    checkBtn.onclick = () => {
        const q = currentLevelQuestions[currentQuestionIndex];
        const isCorrect = q.correct.length === selectedIngredients.length && 
                          q.correct.every(ing => selectedIngredients.includes(ing));

        if (!isCorrect) {
            lives--;
            updateLives();
            modalTitle.textContent = 'Ошибка! ❌';
            modalTitle.className = 'modal-title title-error';
        } else {
            modalTitle.textContent = 'Верно! ✅';
            modalTitle.className = 'modal-title title-success';
        }

        modalInfo.textContent = q.info_text;
        resultOverlay.style.display = 'block';
        resultModal.style.display = 'block';
        checkBtn.disabled = true;

        if (lives <= 0) {
            nextBtn.textContent = 'В меню';
            nextBtn.onclick = () => location.reload();
        } else {
            nextBtn.textContent = 'Дальше';
            nextBtn.onclick = proceedNext;
        }
    };

    function proceedNext() {
        resultOverlay.style.display = 'none';
        resultModal.style.display = 'none';
        currentQuestionIndex++;
        
        if (currentQuestionIndex < currentLevelQuestions.length) {
            renderQuestion();
        } else {
            alert('Уровень завершен!');
            location.reload();
        }
    }

    // Запуск приложения
    init();
</script>
</body>
</html>
