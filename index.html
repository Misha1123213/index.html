<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MET –ê–Κ–Α–¥–Β–Φ–Η―è β‰ï</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #4CAF50;
            --green-dark: #388E3C;
            --green-light: #66BB6A;
            --blue: #78909C;
            --blue-dark: #546E7A;
            --red: #E53935;
            --red-dark: #C62828;
            --gold: #FFC107;
            --gold-dark: #FFA000;
            --purple: #9E9E9E;
            --orange: #FF9800;
            --bg-dark: #1a1a1a;
            --bg-card: rgba(38,38,38,0.92);
            --bg-card-hover: rgba(50,50,50,0.95);
            --bg-modal: #2a2a2a;
            --text-primary: #FAFAFA;
            --text-secondary: #B0B0B0;
            --text-dim: #707070;
            --border: rgba(255,255,255,0.12);
            --border-light: rgba(255,255,255,0.2);
            --shadow: rgba(0,0,0,0.5);
            --concrete: #b5b0a8;
            --concrete-light: #c5c0b8;
            --concrete-dark: #9a958d;
            --concrete-text: #2a2a2a;
            --concrete-border: rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            background-image: url('img/bg-cafe.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(20,20,20,0.82);
            z-index: 0;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        /* Header bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
        }
        .top-bar-stat .icon { font-size: 20px; }
        .streak-count { color: var(--gold); }
        .xp-count { color: var(--text-primary); }
        .hearts-count { color: var(--red); }

        /* Home screen */
        .home-screen { padding: 20px 16px 40px; }
        .mascot-area {
            text-align: center;
            padding: 30px 0 20px;
        }
        .mascot {
            font-size: 80px;
            display: block;
            animation: mascotBounce 2s ease-in-out infinite;
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .app-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-primary);
            margin: 10px 0 4px;
            letter-spacing: -0.5px;
        }
        .app-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Cement texture classes for variety */
        .cement-1 { background-image: url('img/cement-1.jpg'); background-size: 400px 400px; }
        .cement-2 { background-image: url('img/cement-2.jpg'); background-size: 400px 400px; }
        .cement-3 { background-image: url('img/cement-3.jpg'); background-size: 400px 400px; }
        .cement-4 { background-image: url('img/cement-4.jpg'); background-size: 400px 400px; }
        .cement-5 { background-image: url('img/cement-5.jpg'); background-size: 400px 400px; }
        .cement-main { background-image: url('img/cement-main.jpg'); background-size: 800px 500px; }

        /* Section cards - concrete tablet style */
        .section-card {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 0;
            margin-bottom: 16px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            overflow: hidden;
            position: relative;
            box-shadow: 2px 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);
        }
        .section-card:hover { transform: translateY(-3px); box-shadow: 3px 6px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25); }
        .section-card:active { transform: translateY(0px); box-shadow: 1px 2px 6px rgba(0,0,0,0.4); }
        .section-card .card-img-wrap {
            width: 90px; height: 90px;
            flex-shrink: 0;
            border-radius: 4px 0 0 4px;
            overflow: hidden;
            background: var(--concrete-dark);
            display: flex; align-items: center; justify-content: center;
        }
        .section-card .card-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .section-card .card-img-placeholder { display: none; font-size: 32px; }
        .section-card .card-img-wrap.no-img .card-img { display: none; }
        .section-card .card-img-wrap.no-img .card-img-placeholder { display: block; }
        .section-card .card-info {
            flex: 1;
            padding: 18px 0;
        }
        .section-card .card-info small {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(42,42,42,0.6);
            margin-top: 3px;
        }
        .section-card .card-arrow {
            color: rgba(42,42,42,0.4);
            font-size: 22px;
            padding-right: 16px;
        }

        /* Daily stats bar */
        .daily-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .daily-stat-card {
            flex: 1;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .daily-stat-card .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--concrete-text);
        }
        .daily-stat-card .stat-label {
            font-size: 11px;
            color: rgba(42,42,42,0.6);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Learning Stats button */
        .stats-btn {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 24px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .stats-btn:hover { transform: translateY(-2px); box-shadow: 3px 5px 14px rgba(0,0,0,0.45); }

        /* Path screen */
        .path-screen { padding: 20px 16px 100px; }
        .path-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 4px;
            background: var(--concrete);
            border: none;
            color: var(--concrete-text);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .back-btn:hover { background: var(--concrete-light); }
        .path-title {
            font-size: 22px;
            font-weight: 900;
            flex: 1;
        }
        .browse-btn {
            width: 40px; height: 40px;
            border-radius: 4px;
            background: var(--concrete);
            border: none;
            color: var(--concrete-text);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .browse-btn:hover { background: var(--concrete-light); }

        /* Browse screen */
        .browse-screen { padding: 20px 16px 100px; }
        .browse-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .browse-item {
            border-radius: 4px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35);
        }
        .browse-item-header {
            width: 100%;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: var(--concrete);
            color: var(--concrete-text);
            border: none;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            transition: 0.15s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .browse-item-header:hover { background: var(--concrete-light); }
        .browse-arrow {
            transition: transform 0.25s ease;
            font-size: 14px;
        }
        .browse-item.open .browse-arrow { transform: rotate(180deg); }
        .browse-item-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease;
            background: rgba(0,0,0,0.25);
        }
        .browse-item.open .browse-item-body {
            max-height: 500px;
            padding: 14px 16px;
        }
        .browse-ingredient {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 15px;
        }
        .browse-ingredient:last-child { border-bottom: none; }
        .browse-grams {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 700;
        }
        .browse-item-photo {
            width: 48px; height: 48px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--concrete-dark);
        }
        .browse-item-name { flex: 1; }

        /* Dish photo in questions */
        .dish-photo {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin: 10px 0;
            background: var(--concrete-dark);
            display: block;
        }
        .dish-photo-fallback {
            width: 100%;
            height: 160px;
            border-radius: 4px;
            margin: 10px 0;
            background: var(--concrete-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .dish-fallback-emoji { font-size: 48px; }
        .dish-fallback-label { font-size: 13px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

        /* Lesson path nodes */
        .path-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            position: relative;
        }
        .path-row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .path-connector {
            width: 3px;
            height: 30px;
            background: var(--concrete-dark);
            margin: 0 auto;
        }
        .path-connector.completed { background: rgba(76,175,80,0.6); }

        .lesson-node {
            width: 70px; height: 70px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 4px solid;
            font-family: inherit;
            color: var(--text-primary);
        }
        .lesson-node .node-sub {
            font-size: 9px;
            font-weight: 700;
            opacity: 0.8;
        }
        .lesson-node.locked {
            background: var(--concrete-dark);
            border-color: rgba(0,0,0,0.15);
            color: rgba(42,42,42,0.4);
            cursor: default;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35);
        }
        .lesson-node.available {
            background: var(--concrete-light);
            border-color: var(--concrete-text);
            color: var(--concrete-text);
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            animation: nodePulse 2s ease-in-out infinite;
        }
        .lesson-node.available:hover { transform: translateY(-3px); }
        .lesson-node.available:active {
            transform: translateY(2px);
            box-shadow: 0 1px 4px rgba(255,255,255,0.1);
        }
        @keyframes nodePulse {
            0%, 100% { box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 0 0 rgba(181,176,168,0.4); }
            50% { box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 0 8px rgba(181,176,168,0); }
        }
        .lesson-node.completed {
            background: var(--concrete);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .lesson-node.completed:hover { transform: translateY(-3px); }
        .lesson-node.completed:active {
            transform: translateY(2px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .lesson-node.practice {
            background: var(--concrete);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
        .lesson-node.practice:hover { transform: translateY(-3px); }

        /* Crown badges */
        .crown-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--gold);
            color: #333;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--gold-dark);
        }

        /* Practice button */
        .practice-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .practice-btn:hover { background: var(--concrete-light); }

        /* Lesson screen */
        .lesson-screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .lesson-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .close-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: none;
            border: 2px solid var(--border);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: inherit;
        }
        .close-btn:hover { border-color: var(--text-secondary); }

        .progress-bar-container {
            flex: 1;
            height: 12px;
            background: rgba(181,176,168,0.3);
            border-radius: 3px;
            overflow: hidden;
            border: none;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--concrete);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .hearts-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 800;
            font-size: 16px;
            color: var(--red);
        }

        /* Question area - concrete tablet panel */
        .question-area {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
        }
        .question-panel {
            background: var(--concrete);
            border-radius: 4px;
            padding: 18px 20px;
            margin-bottom: 16px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .question-type-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(42,42,42,0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .question-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0;
            color: var(--concrete-text);
        }
        .question-dish-name {
            color: var(--concrete-text);
            font-weight: 800;
        }

        /* Category badge */
        .category-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .category-badge.breakfast { background: rgba(255,152,0,0.18); color: #E65100; }
        .category-badge.lunch { background: rgba(76,175,80,0.18); color: #2E7D32; }
        .category-badge.sandwich { background: rgba(120,144,156,0.25); color: #37474F; }
        .category-badge.dessert { background: rgba(156,39,176,0.15); color: #7B1FA2; }
        .category-badge.drink { background: rgba(0,150,136,0.18); color: #00796B; }
        .category-badge.drink_pf { background: rgba(255,193,7,0.18); color: #F57F17; }

        /* Ingredient buttons grid - concrete tablet style */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .option-btn {
            padding: 10px 16px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            user-select: none;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .option-btn:hover { background-color: var(--concrete-light); transform: translateY(-1px); box-shadow: 3px 4px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }
        .option-btn:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .option-btn.selected {
            outline: 3px solid #333;
            color: var(--concrete-text);
            box-shadow: 0 0 16px rgba(255,255,255,0.5), 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
            transform: translateY(-2px) scale(1.03);
            filter: brightness(1.25);
        }
        .option-btn.correct-reveal {
            background: #a8d5a2;
            color: #1b5e20;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }
        .option-btn.correct-unselected {
            background: #c8e6c5;
            color: #1b5e20;
            opacity: 0.55;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.2);
        }
        .option-btn.wrong-reveal {
            background: #e8a8a5;
            color: #b71c1c;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }
        .option-btn.wrong-selected {
            color: #b71c1c;
            outline: 3px solid #b71c1c;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
            filter: brightness(1.15);
        }
        /* Crack effect on click */
        .option-btn.crack-effect::after,
        .choice-btn.crack-effect::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: url('img/concrete-cracks.png') center/cover no-repeat;
            opacity: 0;
            animation: crackFlash 0.4s ease-out forwards;
            pointer-events: none;
            border-radius: 4px;
            z-index: 2;
        }
        @keyframes crackFlash {
            0% { opacity: 0; transform: scale(0.85); }
            40% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        /* True/False buttons - concrete tablet */
        .tf-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .tf-btn {
            flex: 1;
            padding: 20px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            overflow: hidden;
            background: var(--concrete);
        }
        .tf-btn:active { transform: translateY(2px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .tf-btn.tf-yes { color: #2e7d32; }
        .tf-btn.tf-yes:hover { background-color: var(--concrete-light); }
        .tf-btn.tf-no { color: #c62828; }
        .tf-btn.tf-no:hover { background-color: var(--concrete-light); }


        /* Category columns for missing question */
        .sort-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .sort-column {
            border: 2px dashed var(--concrete-dark);
            border-radius: 10px;
            padding: 8px;
            min-height: 80px;
            background: rgba(255,255,255,0.03);
        }
        .sort-column-label {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .sort-column-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        /* Missing ingredient choices */
        .missing-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .missing-item {
            padding: 8px 14px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 14px;
            font-weight: 600;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .missing-slot {
            padding: 8px 14px;
            background: rgba(181,176,168,0.3);
            border: 2px dashed var(--concrete-dark);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            animation: slotPulse 1.5s ease-in-out infinite;
        }
        @keyframes slotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .choice-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            width: 100%;
            padding: 14px 18px;
            background: var(--concrete);
            border: none;
            border-radius: 4px;
            color: var(--concrete-text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.12s;
            text-align: left;
            font-family: inherit;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .choice-btn:hover { background-color: var(--concrete-light); transform: translateY(-1px); }
        .choice-btn:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .choice-btn.selected { outline: 3px solid #333; color: var(--concrete-text); box-shadow: 0 0 16px rgba(255,255,255,0.5), 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5); transform: translateY(-2px) scale(1.03); filter: brightness(1.25); }
        .choice-btn.correct-reveal { background: #a8d5a2; color: #1b5e20; }
        .choice-btn.wrong-reveal { background: #e8a8a5; color: #b71c1c; }

        /* Check button - concrete tablet */
        .bottom-area {
            padding: 16px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }
        .check-btn {
            width: 100%;
            padding: 16px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }
        .check-btn.active {
            background: var(--concrete-light);
            color: var(--concrete-text);
            box-shadow: 2px 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.1);
        }
        .check-btn.active:hover { background-color: #d0cbc3; transform: translateY(-1px); box-shadow: 3px 4px 12px rgba(0,0,0,0.45); }
        .check-btn.active:active { transform: translateY(1px); box-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .check-btn.disabled {
            background: rgba(181,176,168,0.3);
            color: var(--text-dim);
            cursor: default;
            box-shadow: none;
        }

        /* Inline feedback result strip */
        .inline-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }
        .inline-result.correct {
            background: #a8d5a2;
            color: #1b5e20;
        }
        .inline-result.wrong {
            background: #e8a8a5;
            color: #b71c1c;
        }
        .inline-result .result-icon { font-size: 20px; }

        /* Disabled state for answered buttons */
        .option-btn.disabled, .choice-btn.disabled, .tf-btn.disabled {
            pointer-events: none;
            opacity: 0.5;
        }
        .tf-btn.tf-correct {
            background: #a8d5a2 !important;
            color: #1b5e20 !important;
        }
        .tf-btn.tf-wrong {
            background: #e8a8a5 !important;
            color: #b71c1c !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Result screen */
        .result-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }
        .result-mascot { font-size: 64px; margin-bottom: 16px; }
        .result-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .result-subtitle {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 600;
        }
        .result-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .result-stat { text-align: center; }
        .result-stat-value { font-size: 30px; font-weight: 900; }
        .result-stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; }

        .result-accuracy-bar {
            width: 100%;
            max-width: 300px;
            height: 12px;
            background: rgba(181,176,168,0.3);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .result-accuracy-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease;
            width: 0%;
        }
        .result-btn {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            margin-bottom: 10px;
            transition: 0.15s;
        }
        .result-btn.primary {
            background: var(--concrete-light);
            color: var(--concrete-text);
            box-shadow: 2px 3px 8px rgba(0,0,0,0.35);
        }
        .result-btn.primary:hover { background: #d0cbc3; }
        .result-btn.secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .result-btn.secondary:hover { background: rgba(255,255,255,0.05); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .modal-content {
            background: var(--bg-modal);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .modal-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .modal-btn.primary {
            background: var(--concrete-light);
            color: var(--concrete-text);
        }
        .modal-btn.secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* Learning Stats Modal */
        .stats-modal {
            background: var(--bg-modal);
            border-radius: 12px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .stats-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .stats-modal-title {
            font-size: 20px;
            font-weight: 800;
        }
        .stats-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: inherit;
        }
        .strength-card {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .strength-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .strength-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }
        .strength-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .chapter-progress-item {
            margin-bottom: 14px;
        }
        .chapter-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .chapter-progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        .chapter-progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        .format-scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .format-score-card {
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }
        .format-score-name {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .format-score-val {
            font-size: 18px;
            font-weight: 800;
        }
        .weak-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .weak-badge {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .weak-accuracy {
            color: var(--gold);
            font-weight: 700;
        }
        .weak-empty {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
        }
        .mini-graph-wrap {
            margin-top: 10px;
        }
        .mini-graph {
            width: 100%;
            height: 60px;
            display: block;
        }
        .mini-graph-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* Gram selector */
        .gram-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .gram-input {
            width: 70px;
            padding: 6px 8px;
            border-radius: 4px;
            border: 2px solid var(--concrete-dark);
            background: rgba(255,255,255,0.9);
            color: var(--concrete-text);
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            text-align: center;
        }
        .gram-input:focus {
            outline: none;
            border-color: var(--blue);
        }
        .gram-unit {
            font-size: 13px;
            color: var(--concrete-text);
            font-weight: 600;
        }
        .gram-correct { border-color: var(--green) !important; background: #e8f5e9 !important; }
        .gram-wrong { border-color: var(--red) !important; background: #ffebee !important; }

        /* Color coded format */
        .color-category {
            margin-bottom: 12px;
        }
        .color-category-label {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .cat-base { background: rgba(33,150,243,0.15); color: #1565C0; }
        .cat-flavor { background: rgba(76,175,80,0.15); color: #2E7D32; }
        .cat-topping { background: rgba(255,152,0,0.15); color: #E65100; }
        .cat-liquid { background: rgba(156,39,176,0.15); color: #7B1FA2; }

        /* Color-fill question (color-coded missing ingredients) */
        .color-fill-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        .color-fill-column {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
        }
        .color-fill-header {
            height: 6px;
            border-radius: 3px;
            margin-bottom: 8px;
            padding: 0;
        }
        .color-fill-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .color-fill-choices {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .color-fill-tablet {
            display: inline-block;
            cursor: default;
            font-size: 13px;
            padding: 8px 12px;
            min-width: 60px;
            text-align: center;
        }
        .color-fill-tablet.selected {
            transform: translateY(-2px) scale(1.03);
            filter: brightness(1.25);
        }
        .color-fill-interactive { cursor: pointer; }
        .color-cat-red,
        .color-cat-white,
        .color-cat-yellow,
        .color-cat-orange,
        .color-cat-green,
        .color-cat-blue,
        .color-cat-brown,
        .color-cat-neutral { position: relative; overflow: hidden; }
        .color-cat-red::before { background: rgba(255,68,68,0.25); }
        .color-cat-white::before { background: rgba(255,255,255,0.25); }
        .color-cat-yellow::before { background: rgba(255,215,0,0.25); }
        .color-cat-orange::before { background: rgba(255,140,0,0.25); }
        .color-cat-green::before { background: rgba(50,205,50,0.25); }
        .color-cat-blue::before { background: rgba(30,144,255,0.25); }
        .color-cat-brown::before { background: rgba(139,69,19,0.25); }
        .color-cat-neutral::before { background: rgba(170,170,170,0.25); }
        .color-cat-red::before,
        .color-cat-white::before,
        .color-cat-yellow::before,
        .color-cat-orange::before,
        .color-cat-green::before,
        .color-cat-blue::before,
        .color-cat-brown::before,
        .color-cat-neutral::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: -1;
        }

        /* Spatial format */
        .spatial-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .spatial-zone {
            border: 2px dashed var(--concrete-dark);
            border-radius: 8px;
            padding: 10px;
            min-height: 60px;
            text-align: center;
        }
        .spatial-zone-label {
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* XP popup */
        .xp-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 4px 20px rgba(255,200,0,0.5);
            animation: xpPop 1.5s ease forwards;
            z-index: 9998;
            pointer-events: none;
        }
        @keyframes xpPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Heart break */
        @keyframes heartBreak {
            0% { transform: scale(1); }
            25% { transform: scale(1.4); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .heart-break { animation: heartBreak 0.5s ease; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        /* Loading spinner */
        .loader {
            width: 50px; height: 50px;
            border: 3px solid var(--concrete-border);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .loading-screen p {
            color: var(--text-secondary);
            margin-top: 16px;
            font-weight: 700;
        }

        /* Onboarding: nickname + avatar */
        .onboarding-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-dark);
            color: var(--text-primary);
            text-align: center;
        }
        .onboarding-mascot {
            font-size: 80px;
            margin-bottom: 16px;
        }
        .onboarding-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .onboarding-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 320px;
        }
        .nickname-input {
            width: 100%;
            max-width: 320px;
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
        }
        .nickname-input:focus {
            border-color: var(--green);
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 320px;
            margin-bottom: 32px;
        }
        .avatar-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: rgba(255,255,255,0.08);
            font-size: 34px;
            cursor: pointer;
            transition: 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-btn:hover { transform: scale(1.05); }
        .avatar-btn.selected {
            border-color: var(--green);
            background: rgba(88,204,2,0.15);
            transform: scale(1.08);
        }
        .onboarding-btn {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: var(--green);
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.12s;
        }
        .onboarding-btn.disabled {
            background: var(--text-dim);
            cursor: not-allowed;
        }

        /* Leaderboard */
        .leaderboard-screen {
            padding: 20px;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-primary);
        }
        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .leaderboard-title {
            font-size: 24px;
            font-weight: 900;
        }
        .leaderboard-podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 28px;
            min-height: 130px;
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .podium-avatar {
            font-size: 44px;
            margin-bottom: 4px;
        }
        .podium-rank {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .podium-rank.first { background: var(--gold); color: #000; }
        .podium-rank.second { background: #C0C0C0; color: #000; }
        .podium-rank.third { background: #CD7F32; color: #000; }
        .podium-name {
            font-size: 12px;
            font-weight: 700;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .podium-xp {
            font-size: 12px;
            font-weight: 800;
            color: var(--gold);
        }

<body>
<div id="app"></div>
<script>
// ====================== STATE ======================
const APP_KEY = 'ttk_academy_v3';

let state = {
    screen: 'home',
    section: null,
    sectionLabel: '',
    allData: [],
    lessons: [],
    currentLessonIdx: null,
    questions: [],
    currentQIdx: 0,
    hearts: 5,
    sessionXP: 0,
    sessionCorrect: 0,
    sessionTotal: 0,
    mistakeIds: [],
    basicMistakeIds: [],
    phase: 'basic',
    feedbackShown: false,
    selectedOptions: new Set(),
    selectedChoice: null,
    isPractice: false,
    isDrinksChapter: false,
    gramInputs: {},
    branchSection: null,
    profile: null,
    onboardingStep: 'nickname',
    onboardingNickname: '',
    onboardingAvatar: null,
    avatarEditor: null,
};

// Cement texture images for variety
const CEMENT_IMAGES = ['img/cement-1.jpg','img/cement-2.jpg','img/cement-3.jpg','img/cement-4.jpg','img/cement-5.jpg'];
const AVATAR_EMOJIS = ['πüΠâ','πüêΜ','πüΠä','πüêΦ','πüê·','πüêΑ','πüêß','πüêΗ','πüêΕ','πüê±','πüΠ¹','πüê®'];
const AVATAR_LAYERS = [
    { key: 'face', label: '–¦–Η―Ü–Ψ' },
    { key: 'ears', label: '–Θ―à–Η' },
    { key: 'eyes', label: '–™–Μ–Α–Ζ–Α' },
    { key: 'brows', label: '–ë―Ä–Ψ–≤–Η' },
    { key: 'nose', label: '–ù–Ψ―¹' },
    { key: 'mouth', label: '–†–Ψ―²' },
    { key: 'hair', label: '–ü―Ä–Η―΅―ë―¹–Κ–Α' },
    { key: 'accessory', label: '–ê–Κ―¹–Β―¹―¹―É–Α―Ä' },
    { key: 'feature', label: '–û―¹–Ψ–±–Β–Ϋ–Ϋ–Ψ―¹―²―¨' }
];
const DEFAULT_AVATAR = { face: '1', ears: '1', eyes: '1', brows: '1', nose: '1', mouth: '1', hair: '1', accessory: null, feature: null };
const DEFAULT_AVATAR_EMOJI = 'β‰ï';
let avatarConfig = null;
let cementCounter = 0;
function nextCement() {
    const img = CEMENT_IMAGES[cementCounter % CEMENT_IMAGES.length];
    cementCounter++;
    return img;
}
function cementStyle() {
    return `background-image:url('${nextCement()}');background-size:400px 400px;`;
}

// ====================== PERSISTENCE ======================
function loadProgress() {
    try {
        const raw = localStorage.getItem(APP_KEY);
        return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
}
function saveProgress(data) {
    const current = loadProgress();
    Object.assign(current, data);
    localStorage.setItem(APP_KEY, JSON.stringify(current));
}
function getProgress() { return loadProgress(); }

function getSectionProgress(section) {
    const p = getProgress();
    return p[section] || {};
}
function saveLessonComplete(section, lessonIdx, score, total) {
    const p = getProgress();
    if (!p[section]) p[section] = {};
    const key = `lesson_${lessonIdx}`;
    const prev = p[section][key] || { completed: false, crowns: 0, bestScore: 0 };
    prev.completed = true;
    prev.crowns = Math.min(5, prev.crowns + 1);
    prev.bestScore = Math.max(prev.bestScore, score);
    p[section][key] = prev;
    saveProgress(p);
}
function getGlobalStats() {
    const p = getProgress();
    return {
        totalXP: p.totalXP || 0,
        streak: p.streak || 0,
        lastDate: p.lastDate || null,
        totalLessons: p.totalLessons || 0,
    };
}
function addXP(amount) {
    const p = getProgress();
    p.totalXP = (p.totalXP || 0) + amount;
    const today = new Date().toDateString();
    if (p.lastDate !== today) {
        if (p.lastDate === new Date(Date.now() - 86400000).toDateString()) {
            p.streak = (p.streak || 0) + 1;
        } else if (p.lastDate !== today) {
            p.streak = 1;
        }
        p.lastDate = today;
    }
    p.totalLessons = (p.totalLessons || 0) + 1;
    saveProgress(p);
}

function recordAnswer(itemName, correct) {
    const p = getProgress();
    if (!p.itemStrength) p.itemStrength = {};
    const s = p.itemStrength[itemName] || { strength: 3, attempts: 0 };
    s.attempts++;
    if (correct) {
        s.strength = Math.min(5, s.strength + 1);
    } else {
        s.strength = Math.max(0, s.strength - 1.5);
    }
    s.lastSeen = Date.now();
    p.itemStrength[itemName] = s;
    saveProgress(p);
}
function getWeakItems(section) {
    const p = getProgress();
    if (!p.itemStrength) return [];
    const ad = getAdaptiveData();
    const weakCats = getWeakBuckets(ad.categories, 3);
    const sectionData = state.allData;
    return sectionData
        .filter(d => {
            const s = p.itemStrength[d.name];
            return s && s.strength < 3;
        })
        .map(d => {
            const s = p.itemStrength[d.name];
            let penalty = 0;
            const cats = getQuestionCategories({ pool: d._ingredients || [] });
            for (const c of cats) {
                if (weakCats.includes(c)) penalty += 0.4;
            }
            return { item: d, effectiveStrength: s.strength - penalty };
        })
        .sort((a, b) => a.effectiveStrength - b.effectiveStrength)
        .map(x => x.item);
}

// ====================== ADAPTIVE ENGINE ======================
const FORMATS = ['logical', 'color_coded', 'spatial'];
const QUESTION_TYPES = ['select', 'missing', 'truefalse', 'color_fill'];
const EMA_ALPHA = 0.25; // higher = faster reaction to recent answers

function getAdaptiveData() {
    const p = getProgress();
    if (!p.adaptive) p.adaptive = {
        totalQuestions: 0,
        formats: {},
        types: {},
        categories: {},
        globalHistory: []
    };
    // migrate old storage that lacks new sections
    if (!p.adaptive.types) p.adaptive.types = {};
    if (!p.adaptive.categories) p.adaptive.categories = {};
    if (!p.adaptive.globalHistory) p.adaptive.globalHistory = [];
    for (const f of FORMATS) {
        if (!p.adaptive.formats[f]) {
            p.adaptive.formats[f] = { correct: 0, attempts: 0, totalTime: 0, emaAccuracy: null, emaTime: null };
        }
    }
    return p.adaptive;
}

function saveAdaptiveData(ad) {
    const p = getProgress();
    p.adaptive = ad;
    saveProgress(p);
}

function updateBucket(bucket, correct, timeTaken) {
    bucket.attempts++;
    if (correct) bucket.correct++;
    bucket.totalTime += timeTaken;
    const acc = correct ? 1 : 0;
    if (bucket.emaAccuracy == null) {
        bucket.emaAccuracy = acc;
        bucket.emaTime = timeTaken;
    } else {
        bucket.emaAccuracy = bucket.emaAccuracy * (1 - EMA_ALPHA) + acc * EMA_ALPHA;
        bucket.emaTime = bucket.emaTime * (1 - EMA_ALPHA) + timeTaken * EMA_ALPHA;
    }
}

function getQuestionCategories(q) {
    const cats = new Set();
    const source = (q && (q.pool || q.choices || q.shown || (q.item && q.item._ingredients))) || [];
    for (const ing of source) {
        if (ing) cats.add(getCategory(ing));
    }
    return Array.from(cats);
}

function recordAdaptiveAnswer(format, correct, timeTaken, q) {
    const ad = getAdaptiveData();
    ad.totalQuestions++;

    // format
    updateBucket(ad.formats[format], correct, timeTaken);

    // type
    const type = (q && q.type) || 'select';
    if (!ad.types[type]) ad.types[type] = { correct: 0, attempts: 0, totalTime: 0, emaAccuracy: null, emaTime: null };
    updateBucket(ad.types[type], correct, timeTaken);

    // categories of ingredients shown in the question
    const cats = getQuestionCategories(q);
    for (const cat of cats) {
        if (!ad.categories[cat]) ad.categories[cat] = { correct: 0, attempts: 0, totalTime: 0, emaAccuracy: null, emaTime: null };
        updateBucket(ad.categories[cat], correct, timeTaken);
    }

    // global accuracy history for mini-chart
    ad.globalHistory.push(correct ? 1 : 0);
    if (ad.globalHistory.length > 40) ad.globalHistory.shift();

    saveAdaptiveData(ad);
}

function recordFormatAnswer(format, correct, timeTaken) {
    // keep signature unchanged; pull current question from state
    const q = state.questions[state.currentQIdx];
    recordAdaptiveAnswer(format, correct, timeTaken, q);
}

function getBucketScore(bucket) {
    if (!bucket || bucket.attempts === 0) return 0;
    const rawAccuracy = bucket.correct / bucket.attempts;
    const emaAccuracy = bucket.emaAccuracy != null ? bucket.emaAccuracy : rawAccuracy;
    // mix raw and EMA so long-term accuracy still matters, but recent form shifts score faster
    const accuracy = (rawAccuracy + emaAccuracy) / 2;
    const time = bucket.emaTime != null ? bucket.emaTime : (bucket.totalTime / bucket.attempts);
    return accuracy * (1 / Math.max(time, 0.5));
}

function getFormatScore(format) {
    const ad = getAdaptiveData();
    return getBucketScore(ad.formats[format]);
}

function getExplorationScore(format) {
    const fd = getAdaptiveData().formats[format];
    const base = getFormatScore(format);
    // Boost formats with few attempts so calibration never stops and weak formats keep getting sampled
    const usageBonus = fd.attempts === 0 ? 0.5 : (0.15 / fd.attempts);
    return base + usageBonus;
}

function getWeakBuckets(obj, minAttempts = 3) {
    const list = [];
    for (const [key, b] of Object.entries(obj || {})) {
        if (b.attempts >= minAttempts) {
            list.push({ key, score: getBucketScore(b), attempts: b.attempts });
        }
    }
    list.sort((a, b) => a.score - b.score);
    return list.slice(0, 4).map(x => x.key);
}

function pickFormat() {
    const scores = FORMATS.map(f => ({ format: f, score: getExplorationScore(f) }));
    scores.sort((a, b) => b.score - a.score);
    const dominant = scores[0].format;
    const weakest = scores[scores.length - 1].format;
    const r = Math.random();
    if (r < 0.6) return dominant;          // play to strength
    if (r < 0.8) return weakest;            // deliberate training of weak format
    return FORMATS[Math.floor(Math.random() * FORMATS.length)];
}

function getDominantFormat() {
    const scores = FORMATS.map(f => ({ format: f, score: getFormatScore(f) }));
    scores.sort((a, b) => b.score - a.score);
    return scores[0];
}

function getFormatLabel(f) {
    const labels = {
        logical: '–¦–Ψ–≥–Η―΅–Β―¹–Κ–Η–Ι',
        color_coded: '–£–Η–Ζ―É–Α–Μ―¨–Ϋ―΄–Ι',
        spatial: '–ü―Ä–Ψ―¹―²―Ä–Α–Ϋ―¹―²–≤–Β–Ϋ–Ϋ―΄–Ι'
    };
    return labels[f] || f;
}

function getFormatDescription(f) {
    const desc = {
        logical: '–Δ–Β–Κ―¹―²–Ψ–≤―΄–Β ―¹–Ω–Η―¹–Κ–Η –Η–Ϋ–≥―Ä–Β–¥–Η–Β–Ϋ―²–Ψ–≤',
        color_coded: '–Π–≤–Β―²–Ψ–≤–Α―è –≥―Ä―É–Ω–Ω–Η―Ä–Ψ–≤–Κ–Α –Ω–Ψ –Κ–Α―²–Β–≥–Ψ―Ä–Η―è–Φ',
        spatial: '–£–Η–Ζ―É–Α–Μ―¨–Ϋ–Ψ–Β ―Ä–Α―¹–Ω–Ψ–Μ–Ψ–Ε–Β–Ϋ–Η–Β –Κ–Ψ–Φ–Ω–Ψ–Ϋ–Β–Ϋ―²–Ψ–≤'
    };
    return desc[f] || '';
}

function getDishCategory(name) {
    const n = name.toLowerCase();
    if (n.includes('–Κ―Ä–Ψ–Κ-') || n.includes('–≥―Ä–Η–Μ―¨-―΅–Η–Ζ') || n.includes('–≥–Η―Ä–Ψ―¹')) return { label: '–Γ―ç–Ϋ–¥–≤–Η―΅', cls: 'sandwich' };
    if (n.includes('―¹―É–Ω') || n.includes('–±―É–Μ―¨–Ψ–Ϋ') || n.includes('–Ψ―Ä–Ζ–Ψ') || n.includes('–Ϋ―¨–Ψ–Κ–Κ–Η') || n.includes('―¹–Α–Μ–Α―²') || n.includes('―â―ë―΅–Κ–Η') || n.includes('―â–Β―΅–Κ–Η')) return { label: '–û–±–Β–¥', cls: 'lunch' };
    if (n.includes('–Κ–Α―à–Α') || n.includes('―¹―΄―Ä–Ϋ–Η–Κ') || n.includes('―à–Α–Κ―à―É–Κ–Α') || n.includes('–Ζ–Α–≤―²―Ä–Α–Κ') || n.includes('―¹–Κ―Ä―ç–Φ–±–Μ') || n.includes('–±–Β–Ϋ–Β–¥–Η–Κ―²') || n.includes('–¥―Ä–Α–Ϋ–Ϋ–Η–Κ') || n.includes('―³―Ä–Β–Ϋ―΅-―²–Ψ―¹―²') || n.includes('–≥―Ä–Β―΅–Κ–Α')) return { label: '–½–Α–≤―²―Ä–Α–Κ', cls: 'breakfast' };
    return { label: '–½–Α–≤―²―Ä–Α–Κ', cls: 'breakfast' };

function getSectionCategory(section) {
    if (section === 'desserts') return { label: '–î–Β―¹–Β―Ä―²', cls: 'dessert' };

}

// ====================== CHAPTER PROGRESS ======================
function getChapterTotals() {
    return {
        kitchen: { file: 'dishes.json', label: 'πüç≥ –ö―É―Ö–Ϋ―è' },
        desserts: { file: 'desserts.json', label: 'πüçΑ –î–Β―¹–Β―Ä―²―΄' },
        drinks: { file: 'drinks.json', label: 'πüçΙ –ù–Α–Ω–Η―²–Κ–Η' },
        drink_pf: { file: 'drink_pf.json', label: 'πüßΣ –ü–Λ –ù–Α–Ω–Η―²–Κ–Ψ–≤' },

function getChapterProgress() {
    const p = getProgress();
    const chapters = getChapterTotals();
    const result = {};
    for (const [key, info] of Object.entries(chapters)) {
        const sp = p[key] || {};
        let completed = 0;
        let total = 0;
        for (const k of Object.keys(sp)) {
            if (k.startsWith('lesson_')) {
                total++;
                if (sp[k].completed) completed++;

        result[key] = { completed, total, label: info.label };
    }
    return result;

// ====================== UTILITIES ======================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function showConfetti() {

function showXPPopup(amount) {

    setTimeout(() => popup.remove(), 1600);
}

// Normalize item data: handle both old format (correct: string[], pool: string[])
// and new format (correct: [{ingredient, grams}], wrong: string[])
function normalizeItem(item) {
    if (!item._normalized) {
        if (item.correct && item.correct.length > 0 && typeof item.correct[0] === 'object') {
            item._ingredients = item.correct.map(c => c.ingredient);
            item._grams = {};
            item.correct.forEach(c => { item._grams[c.ingredient] = c.grams; });
            item._pool = [...item._ingredients, ...(item.wrong || [])];
            item._wrongPool = item.wrong || [];
            item._hasGrams = true;
        } else {
            item._ingredients = item.correct || [];
            item._grams = {};
            item._pool = item.pool || [...(item.correct || []), ...(item.wrong || [])];
            item._wrongPool = (item.pool || []).filter(p => !(item.correct || []).includes(p));
            if (item.wrong) item._wrongPool = item.wrong;
            item._hasGrams = false;
        }
        item._image = item.image || null;
        item._normalized = true;
    }
    return item;
}

function getDishPhotoHTML(item, extraClass = 'dish-photo') {
    if (!item || !item._image) {
        return renderPhotoFallback(item, extraClass);
    }
    return `<img class="${extraClass}" src="${item._image}" alt="${item.name || ''}" onerror="replacePhotoFallback(this, '${extraClass}')">`;
}

function replacePhotoFallback(el, cls) {
    const name = el.alt || '';
    el.replaceWith(stringToElement(renderPhotoFallbackString(name, cls)));
}

function stringToElement(html) {
    const div = document.createElement('div');
    div.innerHTML = html.trim();
    return div.firstChild;
}

function renderPhotoFallback(item, cls = 'dish-photo') {
    return renderPhotoFallbackString(item ? item.name : '', cls);
}

function renderPhotoFallbackString(name, cls) {
    const cat = state.section === 'kitchen'
        ? (name ? getDishCategory(name) : null)
        : (state.section ? getSectionCategory(state.section) : (name ? getDishCategory(name) : null));
    const label = cat ? cat.label : '–ë–Μ―é–¥–Ψ';

function renderAvatar(avatar, size = 32) {
    if (!avatar) {
        return `<span class="profile-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.6)}px">${DEFAULT_AVATAR_EMOJI}</span>`;
    }
    if (typeof avatar === 'string') {
        return `<span class="profile-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.6)}px">${avatar}</span>`;
    }
    // if assets are not generated yet, show the migrated emoji or default
    if (!avatarConfig || Object.keys(avatarConfig).length === 0) {
        const emoji = avatar.avatarEmoji || DEFAULT_AVATAR_EMOJI;
        return `<span class="profile-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.6)}px">${emoji}</span>`;
    }
    const order = ['face', 'ears', 'eyes', 'brows', 'nose', 'mouth', 'hair', 'accessory', 'feature'];
    const parts = order.map(layer => {
        const id = avatar[layer];
        if (!id || !avatarConfig[layer] || !avatarConfig[layer].includes(id)) return '';
        return `<img class="avatar-layer" src="img/avatar/${layer}/${id}.png" alt="" onerror="this.style.display='none'">`;
    }).join('');
    return `<div class="avatar-stack" style="width:${size}px;height:${size}px">${parts}</div>`;
}

function cloneAvatar(avatar) {
    return { ...DEFAULT_AVATAR, ...(avatar || {}) };
}

function migrateProfileAvatar(profile) {
    if (!profile || !profile.avatar) return profile;
    if (typeof profile.avatar === 'string') {
        return { ...profile, avatar: cloneAvatar(), avatarEmoji: profile.avatar };
    }
    return { ...profile, avatar: cloneAvatar(profile.avatar) };
}

function buildWeakBucketsHTML(obj, labelFn) {
    const weak = [];
    for (const [key, b] of Object.entries(obj || {})) {
        if (b.attempts >= 3) {
            weak.push({ key, score: getBucketScore(b), accuracy: b.correct / b.attempts });
        }
    }
    weak.sort((a, b) => a.score - b.score);
    if (weak.length === 0) {
        return '<div class="weak-empty">–ü–Ψ–Κ–Α –Φ–Α–Μ–Ψ –¥–Α–Ϋ–Ϋ―΄―Ö βÄî –Ω―Ä–Ψ–¥–Ψ–Μ–Ε–Α–Ι―²–Β ―²―Ä–Β–Ϋ–Η―Ä–Ψ–≤–Α―²―¨―¹―è</div>';
    }
    return weak.slice(0, 4).map(w => `
        <div class="weak-badge">
            <span>${labelFn(w.key)}</span>
            <span class="weak-accuracy">${Math.round(w.accuracy * 100)}%</span>
        </div>
    `).join('');
}

    }
    const width = 260;
    const height = 60;
    const pad = 4;
    const step = width / (history.length - 1);
    // rolling average window 5
    const rolling = [];
    for (let i = 0; i < history.length; i++) {
        const start = Math.max(0, i - 4);
        const slice = history.slice(start, i + 1);
        rolling.push(slice.reduce((a, b) => a + b, 0) / slice.length);
    }
    const points = rolling.map((v, i) => {
        const x = pad + i * step;
        const y = pad + (1 - v) * (height - 2 * pad);
        return `${x},${y}`;
    }).join(' ');
    const startY = pad + (1 - rolling[0]) * (height - 2 * pad);
    const endY = pad + (1 - rolling[rolling.length - 1]) * (height - 2 * pad);
    return `
        <svg class="mini-graph" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
            <polyline fill="none" stroke="var(--gold)" stroke-width="2" points="${points}"/>
            <circle cx="${pad}" cy="${startY}" r="2.5" fill="var(--gold)"/>
            <circle cx="${width - pad}" cy="${endY}" r="2.5" fill="var(--gold)"/>
        </svg>
        <div class="mini-graph-labels">
            <span>${Math.round(rolling[0] * 100)}%</span>
            <span>βÜ£</span>
            <span>${Math.round(rolling[rolling.length - 1] * 100)}%</span>
        </div>
    `;
}

function buildLessons() {
    const data = state.allData;
    const lessonSize = 8;
    const reviewCount = 2;
    state.lessons = [];
    for (let i = 0; i < data.length; i += lessonSize) {
        let lessonItems = data.slice(i, i + lessonSize);
        if (i > 0 && lessonItems.length >= lessonSize) {
            const prevItems = data.slice(0, i);
            const existing = new Set(lessonItems.map(d => d.name));
            const candidates = prevItems.filter(d => !existing.has(d.name));
            const reviewItems = shuffle(candidates).slice(0, reviewCount);
            lessonItems = lessonItems.slice(0, lessonSize - reviewCount).concat(reviewItems);
        }
        state.lessons.push(lessonItems);
    }
}

// ====================== QUESTION GENERATION ======================
function getAllIngredients() {
    const allIngredientsSet = new Set();
    (state.allData || []).forEach(d => {
        const nd = normalizeItem(d);
        nd._ingredients.forEach(i => allIngredientsSet.add(i));
        (nd._wrongPool || []).forEach(i => allIngredientsSet.add(i));
        (nd._pool || []).forEach(i => allIngredientsSet.add(i));
    });
    return [...allIngredientsSet];
}

function buildWrongPool(nd, allIngredients) {
    const correctSet = new Set(nd._ingredients);
    let wrongPool = (nd._wrongPool || []).filter(p => !correctSet.has(p));
    if (wrongPool.length < 4) {
        const extra = allIngredients.filter(i => !correctSet.has(i) && !wrongPool.includes(i));
        wrongPool = wrongPool.concat(shuffle(extra).slice(0, 5 - wrongPool.length));
    }
    return wrongPool;
}

function buildBasicSelect(nd, wrongPool) {
    const correctCount = nd._ingredients.length;
    const minDistractors = Math.max(2, Math.ceil(correctCount * 0.4));
    const target = correctCount + minDistractors;
    const pool = [...nd._ingredients];
    const used = new Set(nd._ingredients);
    const remaining = target - pool.length;
    if (remaining > 0) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i)).slice(0, remaining);
        pool.push(...extra);
    }
    return {
        type: 'select',
        item: nd,
        pool: shuffle(pool),
        format: 'logical',
        showGrams: state.isDrinksChapter && nd._hasGrams,
    };
}

function buildRemediationSet(item, allIngredients) {
    const nd = normalizeItem(item);
    const wrongPool = buildWrongPool(nd, allIngredients);
    const order = shuffle(['missing', 'color_fill', 'spatial']);
    const questions = [];
    for (const type of order) {
        let q = null;
        if (type === 'missing') q = buildMissingQuestion(nd, wrongPool, 'logical');
        else if (type === 'color_fill') q = buildColorFillQuestion(nd, wrongPool, allIngredients);
        else if (type === 'spatial') q = buildSpatialSelect(nd, wrongPool, allIngredients, 'spatial');
        if (!q) q = buildTrueFalseQuestion(nd, wrongPool, 'logical') || buildSimpleSelect(nd, wrongPool, 'logical');
        if (q) questions.push(q);
    }
    return questions;
}

function generateQuestions(items) {
    const questions = [];
    const allIngredients = getAllIngredients();

    for (const item of shuffle(items)) {
        const nd = normalizeItem(item);
        const wrongPool = buildWrongPool(nd, allIngredients);

        const format = pickFormat();
        let q = null;

        if (format === 'color_coded') {
            q = buildColorFillQuestion(nd, wrongPool, allIngredients);
            if (!q) q = buildMissingQuestion(nd, wrongPool, 'logical') || buildSpatialSelect(nd, wrongPool, allIngredients, 'spatial') || buildTrueFalseQuestion(nd, wrongPool, 'logical') || buildSimpleSelect(nd, wrongPool, 'logical');
        } else if (format === 'spatial') {
            q = buildSpatialSelect(nd, wrongPool, allIngredients, format);
            if (!q) q = buildMissingQuestion(nd, wrongPool, 'logical') || buildColorFillQuestion(nd, wrongPool, allIngredients) || buildTrueFalseQuestion(nd, wrongPool, 'logical') || buildSimpleSelect(nd, wrongPool, 'logical');
        } else { // logical
            q = buildMissingQuestion(nd, wrongPool, format);
            if (!q) q = buildSpatialSelect(nd, wrongPool, allIngredients, 'spatial') || buildColorFillQuestion(nd, wrongPool, allIngredients) || buildTrueFalseQuestion(nd, wrongPool, 'logical') || buildSimpleSelect(nd, wrongPool, 'logical');
        }

        if (q) questions.push(q);
    }

    return shuffle(questions);
}

function buildColorFillQuestion(nd, wrongPool, allIngredients) {
    const byCat = {};
    nd._ingredients.forEach(ing => {
        const cat = getColorCategory(ing);
        if (!byCat[cat]) byCat[cat] = [];
        byCat[cat].push(ing);
    });

    const missingByCat = {};
    const shownByCat = {};
    const missing = [];
    let totalSlots = 0;

    for (const [cat, ings] of Object.entries(byCat)) {
        if (ings.length < 2) continue;
        const maxMissing = Math.min(2, ings.length - 1);
        const count = maxMissing === 1 ? 1 : (Math.random() < 0.5 ? 1 : 2);
        const shuffled = shuffle(ings);
        missingByCat[cat] = shuffled.slice(0, count);
        shownByCat[cat] = shuffled.slice(count);
        missing.push(...missingByCat[cat]);
        totalSlots += count;
    }

    for (const [cat, ings] of Object.entries(byCat)) {
        if (!shownByCat[cat]) shownByCat[cat] = [...ings];
    }

    if (missing.length < 1) return null;

    const used = new Set([...nd._ingredients, ...missing]);
    const missingCats = Object.keys(missingByCat);
    let distractors = [];
    for (const cat of missingCats) {
        const candidates = allIngredients.filter(i => !used.has(i) && getColorCategory(i) === cat);
        distractors.push(...shuffle(candidates).slice(0, 2));
    }
    if (distractors.length < 2) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i) && !distractors.includes(i)).slice(0, 2 - distractors.length);
        distractors.push(...extra);
    }
    if (distractors.length === 0) return null;

    const choices = shuffle([...missing, ...distractors]);
    return {
        type: 'color_fill',
        item: nd,
        missingByCat,
        shownByCat,
        missing,
        choices,
        totalSlots,
        format: 'color_coded',
    };
}

function buildSpatialSelect(nd, wrongPool, allIngredients, format) {
    if (wrongPool.length < 2) return null;
    const correctCount = nd._ingredients.length;
    const minDistractors = Math.max(2, Math.ceil(correctCount * 0.4));
    const target = correctCount + minDistractors;

    const pool = [...nd._ingredients];
    const used = new Set(nd._ingredients);

    // Add at least one distractor into every zone so each column has a wrong option
    const correctByZone = {};
    nd._ingredients.forEach(ing => {
        const z = categorizeIngredient(ing);
        if (!correctByZone[z]) correctByZone[z] = [];
        correctByZone[z].push(ing);
    });
    for (const [zone, items] of Object.entries(correctByZone)) {
        const zoneDistractors = allIngredients.filter(i => !used.has(i) && categorizeIngredient(i) === zone);
        if (zoneDistractors.length > 0) {
            const d = shuffle(zoneDistractors)[0];
            pool.push(d);
            used.add(d);
        }
    }

    // Fill the rest with random distractors up to the target
    const remaining = target - pool.length;
    if (remaining > 0) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i)).slice(0, remaining);
        pool.push(...extra);
    }

    // Guarantee at least 2 distractors even if the pool above fell short
    const poolDistractors = pool.filter(i => !nd._ingredients.includes(i));
    if (poolDistractors.length < 2) {
        const extra = shuffle(wrongPool).filter(i => !used.has(i)).slice(0, 2 - poolDistractors.length);
        pool.push(...extra);
    }

    const displayPool = shuffle(pool);
    return {
        type: 'select',
        item: nd,
        pool: displayPool,
        format: format,
        showGrams: state.isDrinksChapter && nd._hasGrams,
    };
}

function buildMissingQuestion(nd, wrongPool, format) {
    if (nd._ingredients.length <= 2 || wrongPool.length < 2) return null;
    const correctByCat = {};
    nd._ingredients.forEach(ing => {
        const cat = getCategory(ing);
        if (!correctByCat[cat]) correctByCat[cat] = [];
        correctByCat[cat].push(ing);
    });
    const catsWithMulti = Object.keys(correctByCat).filter(c => correctByCat[c].length > 1);
    if (catsWithMulti.length > 0) {
        const cat = catsWithMulti[Math.floor(Math.random() * catsWithMulti.length)];
        const catIngredients = correctByCat[cat];
        const missingIdx = Math.floor(Math.random() * catIngredients.length);
        const missingIng = catIngredients[missingIdx];
        const shown = nd._ingredients.filter(i => i !== missingIng);
        const distractors = shuffle(wrongPool).slice(0, 3);
        const choices = shuffle([missingIng, ...distractors]);
        return {
            type: 'missing',
            item: nd,
            shown: shown,
            missing: missingIng,
            missingCategory: cat,
            choices: choices,
            format: format,
            showGrams: false,

function getColorHex(cat) {
    const map = { red: '#ff4444', white: '#ffffff', yellow: '#ffd700', orange: '#ff8c00', green: '#32cd32', blue: '#1e90ff', brown: '#8b4513', neutral: '#aaaaaa' };
    return map[cat] || '#aaaaaa';
